paisse (5mm-1cm épaisseur) \n➡️ Cuisson 12-15min à 180 airfryer\nPossible aussi au four (15-20min à 180 ou 200)\n➡️ Laisser refroidir avant de garnir \n\nIci j’ai fait 2 versions : \n🌿 Fromage frais, tomates séchées @koro_fr (-5% code fleur5) & basilic \n🍯 Fêta & confiture de figue (ou miel!)\n\nVous m’en direz des nouvelles !😎\n(Ma maman a adoré!!) \n\n#recettesimple #recettefacile #recettesaine #food #recetteexpress #faitmaison #apero #ideesapero #aubergines", "owner": "Fleur Wendling", "username": "eatwithflower", "hashtags": ["recettefacile", "recetteexpress", "faitmaison", "recettesaine", "apero", "aubergines", "food", "ideesapero", "recettesimple"], "user_tags": [], "collection": "Meals", "id": 107, "clean_title": "ROULÉS AUBERGINES | publicité"}, {"url": "https://www.instagram.com/reel/DM8B8dHN2-2/", "title": "⁨\t⁨\tسلطة النودلز", "caption": "⁨\t⁨\tسلطة النودلز \n\nالمكونات:\n-نص علبة نودلز (ارز/فاصوليا) \n-2 جزر \n-2 خيار كبير\n-نص ضمة نعنع\n-نص ضمة كزبرة\nكوب كاجو محمص\n-صدر دجاج \n-ببريكا\n-ثوم بودرة\n\nتتبيلة السلطة:\n-خمس ملاعق زبدة الفول السوداني\n-معلقتين خل الارز / خل عادي \n-معلقتين فونزو / او صويا \n-اربع معالق ميبل سيرب \n\nالطريقة:\n-ننقع النودلز بماء حار حتى يستوي (اتبعوا المعلومات المكتوبه على الكيس) \n-نتبل صدور الدجاج ونقليها مع شوية زيت زيتون حتى تستوي \n-نقطع صدور الدجاج\n-في وعاء نضيف الالنودلز المطبوخة ، الجزر والخيار المقطع \nالدجاج النعنع والكزبره\n-نخلط التتبيله ونضيفها على السلطه ونقلب \n-نضيف الكاجو ونقدمها⁩⁩", "owner": "✨Shams Jabarin✨", "username": "shams_jb1", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 108, "clean_title": "سلطة النودلز"}, {"url": "https://www.instagram.com/reel/DNjGK_nxc5o/", "title": "BOURSIN STUFFED EGGPLANT POCKETS WITH WALNUT-BASIL-DATE CRUNCH! Friendly reminder that these babies exist—they are tende", "caption": "BOURSIN STUFFED EGGPLANT POCKETS WITH WALNUT-BASIL-DATE CRUNCH! Friendly reminder that these babies exist—they are tender, salty, sweet & crunchy all at the same time 🙃\n•\n1 small eggplant, cut into thin slices\nSalt\nOlive oil\n5 oz Boursin\n1/4 cup plain Greek yogurt \n•\nFor the topping: \n1/3 cup chopped walnuts\n1/4 cup chopped fresh basil \n4 dates, minced\n1/4 tsp lemon zest\nPinch salt\n•\n1️⃣Salt one side of the eggplant slices and let them sit for about 10 minutes. 2️⃣While the eggplant sits, make the filling. Add the Boursin and yogurt to a bowl and mix to combine until creamy. Place in the refrigerator until ready to use. 3️⃣Pat the eggplant dry with a paper towel to absorb the liquid, but do not rinse. 4️⃣Heat a skillet over medium-high heat. Add about a tablespoon of olive oil and sear 3-4 slices of eggplant at a time for about 2-3 minutes per side. Remove and place them onto a paper towel to absorb excess oil and cool. Repeat until you are done with the eggplant. 5️⃣While the eggplant cools, make the topping. Add the walnuts, dates, basil, lemon zest and salt to a small bowl. Mix to combine. 6️⃣To each eggplant slice, add a smear of the Boursin mixture and close them to create a a half moon. Next, add some of the topping to the rim of the Boursin. \n•\n#glutenfreerecipe #eggplantrecipes #easyrecipe #tastemade #goodmoodfood #igreels #mealprep #vegetarian #cookfromscratch #appetizer #f52grams #healthycooking #salads #lowcarbrecipe #wholefoodsmarket #justeatrealfood #glutenfree #eggplant #inmykitchen", "owner": "Caitlin Latessa-Greene", "username": "starinfinitefood", "hashtags": ["eggplant", "justeatrealfood", "goodmoodfood", "salads", "inmykitchen", "eggplantrecipes", "easyrecipe", "igreels", "mealprep", "vegetarian", "appetizer", "wholefoodsmarket", "glutenfree", "healthycooking", "cookfromscratch", "tastemade", "glutenfreerecipe", "f52grams", "lowcarbrecipe"], "user_tags": [], "collection": "Meals", "id": 109, "clean_title": "BOURSIN STUFFED EGGPLANT POCKETS WITH WALNUT-BASIL-DATE CRUNCH!..."}, {"url": "https://www.instagram.com/reel/DLFDR_bSECh/", "title": "Pizza night just got upgraded with this Mushroom Brie, Garlic & Thyme Pizza!", "caption": "Pizza night just got upgraded with this Mushroom Brie, Garlic & Thyme Pizza!\r\n\nEasy to make using a good store bought pizza dough or make your own!\r\n\nSo much flavour comes from the humble Cup mushrooms as they sauté with garlic & thyme but feel free to use whatever mushrooms you like! \n\r\nMakes 2 pizzas \n\r\n\ningredients\n\r\n3 tbsp olive oil\r\n300g cup mushrooms\r\n2 clove garlic, sliced\r\n3 sprigs thyme\r\nSalt, pepper\r\n½ brown onion, sliced\r\n½ bunch silverbeet leaves, roughly chopped\r\n2 250g store bought pizza dough or pizza bases\r\nPlain flour for dusting\r\n1 cup grated mozzarella\r\n150g brie, sliced\r\nTo serve, thyme leaves, flat leaf parsley leaves, chili flakes\n\r\nMethod\n\r\nPreheat an oven to 240C.\r\n\nPlace a large frying pan over a medium/high heat and add half the olive oil, mushrooms, garlic, thyme and a good pinch of salt & pepper. \r\n\nCook, stirring often for 3 minutes to caramelise the mushrooms but not overcook (otherwise they will \r\ndry out in the oven, on the pizza)\r\n\nTransfer the mushrooms to a dish and whip out the pan & return to the heat.\r\n\nAdd the remaining olive oil, sliced onion and silverbeet and a little salt and pepper. Stur fry this for 1 minute, to just wilt, then transfer to a dish.\r\nIf using dough, lightly flour a bench and roll out or hand stretch the doughs. Place them onto pizza \r\ntrays and top with the mozzarella, brie, silverbeet & mushrooms. \n\nIf using bases, skip the rolling and head straight to the topping.\r\n\nBake the pizzas for 8-10 minutes, until the crust I golden. \n\nServe scattered with more thyme, some parsley leaves, chili flakes and a splash of olive oil if desired.", "owner": "TOM WALTON 🌱", "username": "cheftomwalton", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 110, "clean_title": "Pizza night just got upgraded with this Mushroom Brie, Garlic &..."}, {"url": "https://www.instagram.com/reel/DM59aTvReRM/", "title": "tortellini burrata salad 🌿", "caption": "tortellini burrata salad 🌿\n\nmade with creamy burrata, cheese tortellini, crisp arugula, sauteed zucchini, shaved red onion, roasted corn and a honey vinaigrette— the perfect summer salad thats ready in 30 minutes!\n\ncomment “recipe” and I’ll send the full recipe straight to your inbox!\n\nhttps://somethingnutritiousblog.com/burrata-tortellini-salad/", "owner": "Gal Shua-Haim MS, RD", "username": "somethingnutritious", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 111, "clean_title": "tortellini burrata salad"}, {"url": "https://www.instagram.com/reel/DKmjqSCRfXV/", "title": "Comment “Salad” to get this recipe sent to your DMs ❤️", "caption": "Comment “Salad” to get this recipe sent to your DMs ❤️\n\nZucchini season is here and she’s looking chic!\n\nThis Zucchini Ribbon Salad with Creamy Burrata and Lemon Drizzle is your new go-to summer side. Easy, light, refreshing, and full of flavor — perfect for warm-weather lunches or elegant entertaining. ❤️\n\nGrab the full recipe on the blog now!\n\n👉 katerynascafe.com/zucchini-ribbon-salad-burrata-lemon\n\nFor more ideas, follow ⬇️\n@katerynascafe\n\n#zucchiniribbonsalad #burratarecipes #summersaladideas #healthyseasonalsalads #lemonburrata #katerynascafe #easysummerrecipes #freshsaladideas #zucchinirecipes #saladwithburrata #foodbloggerrecipes #whattocookthissummer #quickfreshmeals #easyentertainingfood #summerrecipeideas", "owner": "Kateryna Barger", "username": "katerynascafe", "hashtags": ["whattocookthissummer", "healthyseasonalsalads", "katerynascafe", "burratarecipes", "summersaladideas", "freshsaladideas", "foodbloggerrecipes", "easyentertainingfood", "lemonburrata", "zucchinirecipes", "saladwithburrata", "quickfreshmeals", "zucchiniribbonsalad", "summerrecipeideas", "easysummerrecipes"], "user_tags": [], "collection": "Meals", "id": 112, "clean_title": "Comment “Salad” to get this recipe sent to your DMs"}, {"url": "https://www.instagram.com/reel/DJjnjCVoeEf/", "title": "Gnocchi, courgette & white beans. Light as a feather pillowy home-made gnocchi with a buttery golden crust on a slick of", "caption": "Gnocchi, courgette & white beans. Light as a feather pillowy home-made gnocchi with a buttery golden crust on a slick of creamy lemony whipped beans & basil. The summertime supper of my dreams.", "owner": "Beth Adamson", "username": "boroughchef", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 113, "clean_title": "Gnocchi, courgette & white beans. Light as a feather pillowy..."}, {"url": "https://www.instagram.com/reel/DMLXP_goxKE/", "title": "Super Green Orzo with Roasted Salmon", "caption": "Super Green Orzo with Roasted Salmon \n\nPerfect summer recipe and great for meal prep. Takes 20 minutes to come together, high in protein and utterly delicious. \n\nServes 2 \n614 kcals\n38.6g protein \n\nIngredients \n- 300g orzo\n- 700ml stock \n- 30g spinach \n- 25g basil \n- 20g mint \n- 2 shallots \n- 2 cloves garlic \n- 75g peas \n- 1/2 lemon, zest only \n- 1 tbsp crème fresh (or Greek yoghurt works too) \n- 2 salmon fillets \n\nMethod \nFinely slice the shallot and finely dice the garlic. Add to a pan with a little oil and a good pinch of salt and sauté for a couple\nMinutes until soft. Add the orzo and couple\nFor a couple minutes, this will slightly toast the orzo and give it a lovely depth of flavour. \n\nAdd the stock and simmer for 20 minutes, regularly stirring to ensure it doesn’t stick to the bottom of the pan. \n\nAdd the salmon fillets to a lined baking tray with a little salt and pepper and roast 220°C for 8-10 minutes. \n\nAdd the spinach, mint, basil, lemon juice and zest, crème fresh (or Greek yoghurt) and salt to a blender and blitz until smooth. \n\nOnce the orzo is cooked and still  al dente, add the peas and the spinach mixture and stir through. \n\nCheck the seasoning and serve up between two plates, top with the roasted salmon fillet, an extra grating of lemon zest and a drizzle of extra virgin olive oil.", "owner": "Georgia May", "username": "georgiamaysalamat", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 114, "clean_title": "Super Green Orzo with Roasted Salmon"}, {"url": "https://www.instagram.com/reel/DMKbOQQymh8/", "title": "Loaded Sweet potatoes with Spiced Mushrooms, Herbed Yoghurt & Pickles", "caption": "Loaded Sweet potatoes with Spiced Mushrooms, Herbed Yoghurt & Pickles \n\rA vegetarian feast that never disappoints!!\n\nIngredients \n\r\n4 medium sweet potato\r\n3 tbsp olive oil\r\nSalt, pepper\r\n1 small brown onion, diced\r\n2 clove garlic, sliced\r\n300g button mushrooms, halved\r\n300g Swiss Brown mushrooms, thickly sliced\r\n1 tsp each ground cumin & smokey paprika\r\n2 tbsp unsalted butter\r\n200g baby spinach\r\n1 cup natural yoghurt\r\n2 tbsp each finely chopped mint & dill\r\nZest & juice 1 lemon\r\n1 small red onion, finely sliced\r\n2 large dill pickle, finely sliced into rounds\r\nHandful mint, parsley, dill leaves\r\nPinch sumac, optional\r\nLemon wedges to serve\n\r\nMethod\n\r\nPreheat an oven to 210C. Prick the potatoes a few times with a fork rub with 1 tbsp of olive oil and \r\nsome salt. Place on a baking tray and roast for 45-50 minutes, until soft.\r\n\nmeanwhile, combine the yoghurt, herbs, lemon and a little seasoning in a small bowl and set aside. \r\n\nWhen the potatoes are close, place a large pan over medium high heat and add the remaining olive \r\noil the onion, garlic, mushrooms, spices and a little salt. \n\nCook, stirring often to begin cooking the \r\nmushrooms, approx. 2 minutes then add the butter and continue to cook for another minute before \r\nadding the spinach to just wilt through. \r\n\nCombine the onions, pickles, herbs and sumac in a bowl.\n\nPlace the potatoes onto serving plates, split open the potatoes with a knife and gently break with \r\nflesh with a fork. \n\nSpoon over the mushrooms some yoghurt and scatter over the pickle salad. Serve \r\nwith lemon wedges.", "owner": "TOM WALTON 🌱", "username": "cheftomwalton", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 115, "clean_title": "Loaded Sweet potatoes with Spiced Mushrooms, Herbed Yoghurt &..."}, {"url": "https://www.instagram.com/reel/DLz7mTyiqrO/", "title": "Mezze de courgette frais et léger", "caption": "Mezze de courgette frais et léger \nIngrédients :\n* 1 grosse courgette ou 2-3 petites\n* 2 pots de yaourt au choix (ici yaourt végétal coco)\n* 2 cuillères à soupe d’huile d’olive\n* 2 cuillères à soupe de miel\n* 1 cuillère à soupe de vinaigre\n* 1 citron jaune ou vert\n* 40 g de noix\n* Sel, poivre, cumin\n* Herbes fraîches\n* Zaatar (optionnel) @nomie.epices 🤍\n Détailler des lamelles de courgette à l’aide d’un économe. Recouper les ensuite plus fines à l’aide d’un couteau. Garder le cœur. Placer les lamelles dans un bol, ajouter 1 cuillère à soupe d’huile d’olive, le miel, 1 cuillère à soupe de jus de citron et le vinaigre. Saler, poivrer puis mélanger. Ajouter les noix et réserver. Râper le cœur de la courgette et enlever l’excédent d’eau en le pressant entre vos mains ou dans un torchon. Déposer le yaourt dans un bol, ajouter la courgette râpée, le jus de citron, le sel, le poivre, le cumin, le zaatar et les herbes fraîches. Bien mélanger. Déposer le mélange au yaourt dans une assiette, ajouter les lamelles de courgette crues marinées sur le dessus ainsi que les noix. Râper un peu de zeste de citron, arroser d’un filet de jus de citron et d’un dernier filet d’huile d’olive. Déguster avec un morceau de pain grillé.\n\n#mezze #courgette #healthyfood #recettefacile #vegeterian #vegan", "owner": "Belqis Valsan", "username": "belqisvl", "hashtags": ["vegan", "recettefacile", "courgette", "mezze", "vegeterian", "healthyfood"], "user_tags": [], "collection": "Meals", "id": 116, "clean_title": "Mezze de courgette frais et léger"}, {"url": "https://www.instagram.com/reel/C1DI5D0xN3G/", "title": "SWEET POTATO BOATS WITH PECAN-FETA-DATE CRUMBLE! Using my favorite crumble ever & topping off these sweet potato boats f", "caption": "SWEET POTATO BOATS WITH PECAN-FETA-DATE CRUMBLE! Using my favorite crumble ever & topping off these sweet potato boats for the most epic side dish! Perfect for the holiday 🫶\n•\nFor the crumble:\n1/2 cup raw pecans\n5-6 dates\n2 oz feta cheese\nHandful arugula \n1/2 tsp salt\n1/2 tsp pepper\nZest of 1/2 lemon\n•\nFor the sweet potatoes: \n4 medium sweet potatoes, halved\nOlive oil \n1/2 tsp salt \n1/2 tsp pepper\n•\nOptional tahini-balsamic:\n2 tbsp tahini \n1 tsp maple syrup \n1 tsp balsamic vinegar \nPinch salt\n1 tbsp water\n*whisk to combine*\n•\n1️⃣ Preheat the oven to 425.2️⃣Drizzle olive oil on the bottom of a large sheet pan, season with salt and place the sweet potatoes face down. Drizzle the tops with the oil and season with salt. Place in the oven for about 35 minutes, removing them from the oven at about 25 minutes. Flip them, move them to one side, then add the pecans to one side of the baking sheet and bake for 5 minutes. Remove the pecans from the sheet pan and allow the sweet potatoes to cook until tender. 5️⃣While the sweet potatoes roast, make the crumble. Add the pecans and begin to chop them, then add the dates and do the same. Continue to add the feta and arugula, chopping after each ingredient is added. Add the salt, pepper and lemon zest and chop until the mixture is combined and a “crumble” is created. 6️⃣Place the sweet potatoes on a plate, gently press down on each with a fork. Top with the crumble and the tahini mix (optional). \n•\n#sweetpotatoes #quickmeals #easymeals #easyrecipes #recipeoftheday #tastemade #inthekitchen #igreels #appetizers #makeitdelicious #holidayfood #holidayrecipes #mealprepping #glutenfreerecipes#goodmoodfood #vegetarian #comfortfood #f52grams #wholefoodsmarket #dinnerideas #harvestbowl #sweetpotato", "owner": "Caitlin Latessa-Greene", "username": "starinfinitefood", "hashtags": ["appetizers", "inthekitchen", "holidayfood", "harvestbowl", "goodmoodfood", "mealprepping", "glutenfreerecipes", "sweetpotatoes", "easymeals", "igreels", "makeitdelicious", "recipeoftheday", "vegetarian", "sweetpotato", "wholefoodsmarket", "comfortfood", "quickmeals", "dinnerideas", "holidayrecipes", "tastemade", "easyrecipes", "f52grams"], "user_tags": [], "collection": "Meals", "id": 117, "clean_title": "SWEET POTATO BOATS WITH PECAN-FETA-DATE CRUMBLE! Using my..."}, {"url": "https://www.instagram.com/p/C7W68OXS9QM/", "title": "Are you 40+ and struggling to lose weight, follow @shanesmithpt and message him saying cheatsheet for his free fat loss ", "caption": "Are you 40+ and struggling to lose weight, follow @shanesmithpt and message him saying cheatsheet for his free fat loss cheatsheet for women over 40.\n-\nCredit: @zestmylemon\n\nA loaded protein packed salad with arugula, cannellini beans, hard boiled eggs, avocado, cherry tomatoes, kalamata olives, red onion, extra virgin olive oil, lemon juice, salt and pepper. Simple, nourishing, refreshing and delicious especially when the temps are in the 90’s. Hope you’re week is off to a good start!", "owner": "Nutrition", "username": "nutriitional", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 118, "clean_title": "Are you 40+ and struggling to lose weight, follow and message..."}, {"url": "https://www.instagram.com/reel/DI_1M-4KeSt/", "title": "PROTEIN PACKED PLATTERS: Glazed, Sticky Sweet Potatoes w/ Crispy Tofu + Peanut Sauce", "caption": "PROTEIN PACKED PLATTERS: Glazed, Sticky Sweet Potatoes w/ Crispy Tofu + Peanut Sauce\n\nKicking off this new series with a bloomin’ good (and VE) one!\n\nServes 3–4.\n▫️ 3 sweet potatoes, sliced lengthways ▫️ 1 tbsp soy sauce (or tamari) ▫️ 1½ tsp maple syrup ▫️ 1 block extra-firm tofu, cut into triangles ▫️ 1 small cucumber, shaved into ribbons ▫️ 100ml white vinegar ▫️ 200ml water ▫️ Spring onions + red chilli, to garnish\n\nFor the peanut sauce: ▫️ 2 tbsp soy sauce (or tamari if GF) ▫️ 1 garlic clove ▫️ 3 tbsp peanut butter ▫️ 2 tbsp plain yoghurt (I use high-protein) ▫️ 1 tbsp maple syrup ▫️ 1 inch fresh ginger ▫️ Juice of 1 lime\n\nMethod: 1. Steam the sweet pots: arrange in a deep baking tin, pour in a little water to cover the bottom, wrap tightly with foil and bake at 200°C fan for 20 mins.\n2. Meanwhile, quick-pickle the cucumber: mix the vinegar, water and a pinch of salt, add the cucumber ribbons, toss and set aside.\n3. Crisp the tofu: coat with oil, salt and pepper and air fry at 200°C for 10 mins. (Or bake.)\n4. Glaze the potatoes: once steamed, uncover and drain any water. Mix the soy sauce and maple syrup, brush over the potatoes, then roast again. Pop the grill on for extra caramelisation.\n5. Make the peanut sauce: blitz everything until smooth, adding a splash of water (I used around 100ml) to loosen if needed.\nPlatter up and ENJOY!\n.\n.\n.\n.\n#highprotein #highproteinrecipes #veganrecipes #highproteindinner #healthyrecipes #summerfood #hostingtips #mealprepideas #tofurecipes", "owner": "Emma Petersen (thefitlondoner)", "username": "emmapetersen", "hashtags": ["healthyrecipes", "veganrecipes", "highproteindinner", "highprotein", "summerfood", "mealprepideas", "hostingtips", "highproteinrecipes", "tofurecipes"], "user_tags": [], "collection": "Meals", "id": 119, "clean_title": "PROTEIN PACKED PLATTERS: Glazed, Sticky Sweet Potatoes w/ Crispy..."}, {"url": "https://www.instagram.com/reel/DLF1NQ5Ix3q/", "title": "⁨\t⁨\tבריאות זה לא רק מה שאנחנו מכניסים לגוף, זה גם מה שהנפש שלנו מקבלת ואם נדע לשלב את שני הצדדים של האוכל (הבריא והפחות ", "caption": "⁨\t⁨\tבריאות זה לא רק מה שאנחנו מכניסים לגוף, זה גם מה שהנפש שלנו מקבלת ואם נדע לשלב את שני הצדדים של האוכל (הבריא והפחות בריא) בחוכמה, נדע להנות מהחיים ולהיות בריאים בגוף ובנפש 💪🏼💕\nאז כשאנחנו אומרים שאנחנו אוכלים הכל מהכל - לזה אנחנו מתכוונים 😍🍫🫔\n\nאז קבלו מתכון של קרפ קניון הכי קלאסי וטעים עם ממרח שוקולד סופר בריא ומפנק שדומה 2 טיפות מים לנוטלה!\n\nרוצו דחוףףף להכין כי זה הולך להיות הכי כיפי ומתאים שיש עכשיו 😋 ללב, לנשמה ולבטן 🫶🏼\n\nלקרפ:\n3 ביצים\n2 כוסות חלב (480 מ״ל)\n2 כפות שמן\n1 כוס קורנפלור (150 גרם)\n2 כפות אבקת סוכר\n\nמערבבים מרכיבים רטובים ואז יבשים ומטגנים על מחבת קרפים או מחבת גדולה רגילה על אש נמוכה/בינונית עד שיש קצת בועות ואז הופכים.\n\nלממרח שוקולד:\nמערבבים בקערה 2 כפיות קקאו נא, 4 כפות חמאת בוטנים טבעית ו-4 כפות מייפל טבעי.\nהכמות מספיקה ל-3 קרפים אז תכפילו כמויות בהתאם לכמה שאתם רוצים לאכול.\n\nתהנו ותשמרו על עצמכם!\nאוהבים מלא 💕⁩⁩", "owner": "Sharon, Guy, Emma & Mika Argaman", "username": "argamanfamily", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 120, "clean_title": "בריאות זה לא רק מה שאנחנו מכניסים לגוף, זה גם מה שהנפש שלנו..."}, {"url": "https://www.instagram.com/reel/DK-Rtz7Oux_/", "title": "Fırında Domatesli Patlıcan 💯💜", "caption": "Fırında Domatesli Patlıcan 💯💜\n\n#patlican #patlıcanlı #fırındapatlıcan #fırında #asmr #fırındadomateslipatlıcan #patlıcan #eggplant #appetizer", "owner": "Melodik Tadlar", "username": "melodiktadlar", "hashtags": ["fırındadomateslipatlıcan", "eggplant", "patlıcanlı", "asmr", "fırında", "patlican", "appetizer", "patlıcan", "fırındapatlıcan"], "user_tags": [], "collection": "Meals", "id": 121, "clean_title": "Fırında Domatesli Patlıcan"}, {"url": "https://www.instagram.com/reel/DG0SrCdR_Gg/", "title": "Pincha Flip transition tutorial 🤍", "caption": "Pincha Flip transition tutorial 🤍\n\nFINALLY 🫶🏻 many of you have requested a step by step guide on how to complete the Pincha Flip transition 💫\n\nTips:\n✨It’s incredibly important to warm up into this transition (you can follow my other reel on drills and flexibility to achieve this transition)\n✨push into your forearms not your head\n✨I find having my fingers closer to my shoulders allows me to flip deeper, creating alignment with opened shoulders to easily balance and kick off the wall \n✨safety first, take it one step at a time\n\n🤍 have fun practicing \n\nembracethejourney #mindfulmovement #yogaflow #gentlereminder #takeadeepbreath #youvegotthis #strengthandflexibility #yogaathome #gratitudepractice #practicenotperfection #yogatransition #yogatutorial #pinchamayurasana", "owner": "Lindsay Joy", "username": "lindsayjoy_flows", "hashtags": ["pinchamayurasana", "yogaflow", "gentlereminder", "youvegotthis", "mindfulmovement", "yogatransition", "yogatutorial", "takeadeepbreath", "practicenotperfection", "strengthandflexibility", "yogaathome", "gratitudepractice"], "user_tags": [], "collection": "Meals", "id": 122, "clean_title": "Pincha Flip transition tutorial"}, {"url": "https://www.instagram.com/reel/DKrw8sVoPdR/", "title": "הסלט של פזית", "caption": "הסלט של פזית\nחומרים –\n1 חסה לליק\n200 גרם ברוקומיני או ברוקולי (טרי או קפוא)\n200 גרם שעועית ירוקה (טרייה או קפואה)\n1 קופסת אוכמניות (125 גרם)\n200 גרם גבינת פטה\nלרוטב –\n1/3 כוס שמן זית\n1/2 תפוז סחוט\n1 כפית חרדל גרגרים\n1 כף חומץ בלסמי\n1 כפית דבש\n1/2 כפית מלח\n1/8 כפית פלפל שחור\n\nככה מכינים – \nמערבבים היטב את כל חומרי הרוטב ומניחים בצד.\nמרתיחים מים בסיר גדול וחולטים את השעועית הירוקה 6-7 דקות ומעבירים מיד למי קרח, ומשם לייבוש במסננת או מגבת. גם את הברוקולי חולטים באותה הצורה אך למשך 4-5 דקות בלבד, ומייבשים.\nכעת להרכבת הסלט –\nבתחתית קערה מסדרים פרחי חסה לליק ומעליה מפזרים ברוקולי, שעועית ירוקה, אוכמניות ופטה מפוררת. את הרוטב מוסיפים אחרון ורק לפני ההגשה.\nאפשר להוסיף גרעינים קלויים או אגוזים שאוהבים.\n\nזוללים בהנאה עם א.נשים שאוהבים וממשיכים להתפלל לשלומם ולדרוש בשובם המיידי של כל החטופים שעדיין נמצאים בעזה אחרי כל כל הרבה זמן. מי היה מאמין.\n\nצלחת קרמיקה בעבודת יד @rinatbarnetser", "owner": "נוֹשקה | NOSHKA", "username": "___noshka___", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 123, "clean_title": "הסלט של פזית"}, {"url": "https://www.instagram.com/reel/DKC1COYIq5M/", "title": "ארנצ׳יני בטטה פטריות וערמונים🍠🌰🍄", "caption": "ארנצ׳יני בטטה פטריות וערמונים🍠🌰🍄\nמצרכים :\n2 כוסות אורז עגול / ריזוטו\n5 כוסות מים רותחים ( כוס מידה 250 מל )\nבצל בינוני \n2 סלסילאות פטריות שמפיניון / פורטובלו חתוכות לקוביות קטנות\n2 חבילות ערמונים\nבטטה גדולה\n4 שיני שום כתושות\n50 גרם חמאה\nשמן זית\n250 מ״ל שמנת מתוקה\n200 גרם מוצרלה / גבינה צהובה מגורדת\n100 גרם פתיתי פרמזן\nלמילוי : כדורי מוצרלה / קוביות גבינה צהובה \nתבלינים : \nכף שטוחה מלח \nפלפל גרוס לפי הטעם\n2 כפות אבקת פטריות \n\nלציפוי :\n3 ביצים \nפנקו / פירורי לחם\n\nאופן ההכנה:\nחותכים את הבטטה לקוביות קטנות , מעבירים לתבנית עם נייר אפיה , מזלפים שמן זית ומפזרים מלח , מכניסים לתנור שחומם ל 200° ל 25 דקות / עד שהבטטה מתרככת. \nבסיר גדול מחממים חמאה וסיבוב שמן זית\nמוסיפים בצל ומטגנים עד להזהבה. \nמוסיפים פטריות , ערמונים ושום , ושוב סיבוב שמן זית ומטגנים בערך 10 דקות. \nמוסיפים אורז תבלינים ו2 כוסות מים מתוך 5\nמבשלים על אש בינונית עד לצמצום כל המים ומוסיפים עוד כוס , חוזרים על הפעולה עד שנגמרים המים והאורז מבושל ורך (אם האורז לא מספיק רך וסיימתם להוסיף את המים אפשר כמובן להוסיף לפי הצורך)\nמוסיפים שמנת , גבינות ובטטה ומערבבים היטב , טועמים ואם צריך מתקנים במלח , מעבירים לתבנית ומשטחים את כל הריזוטו , עוטפים בניילון נצמד ומכניסים למקפיא ל20-30 דקות לקירור. \nטורפים ביצים עם מלח , ומערבבים את הפירורים עם מלח , מכינים כדורים וממלאים באמצע של כל כדור את המוצרלה , טובלים היטב בביצה ומעבירים לפירורים , מכניסים לטיגון בשמן עמוק עד שהארנצ׳יני זהובים וקריספיים. \nאני הגשתי אותם על רוטב שמנת קלאסי וגירדתי מעל פרמזן 🧀 \nכמובן שלא חייב להכין רוטב אבל מומלץ🔥\nבהצלחה 😍", "owner": "יהודה נורי | yehuda nuri", "username": "yeuda_nuri_cakes", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 124, "clean_title": "ארנצ׳יני בטטה פטריות וערמונים"}, {"url": "https://www.instagram.com/reel/DExmNb5si5c/", "title": "Episode 2 of extra veggies, LET’S GO 💚💚💚", "caption": "Episode 2 of extra veggies, LET’S GO 💚💚💚\n\nINTRODUCING MY GREEN GODDESS PASTA SAUCE... or if you’re trying to convince your toddler to eat their greens this is HULKS favourite meal or Elphabas MAGIC green sauce!\n\n🍝 Pasta is my ultimate comfort food and this bowl is super nourishing and perfect for a quick, wholesome weeknight dinner or meal prep!  Tag someone who’d love this bowl of creamy, dreamy, GREEN, goodness!\n\nYou will need 👇🏼 (serves 4)\n🥄 1 tbsp olive oil (to cook the pan ingredients)\n🥒 1 courgette, chopped\n🫛 150g cup frozen green peas\n🧄 3 garlic cloves, minced\n🧂 1/4 tsp salt (adjust to taste)\n🍃 100g of spinach\n🥛 70ml oat cream (or soy cream or oat milk)\n🍃 a small handful of fresh basil \n🍋 1 tbsp lemon juice\n🍯 10g of syrup or honey \n\n+ Your toppings: I like extra chopped basil, parmasan cheese and some chilli flakes\n+ Protein: I like to use lentil pasta to make this a high protein pasta dish OR you could add in your favourite protein source\n+ the pasta of course!!\n\nHOW TO👇🏼\nAssemble as demonstrated in the video! \n\nLISTEN UP 👇🏼\n👉🏼LESS THICK CONSISTENCY = MORE LIQUID i.e the milk or cream etc \n👉🏼MORE THICK CONSISTENCY = LESS LIQUID\n\nMake sure you’re following @_emilysworld for NEW recipes EVERY WEEK 😁🫂💙 #EmilysWorld\n.\n.\n.\n.\n.\n.\n.\n\n#pasta #homemadepasta #pastasauce #roastedveg #getwellsoon #hiddenveg #greensauce #gutfriendly #ImmuneBoosting #Healthyrecipe #healthypasta #greenpastasauce #VeganPasta #HealthyEating #greengoddess #ComfortFood #Veganuary #Antioxidants #toddlerrecipes #EatTheRainbow #GutHealth #highfibre #nutritionist #mealprep #EasyPastaSauce #HealthyComfortFood #MealPrepIdeas #EatTheRainbow #highprotein", "owner": "Emily Solman BSc MSc RNutr", "username": "_emilysworld", "hashtags": ["pasta", "homemadepasta", "eattherainbow", "getwellsoon", "greenpastasauce", "easypastasauce", "healthycomfortfood", "hiddenveg", "healthyrecipe", "immuneboosting", "gutfriendly", "veganpasta", "healthypasta", "pastasauce", "mealprep", "highprotein", "roastedveg", "antioxidants", "greensauce", "greengoddess", "healthyeating", "comfortfood", "toddlerrecipes", "mealprepideas", "highfibre", "nutritionist", "emilysworld", "guthealth", "veganuary"], "user_tags": [], "collection": "Meals", "id": 125, "clean_title": "Episode 2 of extra veggies, LET’S GO"}, {"url": "https://www.instagram.com/reel/DJlgRmXI-VK/", "title": "קציצות טונה אפויות🐟", "caption": "קציצות טונה אפויות🐟\n\nהמתכון הזה הוא אחד החרושים אצלנו בבית, אין פה מישהו שלא אוהב אותן.\nאני אופה אותן, אבל לגמרי אפשר גם לטגן או להכין באייר פרייר – מה שנוח לכם.\nטעימות חמות או קרות, בפיתה, בצלחת, או בקופסת אוכל של הילדים 😉\n\nמצרכים:\n2 קופסאות טונה במים, מסוננות\n2 ביצים\n1 גזר קטן מגורד\n1 קישוא קטן מגורד וסחוט מנוזלים\n¼ כוס פירורי לחם מקמח מלא (ועוד במידת הצורך)\n1 כף פפריקה\n1 כפית שום גבישי\nמלח ופלפל לפי הטעם\n1 כפית חרדל דיז׳ון גדושה \nספריי שמן לאפייה / שמן לטיגון\n\nאופן ההכנה:\nמחממים תנור ל־180 מעלות.\nשמים את כל המרכיבים בקערה ומערבבים לתערובת אחידה.\nאם התערובת רכה מדי ולא מתגבשת – מוסיפים עוד קצת פירורי לחם, לפי הצורך.\nיוצרים קציצות ומניחים על תבנית מרופדת בנייר אפייה.\nמרססים כל קציצה בספריי שמן.\nאופים 25-30 דקות, עד להזהבה והתייצבות.\n\nבמחבת – טיגון קל עם מעט שמן, 3–4 דקות מכל צד עד הזהבה. במקרה הזה תכינו אותן שטוחות ולא עגולות. \nבאייר פרייר – 180 מעלות, כ־15 דקות, \nעד שהן שזופות ויציבות.", "owner": "Gil Avidor-Aloni | גיל אבידור-אלוני", "username": "eatsgil", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 126, "clean_title": "קציצות טונה אפויות"}, {"url": "https://www.instagram.com/reel/DIULAKRSbJ3/", "title": "Lemon garlic butter beans", "caption": "Lemon garlic butter beans\n\nThis is the dish that will convert my bean haters, I can almost guarantee it 🥰🍋✨\n\nINGREDIENTS\n1-2 tbsp olive oil\n1 zucchini\n1 onion\n5-6 cloves of garlic\n1 lemon\n2 cans of butter beans (400mL or 13.5 fl oz each)\n3 tbsp nutritional yeast\n75g firm tofu (2.5 oz)\n1/2 cup water\nPinch of salt\nBunch of fresh basil leaves\nToasted bread to serve\n\nMETHOD\n1. Thinly slice the zucchini and the onion, peel and mince garlic cloves, and cut the peel off half of the lemon and slice into thin strips.\n2. Toss zucchini in 1 tbsp olive oil, a pinch of salt and pepper. If using an fryer, toss in the air fryer at 425F for 15-18 minutes, flipping a couple times to avoid burning. If using an oven, roast for 20 minutes at 400F, flipping halfway.\n3. To a good non-stick frying pan on medium-low heat, add the olive oil and sliced onions, stirring often.\n4. After a few minutes, add the minced garlic and lemon strips, continuing to stir often.\n5. Drain and rinse two cans of butter beans, setting aside 2/3 cup for the sauce.\n6. Turn the onions down to low while you blend the sauce. To a blender, add about 1/3 of the sautéed onions and lemon from the pan, 2/3 cup of butter beans, tofu, nutritional yeast, salt, juice from the entire lemon and water. Blend until smooth and creamy.\n7. Add the remaining butter beans to the pan, then add the sauce from the blender and bring to a simmer.\n8. Finely chop basil leaves.\n9. Remove from heat, dish up, top with the roasted zucchini and chopped basil and enjoy! I love serving this with toasted sourdough bread.\n\n#butterbeans #dinnerrecipes #dinnerideas #healthyrecipes #mealprep #beanrecipes", "owner": "Minaëlle’s Kitchen", "username": "minaelleskitchen.ca", "hashtags": ["healthyrecipes", "beanrecipes", "mealprep", "butterbeans", "dinnerideas", "dinnerrecipes"], "user_tags": [], "collection": "Meals", "id": 127, "clean_title": "Lemon garlic butter beans"}, {"url": "https://www.instagram.com/reel/DJJ7rgDIrP0/", "title": "COCONUT LIME TOFU for “C” of my A-Z series of the BEST VEGETARIAN RECIPES 🌱", "caption": "COCONUT LIME TOFU for “C” of my A-Z series of the BEST VEGETARIAN RECIPES 🌱 \n\nThis one is set to convert all tofu sceptics - it’s so rich and creamy, but balanced by zingy, fiery flavours that you’ll be sopping up with a bowl of rice. Make it now and I promise your soul will be thanking you later , as this is all kinds of cosy and comforting! \n\nGently heat 1-2 tbsp of sesame oil/ any oil of choice in a pan. Pan-fry silken-firm/ firm tofu slices until golden brown on both sides (flipping half way). \nOptional: \n- coat the tofu slices lightly in corn flour for a more crisp and golden texture. \n- If using silken-firm tofu, it is recommended to wrap the block between kitchen towels (placing a small saucepan on top). Let it sit for 10-15 minutes or so to drain out the excess water. Then pat tofu dry with clean kitchen towels and slice it.\n\nRemove the tofu and set aside. In the same pan, stir in:\n- 1 tbsp sesame oil\n- 1/2 onion, sliced\n- 3-4 cloves of garlic , minced\n- Knob of ginger, grated\n- 1-2 tbsp red curry paste (let me know if you want my homemade paste recipe - but pls make sure you’re following as I won’t be able to DM you otherwise!) \n- 1-2 tbsp sriracha/ hot sauce\n\nStir it together and once fragrant, add 250-300 ml coconut milk , then stir in:\n- 1-2 tsp brown sugar\n- 1-2 tbsp light soy sauce\n- Juice of 1/2 - 1 lemon or lime (adjust according to preference, adding more for zing)\n\nOnce simmering, add back your cooked tofu. Garnish with scallions & sesame seeds, serve over rice and DIVE IN #quickrecipes #dinnerrecipes #tofurecipes #coconutmilk #veganrecipeshare #vegandinnerideas #tofulover {quick dinners, easy dinner recipes, tofu recipes, coconut tofu, coconut recipes , easy meal ideas, easy dinner inspiration}", "owner": "Ayushi Gupta-Mehra", "username": "the_foodiediaries", "hashtags": ["tofulover", "veganrecipeshare", "coconutmilk", "vegandinnerideas", "tofurecipes", "dinnerrecipes", "quickrecipes"], "user_tags": [], "collection": "Meals", "id": 128, "clean_title": "COCONUT LIME TOFU for “C” of my A-Z series of the BEST..."}, {"url": "https://www.instagram.com/reel/DJ1LOhcsH7Y/", "title": "Dessert fragole e cioccolato 🍓🍫", "caption": "Dessert fragole e cioccolato 🍓🍫 \nBy @chiara.fiorani | ricettinaeasy \n\nFresco, facilissimo e super goloso. Si prepara in pochissimi minuti e lo trovi già pronto nel frigo 😎\n\nIngredienti:\n30g fiocchi d’avena/farina d’avena istantanea \n1 cucchiaio di yogurt greco \n50ml bevanda vegetale/latte\n1 cucchiaino di cacao\nQb fragole e cioccolato fondente \n\nProcedimento:\nTrita i fiocchi d’avena finissimi, aggiungi cacao, yogurt, bevanda veg/latte e mescola bene. Disponi le fragole tagliate a pezzettini sul fondo di un bicchiere, aggiungi il composto d’avena e ricopri con del cioccolato fuso. Lascia riposare in frigo per tutta la notte o almeno 3h ed eccolo pronto ✨ Provatelo e fatemi sapere!❤️\n\n#dessert #cioccolato #avena #oats #porridge #fragole #overnightoats #ricette #ricettefacili #ricetteveloci #ricettesane #dieta", "owner": "Chiara Fiorani", "username": "chiara.fiorani", "hashtags": ["dieta", "porridge", "ricette", "avena", "oats", "cioccolato", "ricettesane", "overnightoats", "dessert", "fragole", "ricettefacili", "ricetteveloci"], "user_tags": [], "collection": "Meals", "id": 129, "clean_title": "Dessert fragole e cioccolato"}, {"url": "https://www.instagram.com/reel/DKcc9D8IPva/", "title": "הסלט שיקפיץ לכן את השולחן אירוח!", "caption": "הסלט שיקפיץ לכן את השולחן אירוח! \nכזה שווה שאתן מכינות בשנייה וכולם מתעלפים! \nאז מה צריך? \n4 זוקיני גדולים \nחצי חבילת עלי רוקט \nשקדים מולבנים פרוסים\nחצי חבילת פטה \n\nלרוטב שמקפיץ את כל הסלט \nלימון וחצי \nתפוז אחד \nשמן זית, מלח פלפל \n\nאין שווה כזה! \n\n#אירוחבסטייל #שולחןמעוצב #אירוחמהלב #סלט #סלטיםבריאים #סלטזוקיני #סלטים", "owner": "Inbar Yahav I ענבר יהב", "username": "inbar_yahav", "hashtags": ["אירוחמהלב", "אירוחבסטייל", "סלטזוקיני", "סלטיםבריאים", "סלט", "שולחןמעוצב", "סלטים"], "user_tags": [], "collection": "Meals", "id": 130, "clean_title": "הסלט שיקפיץ לכן את השולחן אירוח"}, {"url": "https://www.instagram.com/reel/DKOdAQlIVIz/", "title": "סלט חלומי עם משמשים וחסות 🍑🥬🍋‍🟩", "caption": "סלט חלומי עם משמשים וחסות 🍑🥬🍋‍🟩\n\nסוגר לכם את הפינה עם סלט לארוחת חג או לבראנצ שבא לכם ואתם יכולים להחליף את המשמש בפרי אחר שאתם אוהבים כמו אפרסק או נקטרינה 🫶🏻\n\nמתכון\nמצרכים:\n\nלסלט:\n\t•\t2 משמשים, פרוסים דק\n\t•\tחצי בצל סגול, פרוס דק\n\t•\tחצי פלפל ירוק חריף, קצוץ דק (או לפי הטעם)\n\t•\tראש חסה (ליטל ג’ם או גמביט), מופרד לעלים וקרוע גס ביד או חתוך לרבעים\n\t•\tחופן עלי רוקט\n\t•\tגבינת חלומי, פרוסה\n\nלטיגון החלומי:\n\t•\t2 כפות שמן זית\nאו\n1 כף שמן זית + 1 כף חמאה\n\nלרוטב:\n\t•\tכפית גדושה דבש\n\t•\t2 כפות שמן זית\n\t•\tמיץ מחצי לימון עסיסי\n\t•\tכפית חומץ תפוחים\n\t•\tכפית מלח\n\nלהגשה:\n\t•\t2–3 כפות יוגורט יווני לכל מנה\n\t•\tעלי זעתר טריים (או קצוצים)\n\t•\tשומשום קלוי\n\n⸻\n\nאופן ההכנה:\n\t1.\tמטגנים את החלומי:\nמחממים מחבת נון-סטיק עם 2 כפות שמן זית (או שמן זית וחמאה). מטגנים את החלומי משני הצדדים עד שהוא זהוב ופריך מבחוץ.\n\t2.\tמכינים את הרוטב:\nבקערית קטנה מערבבים היטב את הדבש, שמן הזית, מיץ הלימון, החומץ והמלח.\n\t3.\tמרכיבים את הסלט:\nבקערה גדולה שמים את החסה, הרוקט, המשמשים, הבצל והפלפל החריף. מוסיפים את החלומי החם, יוצקים מעל את הרוטב ומערבבים בעדינות.\n\t4.\tהגשה:\nמורחים 2–3 כפות יוגורט יווני על צלחת הגשה, מניחים מעל את הסלט, ומפזרים עלי זעתר ושומשום קלוי.\n\nבתיאבון 🧡🌸\n\nפרסום בשיתוף גד @gaddairy \n\n#food #אוכל #yummy #salad", "owner": "Itai Dagan | איתי דגן", "username": "itaidagan", "hashtags": ["yummy", "salad", "food", "אוכל"], "user_tags": [], "collection": "Meals", "id": 131, "clean_title": "סלט חלומי עם משמשים וחסות ‍"}, {"url": "https://www.instagram.com/reel/DFalwH5OAvn/", "title": "Creamy High Protein Broccoli Pasta 🥦💪This pasta has ~40g of protein & over 1 cup of veggies per serving thanks to 2 secr", "caption": "Creamy High Protein Broccoli Pasta 🥦💪This pasta has ~40g of protein & over 1 cup of veggies per serving thanks to 2 secret ingredients: cottage cheese & @eatbanza pasta! #banzapartner\n\nEver since I’ve been pregnant, I’ve been struggling a bit to get enough protein (and vegetables, honestly). Thankfully I haven’t had major nausea or aversions, I’m just mostly craving carbs 😆\n\nI’m all about finding super quick & easy sources of protein that I don’t really have to think about. Banza chickpea pasta is perfect – it has 20g protein per serving and can be used in literally any recipe! It also tastes just as good as regular pasta, so it’s one of my favorite pantry staples.\n\nTo add even more protein, we made a super creamy broccoli sauce with cottage cheese, bringing the total protein per serving up to almost ~40g. And most importantly, it tastes delicious!! \n\nI like to top mine with some burrata (bc why not), but it’s also delicious on its own. \n\nBookmark the full RECIPE below👇 and give it a try soon! \n\nCreamy High Protein Broccoli Pasta (2-3 servings)\n\n1 box (8oz) Banza Chickpea Pasta (I used cavatappi but they have lots of shapes)\n2 cups broccoli florets\n1 tbsp olive oil \n1 cup finely chopped leeks \n2 cloves garlic, minced \n1 cup fresh spinach\n1 cup cottage cheese\n1/4 cup grated parmesan \n1/2 cup hot water or milk\nSalt and pepper to taste\nJuice from 1/2 lemon \nOptional: Burrata for topping \n\nCook the pasta in salted water according to package directions. \n\nAdd 1 inch of water to a pot and place a steamer basket on top. Bring water to a boil, then add the broccoli florets and steam for ~7 minutes, until fork tender. \n\nMeanwhile, heat olive oil in a small skillet. Add the leeks and sauté for 5 minutes, until softened. Add the garlic and cook for 2 more minutes. \n\nAdd the leek/garlic mixture, steamed broccoli, spinach, cottage cheese, grated parmesan, water, salt and pepper and lemon juice to a blender and blend until completely smooth. \n\nPour the sauce over the cooked pasta and stir until coated. If the sauce is too thick, add 1-2 tbsp of hot water to loosen it up. Optional: top with burrata and fresh herbs of choice before serving.", "owner": "Lexi Harrison & Beth Sinclair", "username": "crowded_kitchen", "hashtags": ["banzapartner"], "user_tags": [], "collection": "Meals", "id": 132, "clean_title": "Creamy High Protein Broccoli Pasta This pasta has ~40g of..."}, {"url": "https://www.instagram.com/reel/DGV8AIwOAWt/", "title": "Double Chocolate Brownie Skillet for one✨ I love making desserts like this while it’s my time of the month bc they just ", "caption": "Double Chocolate Brownie Skillet for one✨ I love making desserts like this while it’s my time of the month bc they just SLAP. I paired this with an oat milk based ice cream & extra chocolate sauce but that is optional for you! (Recipe below!)\n\nRecipe-\n\nIngredients-\n2 tbsp salted butter (melted)\n2 tbsp granulated sugar\n1 tbsp packed brown sugar\nDash of vanilla \n1 tbsp egg \n3 tbsp all-purpose flour\n1 tbsp cocoa powder\n2 tbsp milk of choice or water \nDark chocolate to liking\nIce cream to liking (optional)\nChocolate sauce to liking (optional)\n\nInstructions:\n1. Preheat your oven to 350F.\n2. In a small bowl, add all the ingredients listed above & mix until well combined. Then add the chocolate & fold into the mixture.\n3. Spray oil on a small skillet (I used a 6inch diameter one), pour the batter, & bake for 10 minutes or until desired doneness.\n4. Take out, let it cool, top with ice cream & chocolate sauce, & enjoy!\n\n#food #foods #recipe #recipes #foodphotography #dessert #snack #foodpics #foodpic #instafood", "owner": "Dr. Jenna Ann Hunter, EdD MS RD", "username": "thehealthyhophead", "hashtags": ["snack", "foodphotography", "foodpic", "foodpics", "recipe", "dessert", "recipes", "food", "instafood", "foods"], "user_tags": [], "collection": "Meals", "id": 133, "clean_title": "Double Chocolate Brownie Skillet for one I love making desserts..."}, {"url": "https://www.instagram.com/reel/DF7LQcVvYuy/", "title": "Asian-style cucumber salad 🥒🔥", "caption": "Asian-style cucumber salad 🥒🔥\n\nOne of my favorite salads—quick, easy, and packed with flavor! 🥗✨ This Asian-style cucumber salad is crunchy, refreshing, and has the perfect balance of spice, tang, and nuttiness. Try it and let me know how you like it! 😍\n\nSave this for later! ❤️\n\n🥒 English cucumber – 2, thinly sliced\n🥜 Roasted peanuts – crushed\n⚪ Toasted sesame seeds – 1 tbsp\n🧄 Garlic – 1 tsp, chopped\n🌶 Chili flakes – ½ tsp\n🧂 Salt – as per taste\n🫒 Olive oil – 1 tbsp (for tempering) Or 🌰 Sesame oil – 1 tbsp (for authentic flavor)\n🍋 Lemon juice – 1 tbsp\n🍯 Honey – 1 tsp\n\n🥗 Slice cucumbers and place them in a bowl.\n🥗 Add crushed roasted peanuts and toasted sesame seeds.\n🥗 Prepare tempering: In a small bowl, add chopped garlic, chili flakes, and salt.\n🥗 Heat olive oil and pour it over the garlic mixture.\n🥗 Mix in lemon juice and honey.\n🥗 Drizzle the dressing over the cucumber and mix well.\n🥗 Enjoy this crunchy, flavorful salad! 😋\n\n✅ Like\n✅ Save\n✅ Comment below if you’ll try this!\n📢 Share with your friends & family, and share it on your stories!\n.\n.\n.\n( Asian cucumber salad , salad recipe, healthy salad , weight loss recipes, diet recipes) \n.\n.\n.\n#asiancucumbersalad #cucumbersalad #salad #saladrecipes #quickrecipes #weightlossrecipes #saladideas #asianfood #asiansalad #vegetables #dietrecipes #reelsindia #explorepage #foodstagram", "owner": "Ravika Thorat", "username": "mumbaifoodiz", "hashtags": ["reelsindia", "explorepage", "foodstagram", "cucumbersalad", "asianfood", "salad", "weightlossrecipes", "saladrecipes", "vegetables", "asiansalad", "saladideas", "asiancucumbersalad", "dietrecipes", "quickrecipes"], "user_tags": [], "collection": "Meals", "id": 134, "clean_title": "Asian-style cucumber salad"}, {"url": "https://www.instagram.com/reel/DEvNJuoiuV5/", "title": "Veganuary 10/25 🌱", "caption": "Veganuary 10/25 🌱 \n25 recipes in under 25mins: Caesar sesame pasta salad 🫙 \n\nThis will make even more excited for every lunch break from now on! 😜\nRECIPE (3 glasses, 20min preparation time):\n-200g pasta\nBoil in salted water and drain.\n-200g smoked tofu\n-1 small cucumber\n-120g tomatoes\n-2 Roman hearts\nChop everything into small pieces.\nDressing per jar:\n-1 tbsp tahini\n-1 tsp chopped capers\n-1/2 teaspoon mustard\n-1 tsp maple syrup\n-2 tsp lemon juice\n-optional: some vegan Worcestershire sauce\n-Salt, garlic powder and pepper to taste\n-1 teaspoon cashew parmesan\n-1 tbsp water\nMix well and then layer as follows: pasta, smoked tofu, veggies.\nCover and store in the fridge(up to 4 days).\nI served it with fried onions. 😋\n-\nVeganuary 10/25 🌱 \n25 Rezepte in unter 25mins: Caesar sesame Pasta Salat 🫙 \n\nHiermit wirst du dich ab jetzt noch mehr auf jede Mittagspause freuen! 😜\nREZEPT (3 Gläser, 20min Zubereitungszeit):\n-200g Nudeln\nIn Salzwasser kochen und abgießen.\n-200g Rüchertofu\n-1 kleine Gurke\n-120g Tomaten\n-2 Romanaherzen\nAlles klein schnippeln.\nDressing pro Glas:\n-1 El Tahini\n-1 Tl Gehackte Kapern\n-1/2 Tl Senf\n-1 Tl Ahornsirup\n-2 Tl Zitronensaft\n-optional: etwas vegane Worcestershire Sauce\n-Salz, Knoblauchpulver und Pfeffer nach Geschmack\n-1 Tl Cashewparmesan\n-1 El Wasser\nGut vermischen und dann im Glas folgendermaßen stapeln: Nudeln, Räuchertofu, Gemüse.\nAbdecken und im Kühlschrank aufbewahren (bis zu 4 Tage).\nIch hab ihn noch mit Röstzwiebeln serviert. 😋\n#veganuary #easyveganrecipes #easyrecipes #quickveganrecipes #mealprep #pastasalad #saladjar #saladrecipes", "owner": "Maya / plant-based food and recipes", "username": "fitgreenmind", "hashtags": ["saladjar", "saladrecipes", "mealprep", "pastasalad", "easyrecipes", "quickveganrecipes", "veganuary", "easyveganrecipes"], "user_tags": [], "collection": "Meals", "id": 135, "clean_title": "Veganuary 10/25"}, {"url": "https://www.instagram.com/reel/DB0crUaILGN/", "title": "דג טרי לא צריך הרבה כדי להפוך למנה מנצחת. קצת", "caption": "דג טרי לא צריך הרבה כדי להפוך למנה מנצחת. קצת\n מלח, קצת חריף, קצת ירוקים והרבה שמן זית טוב.\n\nלסשימי החתיך הזה:\n\n250 גר סשימי דג ים טרי - פארידה/ פלמידה/ אינטיאס/ טרחון\nעגבניית מגי בשלה \nמעט צ׳ילי גרוס \nמלח \nשמן זית טוב\nגרידה מלימון שלם\nחופן עירית קצוצה \nחופן עלי אורגנו/ זעתר טרי \n\nהכנה:\n\nמרוקנים לתוך קערה את הפנים של העגבנייה. \nמוסיפים מעט מלח וצ׳ילי ושמן זית בנדיבות. טורפים לרוטב אחיד וחלק.\nמנגבים את הדג היטב עם נייר סופג עבה, מסדרים יפה בצלחת וקודם כל ממליחים. \nיוצקים את שמן העגבניות ומתבלים עם גרידת לימון וירוקים. אפשר להוסיף גם נגיעות מיץ ליים/ לימון, פלפל חריף קצוץ. מגישים קר ומייד❤️", "owner": "דנה סידס | Createat by Danna Sides", "username": "dannasides", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 136, "clean_title": "דג טרי לא צריך הרבה כדי להפוך למנה מנצחת. קצת"}, {"url": "https://www.instagram.com/reel/DCNAxYkuRs5/", "title": "Mixed Fungi & Chestnuts Farfalle", "caption": "Mixed Fungi & Chestnuts Farfalle\n\nThis cozy pasta dish has a rich, earthy flavor, with chestnuts adding a warm, holiday vibe that complements the mushrooms perfectly. I used a mix of mushrooms for a deeper flavor, while thyme, butter, and white wine bring it all together in a comforting bowl of pasta.\n\n#cozypasta #holidayflavors #mushroomlover #vegetarianrecipes #pastalover \n\nMushroom chestnut pasta\nHoliday-inspired pasta\nCozy fall recipes\nComfort food pasta\nEasy recipe \nThyme and white wine pasta", "owner": "Yarin Danieli", "username": "yarindanieli", "hashtags": ["holidayflavors", "cozypasta", "vegetarianrecipes", "pastalover", "mushroomlover"], "user_tags": [], "collection": "Meals", "id": 137, "clean_title": "Mixed Fungi & Chestnuts Farfalle"}, {"url": "https://www.instagram.com/reel/DC4rttgRPDN/", "title": "Und hier das Rezept zum Abspeichern 🥰♥️", "caption": "Und hier das Rezept zum Abspeichern 🥰♥️\n\n5-Minuten-Reisnudeln mit Erdnusssauce und Brokkoli 🥦 \n\nDie Menge reicht für 1-2 Personen ♥️\n\nZutaten ☺️\n150g Reisnudeln \n150g Sprossenbrokkoli\n2 EL Erdnussmus \n2-3 EL Sojasauce \nSaft von 1/2 Zitrone \n5 Knoblauchzehen gehackt \n200ml Wasser (ggf. Etwas mehr) \n\nFür das Topping:\n1 Frühlingszwiebel (gehackt) \n1 Hand voll Erdnüsse (gerösteter und gesalzen) \nChiliöl\n\nZubereitung 🥰\n1. Alle Zutaten in eine Pfanne oder einen Topf geben. \n2. Auf Mittel-hoher-Stufe regelmäßig rühren bis die Zutaten weich sind. Ggf noch etwas mehr Wasser dazu geben.\n3. Nochmals mit Zitrone und Sojasauce abschmecken.\n4. Mit Erdnüssen, Frühlingszwiebeln und Chiliöl servieren.\n\nViel Spaß beim ausprobieren 🥰\n\nFolgt mir für weitere schnelle und gesunde Rezepte @fit_sophia_laetitia 🥰\n\n#erdnüsse #5minutenrezept #brokkoli #reisnudeln #onepot #einfacherezepte #schnellerezepte #gesundessen", "owner": "Sophia Löppert", "username": "fit_sophia_laetitia", "hashtags": ["erdnüsse", "brokkoli", "schnellerezepte", "onepot", "einfacherezepte", "gesundessen", "5minutenrezept", "reisnudeln"], "user_tags": [], "collection": "Meals", "id": 138, "clean_title": "Und hier das Rezept zum Abspeichern"}, {"url": "https://www.instagram.com/reel/DDAIFmSshnc/", "title": "פסטה בחמאת לימון, בזיליקום וצנוברים 🤩✨", "caption": "פסטה בחמאת לימון, בזיליקום וצנוברים 🤩✨\nסופר פשוטה והתוצאה חלומית!\n.\nמכניסים לבישול במים רותחים ומומלחים חצי קילו פסטה שאוהבים. במקביל, אל מחבת בחום בינוני - גבוה מוסיפים 2 כפות שמן זית ומטגנים 5 שיני שום, קצוצות דק. לאחר דקה של טיגון, כשהשום מקבל מעט צבע, מוסיפים פנימה 3 מצקות ממי הבישול העמילניים של הפסטה, יחד עם 300 גרם חמאה קרה, חתוכה לקוביות, גרידה משני לימון ושני חופני עלי בזיליקום טרי, קצוצים דק. מערבבים עד קבלת רוטב אחיד ומביאים לרתיחה עדינה, מתבלים במלח ובפלפל\n.\nכשהפסטה מבושלת כמעט עד הסוף מעבירים אותה אל תוך הרוטב ומבשלים בחום בינוני עוד 2-3 דקות, עד שהרוטב הופך קרמי ועוטף את הפסטה. במידת הצורך ניתן להוסיף עוד מעט ממי הבישול כדי לדלל את הרוטב. מגישים חם ומיד עם צנוברים קלויים והמון פרמזן מגורדת מעל, ובתיאבון!", "owner": "Dor Peleg | דור פלג", "username": "dor_peleg", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 139, "clean_title": "פסטה בחמאת לימון, בזיליקום וצנוברים"}, {"url": "https://www.instagram.com/reel/DC1iWUWoUIs/", "title": "⁨\t⁨\t⁨\t⁨\t⁨\t⁨\t״מנה חמה״", "caption": "⁨\t⁨\t⁨\t⁨\t⁨\t⁨\t״מנה חמה״\nבגרסה הביתית והמזינה,\nעם המון ירקות, טופו ואטריות🍜\n\nמתכון קל שמחזיק \nיומיים - שלושה \nומושלם לימי \nהחורף הקרים 🌧️\n\n*הכמות היא לצנצנת אחת\nניתן להכפיל כמויות* \n\n✨מתחילים בהכנת הירקות והטופו: \nחותכים וקוצצים\nכוס פטריות פורטובלו \nכוס פטריות שימג׳י\nכוס כרוב לבן\nחצי כוס עלי מנגולד\nרבע כוס בצל ירוק \n2-3 שיני שום קצוצות\nמעט ג׳ינג׳ר קצוץ\nחצי חבילת טופו \n(לפני הטיגון לייבש את הטופו היטב \nולערבב עם כף סויה)\n\nמטגנים יחד במחבת \nעם מעט שמן ל5-7 דקות\n\n:לרוטב✨\nנוסיף כף מיסו\nכף ג׳ינג׳ר קצוץ\n3 כפות רוטב סויה\n\n✨הרכבת הצנצנת:\nחשוב⚠️ משתמשים בצנצנת עם דופן כפולה ועמידה לחום.\n\nמתחילים עם הרוטב בתחתית,\nמוסיפים כוס פולי סויה (אדממה) קלופים,\nמעל מניחים את הירקות והטופו שהכנו,\nולבסוף מוסיפים רבע שקית אטריות שעועית ומעט צ׳ילי \nגרוס.\n\nאוטמים את הצנצנת היטב\nוכשרוצים לאכול מוסיפים \nמים חמים עד כיסוי מלא, \nמכסים ומחכים 5-7 דקות\nוקיבלתן ארוחה חמה ומזינה!\n\nתמיד רצוי להתאים \nאת הכמויות אלייך באופן אישי👌🏽\n\nשיהיה בתאבון😋\n\n#אורחחייםבריא #תזונה #תזונהנכונה #טעים #ארוחתצהריים #תזונאית #דיאטניתקלינית #תסמונתהשחלותהפוליציסטיות #שחלותפוליציסטיות #מתכוןקל #מתכוןבריא #מרק⁩⁩⁩⁩⁩⁩", "owner": "לאה אברהמוב | תזונאית קלינית לנשים | מתמחה בשחלות פוליציסטיות", "username": "leah_avrahamov", "hashtags": ["תסמונתהשחלותהפוליציסטיות", "שחלותפוליציסטיות", "ארוחתצהריים", "מרק", "דיאטניתקלינית", "תזונהנכונה", "אורחחייםבריא", "תזונה", "מתכוןקל", "תזונאית", "טעים", "מתכוןבריא"], "user_tags": [], "collection": "Meals", "id": 140, "clean_title": "״מנה חמה״"}, {"url": "https://www.instagram.com/reel/DCFDujAxniJ/", "title": "One-pan dinners ftw 🙌🏽 Creamy lemon garlic orzo with Salmon 🍋 Full recipe is on my site- link in bio 🫶🏼", "caption": "One-pan dinners ftw 🙌🏽 Creamy lemon garlic orzo with Salmon 🍋 Full recipe is on my site- link in bio 🫶🏼", "owner": "Sara l Nutrient Matters", "username": "nutrientmatters", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 141, "clean_title": "One-pan dinners ftw Creamy lemon garlic orzo with Salmon Full..."}, {"url": "https://www.instagram.com/p/DBnP-xSynnu/", "title": "Honey Butter Garlic Glazed Salmon Bites", "caption": "Honey Butter Garlic Glazed Salmon Bites\n\nIngredients:\n\n1 pound salmon fillets, skin removed, cut into bite-sized pieces\nSalt and pepper, to taste\n2 tablespoons butter\n3 cloves garlic, minced\n2 tablespoons honey\n1 tablespoon soy sauce\n1 tablespoon lemon juice\nChopped fresh parsley, for garnish (optional)\nSesame seeds, for garnish (optional)\n\nInstructions:\n\nSeason Salmon: Season the salmon pieces with salt and pepper to taste.\nPrepare Glaze: In a large skillet, melt the butter over medium heat. Add the minced garlic and cook for 1-2 minutes, or until fragrant. Stir in the honey, soy sauce, and lemon juice, and cook for another minute, stirring constantly, until the sauce is well combined and slightly thickened.\nCook Salmon: Add the salmon pieces to the skillet, arranging them in a single layer. Cook for 2-3 minutes on each side, or until the salmon is cooked through and flakes easily with a fork.\n\nGlaze Salmon: Spoon the honey butter garlic glaze over the salmon bites in the skillet, ensuring they are well coated.\nGarnish: Remove the skillet from the heat and transfer the glazed salmon bites to a serving plate. Garnish with chopped fresh parsley and sesame seeds, if desired.\nServe: Serve the honey butter garlic glazed salmon bites immediately, with rice, quinoa, or your favorite side dishes.", "owner": "Chef zouheir mokallalati", "username": "chef_zouheir", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 142, "clean_title": "Honey Butter Garlic Glazed Salmon Bites"}, {"url": "https://www.instagram.com/reel/C966kf5o4zZ/", "title": "⁨\tתפוחי אדמה אפוים מושלמים🥔🥔🥔", "caption": "⁨\tתפוחי אדמה אפוים מושלמים🥔🥔🥔\nקרנצ׳ים מבחוץ וסופר נימוחים מבפנים.\nכל זה בזכות מרכיב אחד קטן נוסף.\nתעקבו אחר המתכון.\n\nהמרכיבים\n1 ק״ג מיני תפוחי אדמה חצויים או תפוחי אדמה רגילים קלופים חתוכים לקוביות בינוניות\n1 כפית סודה חשתיה או אבקת אפייה\n1/3 כוס שמן זית\n1/4 כוס פטרוזילה קצוצה\nמלח\n\nההכנה\n1. בסיר גדול מרתחים את תפוחי האדמה מכוסים לגמרי מים. מוסיפים כפית סודה לשתיה וכפית מלח. מבשלים ברתיחה בינונית כ 12 דקות או עד שמתרככים אך לא מתפרקים.\n2. מחמממים תנור ל 220 מעלות טורבו.\n3. מסננים את תפוחי האדמה ומעבירים לתבנית. יוצקים שמן זית מעל וכפית מלח מערבבים היטב ומעבירים לתנור. \n4. אופים כ 40 דקות או עד שמזהיבים לגמרי.\n5. מוציאים ומערבבים עם פטרוזיליה ושמן מתחתית התבנית. \nthe ingredients \n1 kg of halved mini potatoes or regular peeled potatoes cut into medium cubes 1 teaspoon baking soda or baking powder 1/3 cup olive oil 1/4 cup chopped parsley salt 1. In a large pot, boil the potatoes completely covered with water. Add baking soda and a teaspoon of salt to the water. Cook at a medium boil for about 12 minutes or until softened but not falling apart. 2. Heat the oven to 220 degrees turbo. 3. Drain the potatoes and transfer to a pan. Pour olive oil on top and a teaspoon of salt, mix well and transfer to the oven. 4. Bake for about 40 minutes or until completely golden..\n#טעיםלי\n#שבתשלום\n#ירקות\n#potatorecipes \n#potatopotato \n#sides⁩", "owner": "מיכל לוי אלחלל🌟 michal levy alhalel", "username": "michi_blog", "hashtags": ["שבתשלום", "potatopotato", "טעיםלי", "sides", "potatorecipes", "ירקות"], "user_tags": [], "collection": "Meals", "id": 143, "clean_title": "תפוחי אדמה אפוים מושלמים"}, {"url": "https://www.instagram.com/reel/DBFlDtQqWTx/", "title": "MARRY ME SALMON RISONI ✨ Full recipe below...⁠", "caption": "MARRY ME SALMON RISONI ✨ Full recipe below...⁠\n⁠\nOur take on the viral ‘Marry Me’ pasta. We can absolutely see why there are so many versions of this out there! It’s so easy, bursting with flavor and is on the table in <20 minutes. ⁠\n⁠\nThe original recipe calls for chicken but we had salmon in the fridge so that’s what we went with. For the vegetarians, it’s also delicious as is! ⁠\n⁠\nHave your tried the Marry Me Chicken or Pasta? Let us know in the comments! 🤍⁠\n⁠\nIngredients ⁠\n- 2 tbsp extra virgin olive oil ⁠\n- 2 salmon fillets, skin off ⁠\n- 1 red onion, finely diced, we used a small onion ⁠\n- 3 garlic cloves, minced ⁠\n- ½ cup sundried tomatoes, chopped ⁠\n- 2 tbsp tomato paste⁠\n- ½ tsp chilli flakes⁠\n- ½ tsp dried Italian herbs ⁠\n- 1 cup risoni (orzo)⁠\n- 3 cups vegetable stock ⁠\n- 3 tbsp cream cheese, use coconut cream for dairy-free ⁠\n- 3 handfuls baby spinach, approximately 100g (3.5oz)⁠\n⁠\nTo serve:⁠\n- ½ lemon⁠\n- Chopped basil leaves ⁠\n- Parmesan cheese, optional⁠\n⁠\nMethod: ⁠\nHeat 1 tbsp extra virgin olive oil in a non-stick pan over medium-high heat. Season the salmon on both sides with sea salt and black pepper. Cook for 4 minutes on one side before flipping and cooking on 3-4 minutes on the other side. Remove from the pan and cover to keep warm. Cook time will depend on the size of your salmon fillets. ⁠\n⁠\nAdd the remaining olive oil to the pan along with the red onion and garlic. Sauté for 3-4 minutes before adding in the sundried tomatoes, chilli flakes and Italian herbs along with some sea salt and black pepper. ⁠\n⁠\nAdd the tomato paste, risoni and vegetable stock to the pan. Bring to the boil and then reduce the heat to a simmer for 10 minutes. Stir through the cream cheese and baby spinach and then remove from the pan. ⁠\n⁠\nAdd the salmon back to the pan. Garnish with chopped basil leaves, a squeeze of lemon juice and some grated parmesan cheese, if using. ⁠\n⁠\nTime to cook: 20⁠\nServes: 2-3⁠", "owner": "Jessica Sepel - JSHealth® 🧿🧿🧿", "username": "jshealth", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 144, "clean_title": "MARRY ME SALMON RISONI Full recipe below...⁠"}, {"url": "https://www.instagram.com/reel/DBGtCk8ofh7/", "title": "מתכון לפסטה ברוטב שמנת-ברוקולי🥦", "caption": "מתכון לפסטה ברוטב שמנת-ברוקולי🥦\nפרסום ממומן בשיתוף תנובה\n\nמה צריך?\n500 גרם פסטה לבחירתכם \nחבילת ברוקולי מוקפא של סנפרוסט (800 גרם)\n500 מ”ל שמנת להקצפה 38%\nרבע כוס שום קונפי (אפשר גם 2 שיני שום טרי)\nכפית מלח\nמעט פלפל לבן טחון ואגוז מוסקט\nכפית שטוחה פלפל שאטה גרוס (לא חובה)\nלהגשה-\n100 גרם פרמז’ן מגורד\nפרחי ברוקולי מוקפצים (לא חובה)\n\nאיך מכינים?\n-נבשל את הפסטה בהתאם להוראות היצרן ונשמור כוס ממי הבישול בצד.\n-נפשיר היטב את הברוקולי.\n-במעבד מזון נטחן את הברוקולי עם השמנת, השום והתבלינים.\n-שימו לב שבאמצעות סכין בעדינות אני מוריד חלק מפרחי הברוקולי הקטנים ומקפיץ אותם בשמן זית, מלח ופלפל כדי לקשט את המנה.\n-את הרוטב המוכן נחמן במחבת רחבה, נוסיף את הפסטה ונבשל כמה דקות עד לחיבור הרוטב עם הפסטה.\n-במידת הצורך ניתן לדלל עם מעט ממי הבישול של הפסטה.\n-נקשט בפרמז’ן מגורד ובפרחי הברוקולי שהקפצנו.\n-שימו לב, במידה והרוטב מרגיש לכם לא קרמי מספיק ניתן להוסיף עוד שמנת להקצפה ולהעשיר אותו.\n-לקבלת קרם ברוקולי מאוד קטיפתי ניתן לבשל את הברוקולי עם השמנת מראש, לצנן מעט ואז לטחון את זה לרוטב חלק.", "owner": "Tomer Umansky", "username": "tomerumansky", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 145, "clean_title": "מתכון לפסטה ברוטב שמנת-ברוקולי"}, {"url": "https://www.instagram.com/reel/DAdEg4ho7gS/", "title": "הכל התחיל משם:) שעות על גבי שעות (כנראה ימים במצטבר) של ישיבה מול הפס, שאלות והטרדות לטבחים מכאן ועד להודעה חדשה, כל זה ", "caption": "הכל התחיל משם:) שעות על גבי שעות (כנראה ימים במצטבר) של ישיבה מול הפס, שאלות והטרדות לטבחים מכאן ועד להודעה חדשה, כל זה הביאנו עד הלום:)\nלכל מי שטרם נחשף, המנה המלאזית, כנראה האהובה עליי ביותר מאותם הימים, תכינו ותהנו\n\nהמנה המלאזית\n\nלפסטו מלאזית\n\n2 כוסות בזיליקום\nכוס וחצי כוסברה\n1 כף גדושה קארי אדום (מאוד אוהבת לאחרונה את של mae ploy)\n1/2 כוס בוטנים מטוגניפ קלופים\n1/2 פחית קרם קוקוס\n2 שיני שום\n1 כפית ג׳ינג׳ר\n1/2 כפית סוכר\n1/4 כפית מלח\n\nלהקפצה:\n\n1 בצל לבן פרוס לרצועות\n1 גמבה קטנה פרוסה לרצועות דקות\n1 מלפפון (רק הקשה שלו) פרוס לרצועות דקות\n1 כוס נבטים\n1 חזה עוף בגריל פרוס לרצועות (מתבלת בשמן זית מלח פלפל ומכניסה לתנור על 180 מעלות לבערך 20 דק עד שהעוף עשוי לחלוטין)\n1/2 פחית קרם קוקוס\n\n3 חבילות אטריות חיטה מוכנות להקפצה - יש להשרות במים רותחים 2 דק, לשטוף ולסנן, להפריד את האטריות בעדינות עם הידיים \n\nלקישוט:\n\nפרחי כוסברה\nבוטנים מטוגנים כתושים\n\nהוראות הכנה:\n\nלטחון את כל מרכיבי הפסטו בבלנדר / מג׳ימיקס.\nנוסיף לווק שמן ניטראלי ואז את הבצל. נשפוך את מחצית קרם הקוקוס ונבשל את הבצל על אש בינונית דקה.\nנוסיף את הפסטו ונגביר אש, נערבב כמה שניות ונוסיף את שאר הירקות והעוף. נקפיץ ונוסיף גם את האטריות, נערבב היטב ונגיש לוהט עם חופן של כוסברה ובוטנים קצוצים.\n\nועכשין לטיפים!!\n\n*את הבצל לא צריך לצרוב. רק לבשל אותו מעט בקרם הקוקוס וזה נותן לו מתיקות שמאוד מאפיינת את המנה.\n*שימו לב לא לרכך את הירקות! כל הכיף זה שהם קראנצ׳יים ופרש. \n*חשוב להשתמש בבוטנים מטוגנים כי יש להם טעם שונה מהקלויים. אני מצאתי במכולת השכונתית, נמכר בשקית, אבל בטוחה שיש גם בפיצוציות או איפה שמוכרים פיצוחים.\n*המנה המקורית היא עם שמנת אבל אני תמיד חשבתי שזה קצת כבד ואהבתי את המתיקות של קרם הקוקוס, תמיד הייתי מבקשת שיכינו לי אותה ככה אבל אם אתם מעדיפים אחרת - מוזמנים להחליף את קרם הקוקוס בשמנת. \n*חשוב לעבוד על חום גבוה בווק אבל, אם הגעתם למצב שהנוזלים מתאדים והמנה מתייבשת, תנמיכו רגע אש, תוסיפו קצת קרם קוקוס או אפילו מעט מים, תגבירו קצת ותערבבו.\n*נשאר לכם במקרר ואתם רוצים לחמם מחדש?? הסוד לטעים הוא פשוט להוסיף קצת נוזלים ולהקפיץ שנית. לא במיקרו!\n\nתהנו ❤️\n#נודלס #מוקפץ #אסייתי", "owner": "דנה מויאל רייכר |  יוצרת תוכן | אוכל אסייתי בקלות", "username": "danareicher", "hashtags": ["נודלס", "אסייתי", "מוקפץ"], "user_tags": [], "collection": "Meals", "id": 146, "clean_title": "הכל התחיל משם:) שעות על גבי שעות (כנראה ימים במצטבר) של ישיבה..."}, {"url": "https://www.instagram.com/reel/DAdek9cMAst/", "title": "המתכון היחיד לסלמון שאתם צריכים לחג! שימו לב שאפשר גם פרווה♥️ שמרו מתכון:", "caption": "המתכון היחיד לסלמון שאתם צריכים לחג! שימו לב שאפשר גם פרווה♥️ שמרו מתכון:\n5-6 פילה סלמון ללא העור\nגרידה מחצי לימון\nמלח פלפל\nלמרינדה-\n2 כפות מיונז\nכף דבש\nכפית חרדל\n\nלרוטב:\nכפית שום כתוש\n250 מ״ל שמנת מתוקה/ צמחית \nגרידה מחצי לימון\nחופן עירית קצוצה \nמלח פלפל\n\nמגלגלים את פילה הסלמון לסטייק וקושרים עם חוט לבישול. מורחים את המרינדה, מפזרים גרידת לימון, מלח ופלפל לפי הטעם ומכניסים לתנור בתכנית גריל למשך 10 דק׳ או עד שהסלמון משחים מלמעלה אבל עדיין עסיסי. לרוטב: מטגנים שום כתוש ומוסיפים שמנת לבישול, גרידת לימון מלח ופלפל. נותנים לרוטב להסמיך ומוסיפים עירית קצוצה. מוזגים את הרוטב על הסלמון ומגישים עם תוספת, אני הגשתי עם ברוקולי מאודה וזה חלום", "owner": "Maayan Trudel | מתכונים קלים והחיים עצמם", "username": "maayan.shtrudel", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 147, "clean_title": "המתכון היחיד לסלמון שאתם צריכים לחג! שימו לב שאפשר גם פרווה️..."}, {"url": "https://www.instagram.com/reel/DARWposSZdd/", "title": "Green Goddess Pasta 🌱🍝", "caption": "Green Goddess Pasta 🌱🍝 \n\nSometimes you just need to eat an entire bag of spinach and this is the way to do it! Full recipe on my blog as always 🫶\n\nMacros per serve 💪 - makes 4 servings\n558 cals - 27P - 96C - 7F\n\nFull recipe on my website as always! \n\n#greengoddess #highprotein #veganrecipes #wfpb #vegandinnerideas", "owner": "Stephanie De Angelis", "username": "that.veganbabe", "hashtags": ["wfpb", "veganrecipes", "highprotein", "greengoddess", "vegandinnerideas"], "user_tags": [], "collection": "Meals", "id": 148, "clean_title": "Green Goddess Pasta"}, {"url": "https://www.instagram.com/reel/DAEnMuUSUR1/", "title": "Drunken noodles @brendan_pang", "caption": "Drunken noodles @brendan_pang \n\n#drunkennoodles #noodles #explorepage #explore #explorepage✨ #foodie #foodstagram #food #foodlover #instagramreels #reels #foodblogger #food #foodie #foodstagram", "owner": "FoodieWithKay", "username": "foodiewithkay", "hashtags": ["explorepage✨", "instagramreels", "noodles", "explorepage", "foodlover", "reels", "foodstagram", "drunkennoodles", "explore", "foodblogger", "food", "foodie"], "user_tags": [], "collection": "Meals", "id": 149, "clean_title": "Drunken noodles"}, {"url": "https://www.instagram.com/reel/C_s-haWMA3M/", "title": "Thai Red Butterbean Curry", "caption": "Thai Red Butterbean Curry\n.\n.\n.\nINGREDIENTS:\n1 handful of cauliflower florets \n1 drained tin of butter beans \n1 large handful of spinach \n1 tin of coconut milk \n1 tbsp of red Thai curry paste \n.\nMETHOD:\nAdd the cauliflower, butter beans, curry paste and coconut milk to a large lidded saucepan and simmer on a low heat for 15 minutes (or until the cauliflower is soft but not mushy).\nThen turn off the heat, add the spinach and pop the lid on for 5 minutes to allow the spinach to wilt.\nGive it a good mix, season if you wish and that’s it!\n.\nServe!\n.\n.\n.\n.\n.\n#curry #vegancurry #vegetariancurry #veganmeals #onepotmeal #onepotrecipe #veganonabudget #budgetfriendly #budgetmeals #cheapea , enchilada sauce, and tortillas.\n\n>> Comment SKILLET and I’ll send you a link to the recipe in your DMs!✨\n\nFor more fiber, I like to include a few veggies like chopped zucchini and peppers. Top with fresh avocado and cilantro to serve. Our family loves this one!\n\n#dietitiandebbie #veganrecipe #onepotdinner #enchiladaskillet #30minmeal #dietitiandeats #vegandinnerideas #vegandinner", "owner": "Deborah Murphy MS, RD | Plant-Based Recipes", "username": "dietitiandebbie", "hashtags": ["30minmeal", "vegandinner", "enchiladaskillet", "onepotdinner", "dietitiandeats", "dietitiandebbie", "veganrecipe", "vegandinnerideas"], "user_tags": [], "collection": "Meals", "id": 152, "clean_title": "I’ve got another easy one pot weeknight meal for you. Spice up..."}, {"url": "https://www.instagram.com/reel/C_JJTRBvpDf/", "title": "ROASTED CORN QUINOA SALAD", "caption": "ROASTED CORN QUINOA SALAD\n\nthis is a great lunch or side dish to close out the summer 👏🏻 \n\nit pairs great with grilled chicken or steak and can be enjoyed cold making it a great healthy desk lunch option! full recipe is below 👇🏻 \n\ningredients:\n1 cup quinoa (measured uncooked)\n1 orange bell pepper, diced \n1/2 small red onion, diced\n1/3 cup corn, grilled or canned \n1/4 cup fresh mint, finely chopped\n1/4 cup fresh basil, finely chopped \n3 tbsp sunflower seeds\n1/4 cup feta cheese\n1/4 cup olive oil\nJuice of 1 small lime \n2 tbsp rice vinegar \n1 tbsp honey \n1 garlic cloves, minced \n1 tsp cumin\nSalt, to taste \nPepper, to taste \n\nInstructions:\n1. Prepare one cup of quinoa according to package instructions. \n2. Prepare the dressing. Combine 1/4 cup olive oil, lime juice, 2 tbsp rice vinegar, 1 tbsp honey, garlic, 1 tsp cumin, salt, and pepper. \n3. Once the quinoa is cooked and has cooled a bit, add it to a large bowl. \n4. In the large bowl of quinoa, add bell pepper, red onion, corn, mint, basil, sunflower seeds, and feta cheese. season with salt and pepper and toss to combine. \n5. Serve immediately or serve chilled and enjoy! Note: it’s great topped with avocado and grilled chicken. \n\n#desklunch #makeaheadlunch #healthylunch #lunchideas #healthylunchideas #quinoasalad #quinoa #easylunch #mealprep #mealpreplunch", "owner": "Mary Alexander Satterfield", "username": "ma.satterfield", "hashtags": ["quinoa", "healthylunchideas", "mealpreplunch", "mealprep", "healthylunch", "desklunch", "easylunch", "makeaheadlunch", "quinoasalad", "lunchideas"], "user_tags": [], "collection": "Meals", "id": 153, "clean_title": "ROASTED CORN QUINOA SALAD"}, {"url": "https://www.instagram.com/reel/C9ApkJeCP2g/", "title": "Get the recipe for our Hasselback Teriyaki Tofu Steaks EXCLUSIVELY in the @sovegan app 🔥", "caption": "Get the recipe for our Hasselback Teriyaki Tofu Steaks EXCLUSIVELY in the @sovegan app 🔥\n\nSlicing grooves into the tofu helps it absorb wayyy more flavour while it’s cooking. It’s a simple technique which takes these unbelievable teriyaki-flavoured tofu steaks to the next level 😋\n\nThis dish is also packed with a generous 34g of protein per serving 💪\n\nYou’ll find the full recipe EXCLUSIVELY in the SO VEGAN App! If you haven’t already, start your 7-day free trial to unlock over 400 delicious and fuss-free vegan recipes.\n\nFollow the link in our bio to download the app today 🙏\n\nBig love, Roxy + Ben 💚", "owner": "Roxy Pope + Ben Pook", "username": "roxyandben", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 154, "clean_title": "Get the recipe for our Hasselback Teriyaki Tofu Steaks..."}, {"url": "https://www.instagram.com/reel/C-2rwjBA8t0/", "title": "Cream Stew 🥣", "caption": "Cream Stew 🥣 \nInspr Arrietty Movie 🥦\n.\n.\n#ghiblifood #ghiblimovies #creamsteaw #arriettyfood #aestheticfood", "owner": "다시 한번 | 𝙝𝙤𝙢𝙚 𝙘𝙖𝙛𝙚 𝙢𝙖𝙠𝙚𝙧 🎬", "username": "dasihanbonn", "hashtags": ["arriettyfood", "ghiblifood", "creamsteaw", "aestheticfood", "ghiblimovies"], "user_tags": [], "collection": "Meals", "id": 155, "clean_title": "Cream Stew"}, {"url": "https://www.instagram.com/reel/C_VvcHdN4YJ/", "title": "טבחה בסלק עם קוסקוס 💚", "caption": "טבחה בסלק עם קוסקוס 💚\n\n2 חבילות מנגולד \nקילו בשר מספר 5 חתוך לקוביות\n2 תפוחי אדמה חתוכים לקוביות\n5 בצלי שאלוט קצוצים\nבצל לבן קצוץ\n5 שיני שום קצוצות\nחומוסים / שעועית לבנה (אפשר קפוא)\nביצים (לפי כמות האנשים) \nמח עצם + ערמונים - רצוי אבל לא חובה\n\n-מתחילים בלהפריד את הגבעול מעלי המנגולד. נשארים רק עם החלק הירוק. \n-קוצצים את העלים, מחממים מחבת עם שמן זית וצורבים את העלים יחד עם הבצלים והשום. מוסיפים כפית של מלח ומבשלים עד שהכל משחים. מנמיכים את האש לאש בינונית ומוסיפים רבע כוס מים, כשהמים מתאדים מערבבים ומוסיפים עוד רבע כוס מים וכן הלאה עד שהכל מתאחד ומתרכך לגמרי. מעבירים למעבד מזון וטוחנים עד למרקם חלק.\n- מטגנים את תפוחי האדמה במחבת עם שמן זית משני הצדדים עד להשחמה\n- צורבים את הבשר מכל הכיוונים עד להשחמה.\n- מבשלים בסיר נוסף את הביצים לפני שמכניסים לתבשיל.\n\nמתחילים לסדר בסיר גדול-\nתפוחי אדמה, בשר, חומוסים / שעועית, ערמונים, התערובת של המנגולד, מים עד לכיסוי מלא של הבשר, מוסיפים כף וחצי של מלח ומערבבים. מניחים את הביצים ומח העצם ומכסים בנייר אפייה, יוצרים בו חור באמצע, מכסים עם מכסה ומביאים לרתיחה על אש גבוהה. \nמעבירים לתנור שחומם מראש על 180 למשך 3 שעות. \n\nלקוסקוס במיקרו לקחתי מהאינטרנט אבל שיניתי קצת: \n2 כוסות סולת\nשליש כוס שמן זית (אפשר גם רגיל)\nחצי כף מלח\n\nבקערה שתכנס למיקרו מכניסים את כל המרכיבים ומחממים במיקרו ל-3 דקות\nמוציאים, מערבבים, מוסיפים חצי כוס מים ומכניסים לעוד 3 דקות במיקרו.\nמוציאים, מערבבים טוב, מוסיפים עוד חצי כוס מים ולעוד 3 דקות במיקרו.\nפעם אחרונה - מוציאים, מערבבים, מוסיפים עוד חצי כוס מים ולעוד 3 דקות במיקרו\nמוציאים, מערבבים משאירים בצד למשך רבע שעה להתקרר. מסננים דרך נפה קוסקוס או במסננת לא צפופה.", "owner": "Gil Hacmon", "username": "gilhacmon", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 156, "clean_title": "טבחה בסלק עם קוסקוס"}, {"url": "https://www.instagram.com/reel/C_U1U3koYAZ/", "title": "כל מי שטעמ.ה את הסלט הזה שאל.ה אותי אחרי הביס הראשון - נושקה, מה יש ברוטב? אז בואו ואספר לכן.ם משהו, הסוד הוא כזה - אין ", "caption": "כל מי שטעמ.ה את הסלט הזה שאל.ה אותי אחרי הביס הראשון - נושקה, מה יש ברוטב? אז בואו ואספר לכן.ם משהו, הסוד הוא כזה - אין בסלט הזה רוטב מיוחד. רק שמן זית איכותי, לימון, מלח ופלפל, ממש כמו בסלט ירקות רגיל, אבל זה ממש לא מרגיש ככה.\nשילוב הטעמים המופלא בין החרפרפוּת העדינה של הרוקט, החריפות הניכרת של הבצל והמתיקות והרכות של הסלק יוצר סלט טעים ומרשים שיקצור את כל המחמאות על השולחן. הנוזלים שהסלק מגיר לאחר התיבול יוצרים תחושה וטעם של רוטב עשיר ומתקתק. זה הבסיס, עם המרכיבים הנוספים אפשר לשחק, את הגבינות והאגוזים תמיד אפשר להמיר במה שיש לכן.ם בבית.\nסלק בואקום נשמר במקרר המון זמן ובצל תמיד יש, כך שלמעשה הדבר היחיד שבאמת צריך לדאוג לו זה עלי רוקט טריים.\nתכינו אותו, מילה של נושקה, לא תצטערו.\n\nחומרי גלם -\n1 חבילה סלק בואקום\n200 גרם עלי רוקט\n1 בצל סגול \n3 כפות צלפים\n200 גרם פטה\nשמן זית\nמיץ מלימון שלם\nמלח\nפלפל\nחופן אגוזי מלך שלמים \n\nחותכים את הסלק לרצועות דקות ואת עלי הרוקט חותכים פעמיים, לשלושה חלקים. את הבצל הסגול פורסים לפרוסות דקות.\nמערבבים את כל החומרים ומתבלים, מוסיפים 2 כפות צלפים ומערבבים. מפזרים מעל פטה מגוררת, אגוזי מלך (אפשר מעט לקלות אותם) וכף נוספת של צלפים.\nמגישים לשולחן וזוללים בהנאה עם א.נשים שאוהבים ומתפללים לימים טובים ולשיבת כל החטופות והחטופים, 107 א.נשים ילדים וטף שעדיין נמצאים בעזה.\n\nצלחת קרמיקה @rinatbarnetser \n\n#salad #vegeterian #healthyfood", "owner": "נוֹשקה | NOSHKA", "username": "___noshka___", "hashtags": ["salad", "vegeterian", "healthyfood"], "user_tags": [], "collection": "Meals", "id": 157, "clean_title": "כל מי שטעמ.ה את הסלט הזה שאל.ה אותי אחרי הביס הראשון - נושקה, מה..."}, {"url": "https://www.instagram.com/reel/C-pABurorok/", "title": "קיץ זו ה-עונה לסלטים. רב הסלטים שלנו עשויים ירקות חיים, אבל כשיש קצת זמן אני מאוד אוהבת להרכיב מנות סלט מיוחדות מירקות צ", "caption": "קיץ זו ה-עונה לסלטים. רב הסלטים שלנו עשויים ירקות חיים, אבל כשיש קצת זמן אני מאוד אוהבת להרכיב מנות סלט מיוחדות מירקות צלויים. בשילוב עם גבינה המנה תמיד תהיה טעימה יותר ומרעננת, ובתוספת קטניה סגרנו ארוחה של ממש, טעימה, משביעה ומיוחדת.\n\ stagram.com/reel/C-98mmkyQLn/", "title": "Life-changing harissa carrots and chickpeas with yogurt and feta 🥕", "caption": "Life-changing harissa carrots and chickpeas with yogurt and feta 🥕 \nCre by @gatherednutrition\nFor the carrots:\n6 large carrots, sliced in half lengthwise\n2 tbsp olive oil\n1 tbsp honey\n1/4 tsp garlic powder\n1/4 tsp smoked paprika\nSalt, to taste\n\nFor the chickpeas:\n1 jar/can of chickpeas\n2 tbsp harissa sauce\n1 tbsp olive oil\nSalt + pepper\n\nFor serving:\n1/2 cup plain greek yogurt\n2-3 oz feta\n1 tbsp fresh parsley, chopped\n1-2 tbsp tahini\nChili-infused olive oil\n\n1. Preheat oven to 400 and line a large baking sheet with parchment paper. Add your carrots and toss with the olive oil, honey, garlic powder, smoked paprika, and a generous pinch of salt. Bake for 15 minutes.\n2. Meanwhile, drain and rinse your chickpeas. Pat dry with a clean kitchen towel, then toss in a bowl with the harissa, olive oil, and salt and pepper.\n3. After 15 minutes, flip all the carrots over and move to one side of the pan. Spread the chickpeas out on the other side. Bake for 20-25 minutes.\n4. Allow carrots and chickpeas to cool for 5-10 minutes. Spread yogurt out on serving dish, then add carrots, chickpeas, and remaining toppings. Serve and enjoy!", "owner": "Mediterranean Diet Plan 🇺🇸", "username": "mediterranean.diet.plan", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 163, "clean_title": "Life-changing harissa carrots and chickpeas with yogurt and feta"}, {"url": "https://www.instagram.com/reel/C-YKHW5MB98/", "title": "כל מי שהיה בברזיל חייב להכיר את המתכון הבא, מתכון שבברזיל קוראים לו לחם מגבינה, וזה המתכון האהוב עליי בעולם! אז כל מי שה", "caption": "כל מי שהיה בברזיל חייב להכיר את המתכון הבא, מתכון שבברזיל קוראים לו לחם מגבינה, וזה המתכון האהוב עליי בעולם! אז כל מי שהיה בברזיל יודה לי אחרכ 🇧🇷תהנו ואל תשכחו לעדכן איך יצא 😜\n.\n .\nמצרכים:\n1. 200 גרם קמח טפיוקה (2 כוסות)\n2. 140 גרם גבינה צהובה מגורדת 15% (2 כוסות)\n3. 70 גרם פרמזן (כוס)\n4. 2 קופסאות סימפוניה 400 סה״כ\n5. כפית מלח. \n.\nאופן ההכנה:\n1. נחמם תנור ל180 מעלות.\n2. בקערה נשים את כל המצרכים יחד ונערבב עד לקבלת תערובת אחידה (אפשר להוסיף כפית מלח).\n3. נחלק את התערובת לכדורים.(אם יוצא לכם יבש מדי אפשר להוסיף 2 כפות חלב).\n4. נניח את הכדורים בתבנית, נכניס לתנור למשך 10 דקות בחימום עליון תחתון ואז עוד 10 דקות בתכנית טורבו גריל (כמובן לעקוב ולראות שלא נשרף).\n5. וזהו מוכןן.\n.\n.\nערכים תזונתיים ליחידה:\n✔️ אנרגיה- 101 קלוריות.\n✔️ חלבון- 5.9 גרם.\n✔️ פחמימה - 11.2 גרם.\n✔️ שומן- 3.3 גרם.\n.\nערכים תזונתיים לכל הכמות (יצא לי 18 יחידות):\n✔️ אנרגיה- 1819 קלוריות.\n✔️ חלבון - 107 גרם.\n✔️פחמימה - 203.4 גרם.\n✔️ שומן - 61 גרם.\n.\n.", "owner": "שני קמילה כהן | תזונאית קלינית | אימונים בקבוצות באשקלון", "username": "shanicamila.fit", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 164, "clean_title": "כל מי שהיה בברזיל חייב להכיר את המתכון הבא, מתכון שבברזיל קוראים..."}, {"url": "https://www.instagram.com/reel/C-uE2LXy01-/", "title": "crispy chickpea, roasted cauliflower and pumpkin salad ✨", "caption": "crispy chickpea, roasted cauliflower and pumpkin salad ✨\n\nMy favourite way to eat roasted veggies is in salads and this one is absolutely loaded with all the goods!! It has so many delicious flavours and textures, and makes for a fabulous light meal or side dish 🤤\n\nINGREDIENTS\n\nRocket \nFeta \n\nRoasted cauliflower and pumpkin:\n1/4 of a small pumpkin \n1/2 of a small cauliflower \nDrizzle of olive oil\nSalt\nGarlic powder \nOnion powder \nPaprika \n\n— Bake at 200°c for 35-40 mins or until golden brown\n\nCrispy chickpeas:\n1 can of chickpeas (rinsed/drained) \nDrizzle of olive oil\nSalt\nGarlic powder \nOnion powder \nPaprika \n\n— Bake at 200°c for 25-30 minutes or until crispy. \n\nCous cous \n1 cup pearl couscous \n1 cup vegetable stock\n\n— Cook as per directions \n\nDressing:\n3tbsp olive oil\n1tbsp honey\n1tbsp Dijon mustard \nJuice of 1 lemon\n1tsp minced garlic\nSalt\n\nAdd everything into a large salad bowl. Mix, serve and enjoy! \n\n#salads #salad #saladsofinstagram #saladrecipe #saladrecipes #saladrecipe #healthysalad #sidedish #saladideas #healthyrecipes", "owner": "Kirrily Edwards", "username": "kizactivelife", "hashtags": ["sidedish", "saladrecipe", "salads", "salad", "saladrecipes", "healthyrecipes", "healthysalad", "saladideas", "saladsofinstagram"], "user_tags": [], "collection": "Meals", "id": 165, "clean_title": "crispy chickpea, roasted cauliflower and pumpkin salad"}, {"url": "https://www.instagram.com/reel/C9hxLtKuFXy/", "title": "Cette collation c’est une addiction !!! 🫠", "caption": "Cette collation c’est une addiction !!! 🫠\n\nLes ingrédients : \n• 2 pommes 🍎 \n• 120g de chocolat noir 🍫\n• beurre de cacahuète 🥜 \n• cacahuètes non salées 🥜\n• cranberries séchées 💞\n\nLes étapes : \n1. Couper en rondelles les pommes 🍎\n2. Faire fondre le chocolat au bain marie 🍫\n3. Enrober les pommes de chocolat ✨\n4. Y déposer du beurre de cacahuète 🥜\n5. Puis mettre des cacahuètes et des cranberries séchées 💞\n6. Mettre le tout au frigo pendant 30 minutes ❄️\n7. Bon appétit ! 🤤", "owner": "Elina Rouillé", "username": "elinarlle", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 166, "clean_title": "Cette collation c’est une addiction"}, {"url": "https://www.instagram.com/reel/C-ptJj4Ko8l/", "title": "The viral cucumber salad, now in the high protein version🥒🌶️", "caption": "The viral cucumber salad, now in the high protein version🥒🌶️\nFor the full recipe go to itsvegansis.com - link in bio! \n\nI was inspired by @logansfewd to make this salad and now I’m obsesseddd \nIt’s ready in under 5 minutes & each serving packs around 30 grams of protein, making it the perfect snack to help you reach your protein goals💪\n\n#cucumber #cucumbersalad #salad #tofu #highprotein", "owner": "Ma’ayan Moss", "username": "itsvegansis", "hashtags": ["cucumber", "cucumbersalad", "salad", "highprotein", "tofu"], "user_tags": [], "collection": "Meals", "id": 167, "clean_title": "
