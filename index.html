ים.\n\nבצנצנת קטנה מערבבים את כל חומרי הרוטב.\nמערבבים את כל חומרי הסלט.\nסמוך להגשה מוזגים רוטב (לא את הכל - רק כמה שצריך).", "owner": "Efrat Lichtenstadt", "username": "lichtenstadt", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 169, "clean_title": "סלט שהוא ארוחה! סלט חסה עם פסטה ושעועית ועוד מלא דברים טעימים"}, {"url": "https://www.instagram.com/reel/C-zVzugIAp-/", "title": "SPINACH BASIL PASTA", "caption": "SPINACH BASIL PASTA\n\nProtein per serve: 41g\nFibre per serve: 14g\n\nJust a reminder that you can pre-order my book (link in bio) ‘Plant Protein’ for 80+ delicious high-protein, plant-based recipes!\n\nINGREDIENTS (serves 2)\n100g (3.5 oz) fresh baby spinach\nHandful of fresh basil leaves \n200g (7 oz) firm tofu, drained\n4 Tbsp nutritional yeast\n15g (0.5 oz) sunflower seeds\nPinch of salt\nDrizzle of extra virgin olive oil\n200-220 g (7-8 oz) lentil rigatoni\nToppings\nHemp seeds\nChilli flakes\nOlive oil\n\nMETHOD\nStart by cooking the pasta in abundant salted water.\nTo a blender, add spinach, basil, tofu, nutritional yeast, sunflower seeds, salt, and oil to taste, along with ½ ladle of pasta cooking water. Blend until smooth.\nDrain the pasta and combine with the sauce. Feel free to add more pasta water to adjust the creaminess of the sauce to your liking. Serve topped with hemp seeds, chilli flakes and a drizzle of olive oil\n\nNote to all my US friends: Due to high demand, I’ve added US measurements, but they are calculated from the internet and might not be totally accurate. I suggest using a scale for best results :) Macros for 1 serving: Kcal: 568 | Carbs: 68g | Fat: 13g | Protein: 41g | Fibre: 14g\n#highproteinmeals #plantprotein #highproteindiet #plantbased #plantbasedfood #veganuary #pastarecipes #quickpasta", "owner": "Gigi Grassia | quick protein-packed vegan recipes", "username": "gigi_goes_vegan", "hashtags": ["plantbased", "plantbasedfood", "highproteindiet", "highproteinmeals", "plantprotein", "pastarecipes", "quickpasta", "veganuary"], "user_tags": [], "collection": "Meals", "id": 170, "clean_title": "SPINACH BASIL PASTA"}, {"url": "https://www.instagram.com/reel/C-Xj1QnIXKH/", "title": "תפוחי אדמה קריספיים עם הר של גבינה בולגרית 🥔", "caption": "תפוחי אדמה קריספיים עם הר של גבינה בולגרית 🥔\n\nגם היום אני חוזר קצת למקורות ומי שלא מכיר אז תתניעו כבר את הרכב לכיוון הגמברינוס באשדוד. \nזה מעין פאב מסעדה כזה עם אותו תפריט כבר 20 שנה לפחות ויש להם את הצ׳יפס בולגרית הכי טעים שיש אז ניסיתי לעשות לזה את הגרסה שלי עם תפוחי אדמה קריספיים בשום פטרוזיליה ומעל הכל כמות בלתי נגמרת של גבינה בולגרית!\n\nמתכון \nתפוחי אדמה\nסודה לשתייה \nמלח\n\n2 שיני שום\n3 כפות שמן זית\nכפית פפריקה\nכפית מלח\n\nגבינה בולגרית\n\nנחמם תנור ל220 מעלות טורבו\nנחתוך את תפוחי האדמה לקוביות ונשים בסיר עם מים קרים סודה לשתייה ומלח ונביא לרתיחה עד תפוחי האדמה רכים אבל לא מדי. \n\nנסנן את המים ונשקשק את תפוחי האדמה בסיר כדי שיווצר מעין שכבה כזו כמו בסרטון שהיא מה שייתן את הקריספיות באפייה. \nנעביר לתבנית עם שמן זית ומלח ונכניס לתנור ל20-25 דקות נוציא ונערבב ונחזיר שוב עד שחום וקריספי\n\nבקערה הכתוש את השום נוסיף פטרוזיליה קצוצה, שמן זית מלח ופפריקה ונערבב. \n\nנוסיף את תפוחי האדמה נערבב טוב ומגרד מעל הרבה הרבה גבינה בולגרית! \n\nבתיאבון 🤎🤎\n\n#food #crispypotatoes #yummy", "owner": "Itai Dagan | איתי דגן", "username": "itaidagan", "hashtags": ["yummy", "crispypotatoes", "food"], "user_tags": [], "collection": "Meals", "id": 171, "clean_title": "תפוחי אדמה קריספיים עם הר של גבינה בולגרית"}, {"url": "https://www.instagram.com/reel/C7uf6kFSV3D/", "title": "Salmon Bowl ✨🍣", "caption": "Salmon Bowl ✨🍣\n- white rice\n- cucumber\n- edamame\n- avocado\n- pan-seared salmon\n- fermented ginger carrots\n- sriracha\n- sesame seeds \n\n✨follow me for more recipes ✨\n.\n.\n.\n.\n#breakfastrecipes #avocado #healthybreakfast #healthyfood #healthyeats #lunchideas #breakfastideas #healthydessert #healthybalance #healthyrecipes #healthylife #recipeoftheday #recipeshare #recipeideas #springvibes #avocadorecipes #bayarea #sanfrancisco #healthyfood #healthyrecipes #m#salmonrecipe #dinner #lunch", "owner": "Ferihan Hercan", "username": "studiobyferi", "hashtags": ["recipeideas", "sanfrancisco", "healthylife", "breakfastrecipes", "healthyrecipes", "healthybalance", "recipeshare", "healthybreakfast", "avocado", "recipeoftheday", "healthyeats", "healthyfood", "m", "healthydessert", "avocadorecipes", "lunchideas", "springvibes", "breakfastideas", "bayarea", "dinner", "lunch", "salmonrecipe"], "user_tags": [], "collection": "Meals", "id": 172, "clean_title": "Salmon Bowl"}, {"url": "https://www.instagram.com/reel/C-Fxzg3y-56/", "title": "Easy nourish bowl👇🏼🌿 Crunchy butter beans, roasted sweet potato, red onion and kale on a bed of creamy tahini! If you di", "caption": "Easy nourish bowl👇🏼🌿 Crunchy butter beans, roasted sweet potato, red onion and kale on a bed of creamy tahini! If you dislike kale, try this method of massaging it with lemon/oil to make it more tender and easier to digest.\n\nIf you haven’t checked out my previous nourish bowl recipes, save this video for later and go watch! Don’t forget to follow @tessbegg for more recipes.\n\nServes 2\n\nBeans:\n2 cups of canned butter beans, drained and rinsed\nDrizzle of olive oil\n1 tsp garlic powder\nPinch of salt and pepper\n\nSweet potato:\n2 medium sweet potatoes, peeled and diced\nDrizzle of olive oil\nPinch of salt and pepper\n1/2 tbsp smoked paprika\n\nKale:\n2 cups finely chopped kale\n1/2 lemon, juiced\n1-2 tsp olive oil\nPinch of salt\n\nOther:\n1/4 red onion, sliced\nTahini dip or hummus dip (to make your own tahini dip, blend hulled tahini with lemon juice, dash of maple syrup, salt and enough water to make it creamy)\nSesame seeds\nAvocado, pomegranate, cucumber are also great in this\n\nPreheat oven to 200°C/390°F. Add the sweet potato on a baking tray and add the olive oil, salt, pepper and paprika. Toss to coat. \n\nAdd the butter beans to a separate baking tray and add the oil, salt, pepper and garlic powder. Toss to coat.\n\nPlace both trays in the oven (sweet potatoes on top rack) and bake for 35 minutes or until golden.\n\nIn the meantime, add the kale to a bowl along with the lemon juice, olive oil and salt. Massage the kale with clean hands to soften it.\n\nWhen the potatoes and beans are ready, add the tahini or hummus in the bottom of the bowls, then top with kale, potatoes, beans, more kale, red onion and sesame seeds. Enjoy!\n\n#vegan #plantbased #asmrfood #veganfood #veganrecipes #easyrecipes #salad #healthyrecipes", "owner": "Tess Begg", "username": "tessbegg", "hashtags": ["veganfood", "plantbased", "salad", "asmrfood", "healthyrecipes", "veganrecipes", "vegan", "easyrecipes"], "user_tags": [], "collection": "Meals", "id": 173, "clean_title": "Easy nourish bowl Crunchy butter beans, roasted sweet potato,..."}, {"url": "https://www.instagram.com/reel/C-Ej9jQts0f/", "title": "crispy sesame salmon bites 🔥", "caption": "crispy sesame salmon bites 🔥\nBy @lifemadesweeter\n✨ingredients \n▫️1lb salmon fillet, skin removed + cut into cubes\n▫️season with 1/2 tsp garlic powder + 1/4 tsp ground ginger + kosher / coarse sea salt + black pepper (to taste)\n\n✨sauce:\nwhisk together \n▫️1/4 cup coconut aminos (can also sub with gluten-free tamari or low-sodium sauce if you’re not gluten-free)\n▫️3 tbsp honey, maple syrup or preferred sticky liquid sweetener\n▫️1 tsp toasted sesame oil (adds a hint of nuttiness - can omit if preferred or sub with 1/2 tsp tahini or even 1/4 tsp creamy almond butter)\n▫️1-2 tsp Sriracha , or preferred hot sauce, to taste or omit if sensitive to spice\n▫️1 tsp rice wine vinegar or 1/2 tsp apple cider vinegar \n\n✨marinate salmon for 20 mins.\n\n✨air fry at 390F 6-8 mins (or until crispy + golden shaking / flipping halfway through)\nOR \n▫️bake on lined baking sheet in oven at 415F 10-12 mins (or until crispy + golden flipping halfway through)\n\n✨serve over: \n▫️ cooked Jasmine rice, cauliflower rice (for Whole30), hearts of palm rice or preferred rice of choice \n▫️sliced avocado\n▫️shelled heated edamame\n▫️sliced cucumber \n▫️shredded / grated carrots\n✨garnish: green onions + sesame seeds \n\nFull recipe on the blog ➡️ clickable link in bio @lifemadesweeter or type https://lifemadesweeter.com/air-fryer-salmon-bites/  into your web-browser or search “air fryer salmon bites” in the search 🔎bar on our site (also clickable link in story + reels highlights) or google “lifemadesweeter air fryer salmon bites”\n\n#salmon #salmonbites #crispysalmon #airfryersalmon #bakedsalmon #healthydinner #healthylunch #salmonbowl #salmondinner #salmonlunch  #glutenfree #healthyrecipes #salmonrecipe", "owner": "Healthy Recipes", "username": "fithealthyrecipes", "hashtags": ["healthydinner", "salmon", "salmonbites", "airfryersalmon", "salmonbowl", "healthyrecipes", "bakedsalmon", "healthylunch", "glutenfree", "salmondinner", "salmonrecipe", "salmonlunch", "crispysalmon"], "user_tags": [], "collection": "Meals", "id": 174, "clean_title": "crispy sesame salmon bites"}, {"url": "https://www.instagram.com/reel/C9y_tbeI9bR/", "title": "הסוד שלי לכרוב בתנור ✨", "caption": "הסוד שלי לכרוב בתנור ✨\nתקשיבו לא משנה כמה מאפים יש על השולחן\nבבראנצ׳ים שאני מכינה, כרוב בתנור זה \nתמיד הדבר הראשון שיבקשו בשבילו מתכון\n\nאז שימו לב לשלושת הדגשים שהופכים אותו למושלם:\n1. לחתוך את הכרוב דק - ככה הוא מתרכך מהר \nונהיה ממש חמאתי\n2. לפזר שמן זית בנדיבות - אם לא הוא יוצא יבש וזה ממש לא אותו הדבר. וגם בעיניי להוסיף רק מלח גס - הטעם של הכרוב מושלם ככה ובאמת שלא צריך עוד תבלינים\n3. לאפות על 200 מעלות סטטי - ככה הוא גם מצליח להתרכך וגם לקבל השחמה יפה \n\nיש לכן עוד טיפים?😍", "owner": "דניאל וגנר | Cheffa", "username": "danielle_cheffa", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 175, "clean_title": "הסוד שלי לכרוב בתנור"}, {"url": "https://www.instagram.com/reel/C6MPTWdKOXZ/", "title": "BROCCOLI STEAK + CHIMICHURRI 🔥", "caption": "BROCCOLI STEAK + CHIMICHURRI 🔥\n\none of my favourite ways to use broccoli is to cut it into steaks, then serve with chimichurri + a creamy butter bean base.\n\nit sounds fancy, but is actually super easy to make, comes together in no time at all & uses simple, plant-based ingredients \n\nI’ve written the full recipe out for you below, so enjoy, and let me know if you give it a go 👇\n\nINGREDIENTS (serves 2)\n\nSTEAK\n\n1 large broccoli\n2 tbsp smoked paprika \n4 garlic cloves\n2 tbsp butter \nSalt\nPepper\nOlive oil\n\nSAUCE\n\nLarge bunch of parsley \n1 garlic clove \n1 red chilli\n2 tbsp red wine vinegar\n100ml extra virgin olive oil\nSalt\nPepper\n\nBASE\n\n700g butter beans (jarred @boldbeanco best)\n1 lemon\n1 garlic clove \n2 tbsp nutritional yeast\nSalt\nPepper\n\nMETHOD\n\n1. First, make the chimichurri. Finely chop the fresh herbs, then add to a mixing bowl.\n2. Finely dice the chilli, mince the garlic + add to the herbs with the vinegar.\n3. Season to taste, then stream in the olive oil whilst mixing until throughly combined. Set aside.\n4. For the butter beans, separate the beans from their juices, then pour beans into a blender with the juice of a lemon, salt, pepper, 1 garlic clove + nutritional yeast. Loosen with a splash of bean liquid for desired consistency if needed. \n5. For the broccoli, chop into steaks - you should be able to get 2-3 from the middle of a large one. \n6. Save the extra florets for another recipe, or roast with salt, pepper, paprika + olive oil until caramelised. \n7. Season the steaks with salt, pepper + paprika on both sides, then drizzle with oil + massage well.\n8. Get a frying pan up to a medium high heat, then add 2 tbsp olive oil. Once hot, add the steak - press down to get a good sear.\n9. After several minutes, flip + cook the other side until golden brown. \n10. Bash the garlic cloves, then add with the butter + baste continuously. \n11. To serve, pour the bean purée into the middle of a plate. Place the steak on top, drizzle with chimichurri + feta if you like, then enjoy!\n\n#broccoli #steak #steakdinner #healthyrecipes #easyrecipes", "owner": "ALFIE STEINER", "username": "alfiecooks", "hashtags": ["steakdinner", "steak", "healthyrecipes", "broccoli", "easyrecipes"], "user_tags": [], "collection": "Meals", "id": 176, "clean_title": "BROCCOLI STEAK + CHIMICHURRI"}, {"url": "https://www.instagram.com/reel/C9vaUcByswY/", "title": "high-protein green pesto pasta 🌱", "caption": "high-protein green pesto pasta 🌱\n\nCreamy, cheesy and easy, this high-protein green pasta is the perfect mid-week dinner for when you’re pressed for time. It has over 30g of protein per serving thanks to the silken tofu, nutritional yeast and soy milk. \n\nrecipe/serves 4:\n- 500g pasta of choice \n- 1/2 tbsp olive oil\n- 350g baby spinach \n- 350g silken tofu \n- 2 cups basil leaves\n- 1 cup fresh parsley \n- 1 clove garlic\n- juice of half a lemon \n- 1/2 cup cashews, soaked in hot water for 10 minutes and drained \n- 1/4 cup pine nuts \n- 1/4 cup nutritional yeast \n- 1/4 cup soy milk\n\nto serve (optional):\n- vegan feta \n- parsley \n- toasted pine nuts\n\n1. Boil a pot of salted water, add the pasta and cook until al dente. Drain and transfer back to the pot. \n2. Meanwhile, heat olive oil in a frying pan. Add the spinach and cook for 2 minutes, stirring regularly, or until completely wilted. Remove from heat. \n3. Transfer the spinach to a blender with all the remaining ingredients and blend until smooth. \n4. Pour the sauce into the pot of pasta and mix well. Serve and optionally garnish with vegan feta, parsley and pine nuts. \n\n#highprotein #highproteinpasta #greenpasta #pastarecipe #pestopasta #veganrecipe", "owner": "chloe e wheatland", "username": "chloeevegan", "hashtags": ["pestopasta", "greenpasta", "highproteinpasta", "highprotein", "veganrecipe", "pastarecipe"], "user_tags": [], "collection": "Meals", "id": 177, "clean_title": "high-protein green pesto pasta"}, {"url": "https://www.instagram.com/reel/C92hBb-In6c/", "title": "מתכון לסלמון בשמנת עם אספרגוסים ותפוחי אדמה", "caption": "מתכון לסלמון בשמנת עם אספרגוסים ותפוחי אדמה\n\nמה צריך?\n1 ק״ג סלמון חתוך לקוביות\n8-12 תפוחי אדמה מיני\nחבילת אספרגוס\n10-12 שני שום קונפי (עם כרבע כוס שמן מהקונפי) או 4-5 שיני שום טרי עם כרבע כוס שמן זית\n500 מ״ל שמנת 38% או שמנת לבישול\nכפית מלח\nחצי כפית פלפל שחור גרוס\nאופצייה: אגוז מוסקט מגורד\n\nאיך מכינים?\n-נניח את תפוחי האדמה בסיר עם מים קרים, נרתיח ומרגע הרתיחה נבשל כחצי שעה עד לריכוך.\n-במחבת גדולה נחמם שמן ונטגן את השום עד להזהבה קלה.\n-נוסיף את הבצל הסגול (חתוך לרצועות) ונטגן מספר דקות.\n-נמזוג את השמנת למחבת, נתבל במלח, פלפל ואגוז מוסקט עם רוצים.\n-נחתוך את החלק הסיבי של גבעול האספרגוס (בערך 1/5 מתחתית הגבעול) ונחצה את מה שנותר.\n-נוסיף את האספרגוס לשמנת, נסדר מעל קוביות סלמון וחצאי תפוחי אדמה מבושלים.\n-נתבל במלח פלפל ונעביר לתנור שחומם מראש ל190 מעלות טורבו כ25 דקות.\n-ניתן לוותר על האפייה, לכסות במכסה את המחבת ולבשל הכל יחד כעשרים דקות על הגז.\n-לקבלת אספרגוס יותר פריך ונגיס ניתן להוסיף אותו לבישול או לאפייה באמצע התהליך ולא בהתחלה.", "owner": "Tomer Umansky", "username": "tomerumansky", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 178, "clean_title": "מתכון לסלמון בשמנת עם אספרגוסים ותפוחי אדמה"}, {"url": "https://www.instagram.com/reel/C9Pj3W-RJDT/", "title": "Don’t sleep on this creamy Feta Pasta girls!! And this one is BOMB for your PCOS okurttt 🍝", "caption": "Don’t sleep on this creamy Feta Pasta girls!! And this one is BOMB for your PCOS okurttt 🍝\n\nPacked with 38G of protein (YES - 38G!) This amazing dish is sure to be a winner for the entire fam!\n\n🍝 Pasta rules for PCOS:\n\n👋 Flip the proportions: more veggies and protein, and smaller serving of pasta\n\n👋 No one type of pasta is off limits. Higher protein and fiber is best\n\n👋 Pair it with a protein, some fat, and some fiber\n\n👋 Have fun with it by experimenting with all different colors, textures, spices, and herbs in your bowl\n\nFor those that don’t know me, let’s get acquainted! 💗👋🏼 I’m Cory, a PCOS Dietitian who also struggles with PCOS. I help women like you conquer your most stubborn PCOS symptoms by showing ya how to eat simple, delish, hormone supportive foods 🥑 \n\nHere’s how to make it:\n\nINGREDIENTS:\n•1 pint cherry tomatoes\n•2 medium zucchini, sliced into rounds then halved\n•2 bell peppers, diced\n•1 Tbsp olive oil, divided\n•salt, pepper, garlic powder\n•6-7 oz block of feta\n•Pinch dried Italian herbs (like thyme or oregano)\n•1 cup cooked high-protein pasta + 1/3 cup reserved pasta water\n•1 lb cooked chicken (I pan fried some tenders with salt, pepper, and paprika)\n•Fresh basil for garnish\n\nDIRECTIONS:\n1) Preheat oven to 400 degrees Fahrenheit\n2) Grab a 9x13 baking dish and add tomatoes, zucchini, and bell peppers. Drizzle 1/2 Tbsp olive oil and sprinkle with salt, pepper, and garlic powder and stir. Add feta block to middle of the pan so it’s flush with the dish and drizzle with remaining 1/2 Tbsp olive oil and a sprinkle of black pepper. Sprinkle whole dish with Italian herbs\n3) Bake 30-35 mins. Once you take it out of the oven, immediately smash the feta block and stir the dish. Add cooked pasta and pasta water and stir again\n4) Top with cooked chicken and basil and serve\n\nMakes 4 servings: 330 calories, 38 G protein, 11 G net carbs, 5 G fiber, 15 G fat\n\nWho’s making this for a hot girl weekend?\n\n#pcos #pcosfood #pcosdiet #pcosdietsupport #pcoshelp #pcosmeals #pcosrecipes #pcoshealth #pcosnutrition #pcosfertility #pcosweightloss #pcoswarrior #pcosweightlossjourney ##fetapasta", "owner": "PCOS Weight Loss + Fertility I Cory Ruth", "username": "thewomensdietitian", "hashtags": ["pcosfertility", "pcosweightloss", "pcoshelp", "pcosrecipes", "pcosdietsupport", "pcos", "pcosmeals", "fetapasta", "pcoshealth", "pcosdiet", "pcosweightlossjourney", "pcosnutrition", "pcoswarrior", "pcosfood"], "user_tags": [], "collection": "Meals", "id": 179, "clean_title": "Don’t sleep on this creamy Feta Pasta girls!! And this one is..."}, {"url": "https://www.instagram.com/reel/C8sSB1pvifL/", "title": "PEACH MOZZARELLA SALAD ✨ I’ve been making this salad for YEARS and I still look forward to it every summer! It’s truly o", "caption": "PEACH MOZZARELLA SALAD ✨ I’ve been making this salad for YEARS and I still look forward to it every summer! It’s truly one of my favorites. Sweet ripe peaches, creamy mozzarella and avocado, crunchy walnuts and spinach, cooked chicken for added protein, and the best balsamic dressing. Make this summer lunch or dinner idea in just 20 minutes!\n⠀⠀⠀⠀⠀⠀⠀⠀⠀\n>> Comment “Salad” to get the recipe link in you DM’s! ✨\n⠀⠀⠀⠀⠀⠀⠀⠀⠀\nOR \n⠀⠀⠀⠀⠀⠀⠀⠀⠀\n>> Head to the link in my bio for recipe ✨\n⠀⠀⠀⠀⠀⠀⠀⠀⠀\n#JarOfLemons #peach #salad #summerrecipes #healthyfood #peachsalad #mozzarella #summersalad #peaches #summerflavor #dinneridea", "owner": "Christine McMichael", "username": "jar.of.lemons", "hashtags": ["summersalad", "peaches", "summerflavor", "salad", "dinneridea", "peachsalad", "jaroflemons", "peach", "mozzarella", "healthyfood", "summerrecipes"], "user_tags": [], "collection": "Meals", "id": 180, "clean_title": "PEACH MOZZARELLA SALAD I’ve been making this salad for YEARS and..."}, {"url": "https://www.instagram.com/reel/C76yZ9xC_Y_/", "title": "איך מכינים סטראצ׳יאטלה,", "caption": "איך מכינים סטראצ׳יאטלה,\nהמילוי של הבוראטה ואחד הדברים היותר טעימים שקיימים! ✨\n\nהיא מושלמת לשבועות כמובן, אבל גם לבראנץ׳ או אפילו סתם ליד כוס יין, היא תשדרג לכם כמעט כל מנת פסטה, וזה כ״כ טעים על סלט, על ברוסקטה או פיצה, והכי הכי - כמנה בפני עצמה, שמעבר לטעימה היא גם מנה שכולם יגידו וואו.\n\nאז בואו תראו איך מכינים אותה בבית בקלות וב-3 דקות עבודה (ומקווה שאף איטלקי פה לא יהרוג אותי 😄)\n\nמצרכים-\n2 כדורי מוצרלה גדולים (בערך 150-160 גרם כל אחד, יש במעדניה בכל סופר)\n3/4 כוס שמנת מתוקה 38%\nמעט מלח\n\nהכנה-\nקורעים את כדורי המוצרלה למן שערות/חתיכות קטנות, מוסיפים את השמנת והמלח, מערבבים, מעבירים לקופסא אטומה ומכניסים למקרר למינימום 6 שעות.\nוזהו, היא מוכנה :)\n\nרעיונות להגשה בצלחת עם תוספות כמו בסרטון:\n1. פסטו, פיסטוקים קצוצים, שמן זית, גרידת לימון ומעט מלח גס\n2. ריבת עגבניות, שום קונפי, בלסמי מצומצם, שמן זית ועלי זעתר או אורגנו טריים (זה יוצא מדהים!)\n3. נקטרינה פרוסה או תאנים (בעונה), דבש, צ׳ילי אדום\n4.  שמן זית, מלח ותבלין על הבייגל\n\n#שבועות #stracciatella #מתכון", "owner": "אפרת רענן", "username": "efratraanan", "hashtags": ["שבועות", "stracciatella", "מתכון"], "user_tags": [], "collection": "Meals", "id": 181, "clean_title": "איך מכינים סטראצ׳יאטלה"}, {"url": "https://www.instagram.com/reel/C9C5dCwtbUK/", "title": "Zoodles, die Low-Carb-Alternative zu Nudeln, sind schnell und einfach mit einem Spiralschneider selbst gemacht und die i", "caption": "Zoodles, die Low-Carb-Alternative zu Nudeln, sind schnell und einfach mit einem Spiralschneider selbst gemacht und die ideale Basis für Baked Feta Zoodles. 🥒🍅\n\n💡 Das Rezept findest du auf unserer Homepage (Link in Bio) und in unserer heutigen Story.️ \n\n#EinfachTasty #EinfachTastyRezept #Zoodles #lowcarb #ofenpasta #ofenfeta", "owner": "Einfach Tasty", "username": "einfachtasty", "hashtags": ["einfachtasty", "zoodles", "lowcarb", "ofenfeta", "einfachtastyrezept", "ofenpasta"], "user_tags": [], "collection": "Meals", "id": 182, "clean_title": "Zoodles, die Low-Carb-Alternative zu Nudeln, sind schnell und..."}, {"url": "https://www.instagram.com/reel/C9J8gDsN8yS/", "title": "Yogurt, burro di arachidi, cioccolato 🍫 🥜🥛 Dolcetti da “mamma miaaaa” assicurato in arrivo✨ @cookingwithbello @giallozaf", "caption": "Yogurt, burro di arachidi, cioccolato 🍫 🥜🥛 Dolcetti da “mamma miaaaa” assicurato in arrivo✨ @cookingwithbello @giallozafferano \n\nIngredienti:\n\n-300g yogurt greco\n-100g burro di arachidi\n-3 cucchiai miele\n-200g cioccolato fondente\n-granella di pistacchi\n-sale in fiocchi \n\nMescolate tutti gli ingredienti, trasferite il composto a cerchi su una teglia e lasciate riposare in freezer per un’ora. Ricoprite i dolcetti con del cioccolato fuso e guarnite con sale a fiocchi e pistacchi. Buon appetito!\n\n#giallozafferano #reel #gz #cookingwithbello #dolci #summer #foodie #foodvibes #chocolate #peanutbutter", "own st how much I love this pita bread recipe: I've been making it 2-3 times *per week* lately, it's just so good!! It's definitely the recipe I make most frequently from the blog, it's so easy and quick to make, I have them ready start to finish in less than 45 minutes 🙌\n\nThe key to getting them to puff up is to roll them to just the right thickness (about 5mm or just under ¼ inch) and to cook them over high heat. And they're a huge hit with non-GF folks as well! 💛 Full recipe is on my blog, link in my bio!!\n\n#pita #pitabread #flatbread #glutenfree #glutenfreevegan #glutenfreebread #glutenfreefood #veganrecipes #bread #homecooking #cooking #recipes", "owner": "Katarina Cermelj", "username": "theloopywhisk", "hashtags": ["glutenfreebread", "bread", "pitabread", "glutenfreevegan", "cooking", "glutenfreefood", "veganrecipes", "recipes", "flatbread", "homecooking", "pita", "glutenfree"], "user_tags": [], "collection": "Meals", "id": 185, "clean_title": "Gluten-free pita bread that puffs up every single time In case..."}, {"url": "https://www.instagram.com/reel/C8rneJXI-md/", "title": "יואווו אתם לא מבינים איזה דודא הייתה לי למתכון זה", "caption": "יואווו אתם לא מבינים איזה דודא הייתה לי למתכון זה\nמאז שהייתי באתונה נתקע לי בראש שאני חייבת להכין כדורי זוקיני..ביוון אפשר למצוא אותם כמעט בכל מסעדה אבל נשבעת לכם שיצא לי הרבה יותר טעים😋\nכדורי זוקיני\nמצרכים:\n5 זוקיני גדולים\nבצל גדול קצוץ דק\nחופן פטרוזיליה וכוסברה קצוצים דק\n3 שיני שום קצוץ דק \n2 ביצים \nכוס וחצי קמח ( 200 גרם) \n150 גרם גבינה בולגרית\nכוס גאודה מגורדת \nתיבול: כפית מלח, כפית פלפל שחור \nלציפוי: ביצה טרופה, קמח, פירורי לחם \nהכנה:\nבמעבד מזון או במגרדת ידנית מגרדים דק את הזוקיני. מעבירים לחיתול בד וסוחטים היטב \nבקערה מערבבים את כל המצרכים פרט לגבינות \nמוסיפים את הגבינות ומעבדים לכדורים.\nמסדרים במגש ומעבירים לחצי שעה במקפיא \nמוציאים ומצפים בקמח, ביצה ופירורי לחם.\nמטגנים בשמן עמוק ומוציאים לרשת לצינון.\nמגישים לצד יוגורט יווני  ולימון. בתיאבון😋\n\n#זוקיני #קציצות #אוכליווני #zucchini #einavfood", "owner": "עינב חקון |בלוגרית אוכל| Einav Hakoun", "username": "einavhakounfood", "hashtags": ["einavfood", "zucchini", "קציצות", "אוכליווני", "זוקיני"], "user_tags": [], "collection": "Meals", "id": 186, "clean_title": "יואווו אתם לא מבינים איזה דודא הייתה לי למתכון זה"}, {"url": "https://www.instagram.com/reel/C8tt-9jypFH/", "title": "Have a bunch of veg to use up? Make this Roasted Vegetable Couscous Salad! 😌 Welcome to Episode 11 of Salads That ✨Don't", "caption": "Have a bunch of veg to use up? Make this Roasted Vegetable Couscous Salad! 😌 Welcome to Episode 11 of Salads That ✨Don't Suck✨ Today we're making sure that produce doesn't go to waste by making this warm hearty bowl of goodness! \n\n(Note: Full recipe below but this is SO customisable so simply use any veg you have or prefer) \n\nServes: 4 \nPrep: 20 mins\nCook: \nIngredients\n1/2 pumpkin\n1 zucchini\n1 leek\n1 red capsicum\n1 red onion\n1/4 cauliflower\n1 head broccoli \n1.5 tbsp olive oil \n1/2 tsp smoked paprika\n1/2 tsp garlic powder\n1/2 tsp onion powder\n1/2 tsp ground cumin\n1 tsp dried oregano\nSalt & pepper\n\nCouscous: \n1 cup veggie stock \n2 tsp olive oil\nPinch of salt \n1 cup couscous\n\nOther: \n1 can lentils, drained & rinsed \n1 cup rocket or arugula \n1/4 cup fresh parsley, chopped\n\nDressing: \n2 tbsp olive oil\n2 tbsp lemon juice\n1 tbsp balsamic vinegar\n2 tsp maple syrup\n1 clove garlic\n1 tsp Dijon mustard \nSalt & pepper\n\nMethod: \n1. Preheat oven to 200°C. Line a large baking tray and set aside.\n2. In the meantime, prep your veggies and slice up into smaller bite sized pieces.\n3. Add onto the baking tray with oil and all of the listed herbs and spices. Roast in the oven for 30-40 minutes or until golden and cooked through. \n4. In the meantime, add the veggie stock, oil and salt in a saucepan and bring to the boil. Turn off heat, add in couscous, pop lid on and set aside for 5 minutes. When ready, fluff up with a fork. \n5. For the dressing, add all of the ingredients into a small glass and whisk well to combine. \n6. Add the couscous, roast veg, lentils, rocket and parsley into a large bowl. Pour on the dressing and mix until well coated. Enjoy! 🥣🍃 \n\n#vegan #plantbased #healthyrecipe #healthyfood #saladrecipe #salads #easyrecipe #health #vegansalad #plantbasedrecipe #saladdressing #saladideas #roastveg #couscous #couscoussalad", "owner": "Cherie", "username": "thrivingonplants", "hashtags": ["roastveg", "saladdressing", "saladrecipe", "plantbased", "salads", "vegansalad", "healthyrecipe", "easyrecipe", "health", "vegan", "healthyfood", "couscous", "plantbasedrecipe", "saladideas", "couscoussalad"], "user_tags": [], "collection": "Meals", "id": 187, "clean_title": "Have a bunch of veg to use up? Make this Roasted Vegetable..."}, {"url": "https://www.instagram.com/reel/C7jJbx8oDs4/", "title": "מתכון לקיש ברוקולי מווושלם!!", "caption": "מתכון לקיש ברוקולי מווושלם!!\n\nלבצק: (תבנית פאי קוטר 26)\n150 גרם חמאה קרה\n2 כוסות קמח\nחצי כפית מלח\nביצה L\n2 כפות שמנת מתוקה\nלמלית:\n400 גרם ברוקולי\nבצל לבן גדול\n2 שיני שום כתוש\n2 ביצים\n250 מ״ל שמנת מתוקה להקצפה (38%)\n100 גרם גבנ״צ מגורדת\n50 גרם בולגרית\nמלח, פלפל ומעט אגוז מוסקט\n\nאופן ההכנה:\nבמעבד מזון/מיקסר עם וו גיטרה שמים קמח,מלח וחמאה ומעבדים לתערובת פירורית (כמו חול)\nמוסיפים ביצה ושמנת מתוקה ומעבדים עד לקבלת בצק אחיד.\n\nמקמחים משטח ממש מעט ומרדדים לעלה בעובי 1 ס״מ בגודל קצת יותר גדול מגודל התבנית משטחים את הבצק על גבי התבנית ומהדקים היטב לתחתית התבנית ולשוליים, מחוררים את הבצק עם מזלג ומכניסים להקפאה.\n\nלמלית- מאדים ברוקולי טרי כ-10 דקות בסיר אידוי/ קוסקוס\nמטגנים עם מעט חמאה רצועות בצל עד הזהבה.\nאת שאר חומרי המלית שמים בקערה וטורפים לאיחוד. \nמפזרים את הבצל והברוקולי על גבי הבצק הקפוא ושופכים את המלית מעל את הברוקולי.\nמכניסים לתנור שחומם מראש ל180 מעלות מצב סטטי כ30 דקות עד הזהבה.\nמצננים קצת ונהנים:)\n\n#מתכוןקיש #מתכוןארוחה #מתכוןחלבי #קישברוקולי #קישברוקוליוגבינות", "owner": "אביה מלכא | מטבח | אירוח | DIY", "username": "aviyamalka_", "hashtags": ["מתכוןארוחה", "מתכוןקיש", "מתכוןחלבי", "קישברוקוליוגבינות", "קישברוקולי"], "user_tags": [], "collection": "Meals", "id": 188, "clean_title": "מתכון לקיש ברוקולי מווושלם"}, {"url": "https://www.instagram.com/reel/C8mr-tYpd4y/", "title": "It’s a summer pasta for the non-tomato lover. They exist, don’t hate them.  A rich and creamy alfredo-like pasta sauce w", "caption": "It’s a summer pasta for the non-tomato lover. They exist, don’t hate them.  A rich and creamy alfredo-like pasta sauce with lots of garlic, Parmesan and basil that doubles as a way to use up all that zucchini. Yes, please. Comment “zucchini” and we’ll send you the full recipe. \n\n#zucchini #pasta #summer #summerpasta #zuchinnirecipes #alfresco #dinnerideas #vegetarian #vegetarianrecipes #pastalover", "owner": "The Modern Proper", "username": "themodernproper", "hashtags": ["pasta", "zucchini", "zuchinnirecipes", "summerpasta", "vegetarianrecipes", "pastalover", "alfresco", "vegetarian", "summer", "dinnerideas"], "user_tags": [], "collection": "Meals", "id": 189, "clean_title": "It’s a summer pasta for the non-tomato lover. They exist, don’t..."}, {"url": "https://www.instagram.com/reel/C8ez-AIq58S/", "title": "10-MIN POOKIES 🥞🍪 recipe below 👇", "caption": "10-MIN POOKIES 🥞🍪 recipe below 👇 \n\nWhat are POOKIES, you might ask? It all started when I wanted to make the easiest, fuss-free cookies. In testing the recipe, I accidentally made pookies, a mix between pancake and cookie. I don’t know if this is a thing, but I think it should be 😋 super easy, not much to clean and just a few basic ingredients! \n\nHere’s what you’ll need for 6 large Pookies:\n- 1 ripe banana\n- 60g medium dark chocolate\n- 1 egg\n- 50g sugar\n- 100g flour\n- 1 tsp baking powder\n\n1. Put all ingredients into a blender or food processor and mix until fully combined\n2. Scoop dough into circles on a baking tray, then bake for 8 minutes on 180C/350F\n\nEt voila ✨ how do you feel about Pookies? 😄\n\nFollow @kayoukitchen for more easy treats anyone can make 😋\n\nEnjoyyy,\nKatja 🥰\n#cookies #pancakes #pookie #chocolate #banana #easyrecipes #easy #easybaking", "owner": "Katja Jurgenschellert", "username": "kayoukitchen", "hashtags": ["cookies", "pookie", "banana", "easy", "pancakes", "easybaking", "chocolate", "easyrecipes"], "user_tags": [], "collection": "Meals", "id": 190, "clean_title": "10-MIN POOKIES recipe below"}, {"url": "https://www.instagram.com/reel/C8kSS5NoWuk/", "title": "Orzo Pasta Salad 🥗 Garlicky and super fresh! Perfect for this warmer weather and meal prep", "caption": "Orzo Pasta Salad 🥗 Garlicky and super fresh! Perfect for this warmer weather and meal prep \n\nThis is from our cookbook which is currently half price on Amazon… link in bio to grab one 🫶🫶\n\nSAVE this recipe for later! \n\nHere’s your shopping list:\n400g of chicken breast.\n1.5 tbsp of olive oil.\n2 cloves of garlic - crushed\n1 tbsp of oregano.\n350g of orzo.\n2 bell peppers - finely chopped.\n1 red onion - finely chopped.\n1/2  a small cucumber.\n125g of cherry tomatoes.\n120g of chickpeas - drained.\n150g of fat-free natural yoghurt.\n2 tbsp of light mayonnaise. \n1 tsp of dijon mustard.\n1 tsp of garlic granules.\n1 tsp of smoked paprika\nJuice of 1 whole lemon.\nDill - roughly chopped.\nParsley - roughly chopped.\n\n#TheGoodBite #Orzo #Pasta #Salad #Garlic #Chicken  #Series #HighProtein #Food #Delicious #Easy", "owner": "The Good Bite", "username": "thegoodbite", "hashtags": ["pasta", "easy", "salad", "thegoodbite", "highprotein", "garlic", "series", "food", "chicken", "orzo", "delicious"], "user_tags": [], "collection": "Meals", "id": 191, "clean_title": "Orzo Pasta Salad Garlicky and super fresh! Perfect for this..."}, {"url": "https://www.instagram.com/reel/C8g8ALDM07w/", "title": "Creamy Lemon Linguine @alexandradudley", "caption": "Creamy Lemon Linguine @alexandradudley \n\nINGREDIENTS \n250g of dried linguine\nOlive oil\n3 garlic cloves, finely chopped or crushed\n250ml of single cream\nPinch of salt\nBlack pepper\n100g of parmesan, finely grated, plus extra to serve\nJuice of 1 lemon\nLemon zest, to serve\n\nMETHOD\nCook the linguine 1 minute less than the packet instructions suggests in well-salted water. Switch off the heat as you cook the sauce.\nHeat a good glug of olive oil over medium heat in a large, deep frying pan. Add the garlic & cook gently for a couple of minutes until it has slightly softened & begins to smell fragrant. Take care not to let it brown.\nAdd the cream & reduce the heat, stirring to combine. Allow the cream to come to a gentle simmer & cook for roughly 2 minutes.\nAdd the parmesan in 3 stages, whisking it in each time & adding a little of the cooking water if it begins to curdle. Don’t worry if it looks lumpy in stages, the starchy water will help to loosen it up.\nSeason well with salt & cracked black pepper then add the lemon juice & stir again.\nTong in the cooked linguine & allow everything to bubble away for a few minutes, tossing the pasta using tongs to ensure it is coated.\nServe from the bowl at the table or tong into serving bowls. Finish with more grated parmesan & fresh lemon zest.", "owner": "SheerLuxe", "username": "sheerluxe", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 192, "clean_title": "Creamy Lemon Linguine"}, {"url": "https://www.instagram.com/reel/C78pdHGoRVm/", "title": "BLUEBERRY & HALLOUMI SALAD BOWL 🫐 Blueberries work so well in salad, like little bursting balls of sweetness that comple", "caption": "BLUEBERRY & HALLOUMI SALAD BOWL 🫐 Blueberries work so well in salad, like little bursting balls of sweetness that complement fresh and savoury flavours.\n\nIn this salad bowl they are also used to a make a simple dressing with vinegar and olive oil.\n\nGiant couscous is my carb of choice here, but of course you can swap for any grain or pasta, and you could swap the green beans for tenderstem broccoli or another vegetable.\n\nThis makes a healthy, summery dinner for two or serve as a sharing salad at a barbecue or picni | Serves 4\n\nINGREDIENTS\n\n➡️CHICKEN:\n2x 250g/9oz Chicken Breasts, brought close to room temp\n35g / 1/4 cup Plain Flour\n1 tsp EACH: Salt, Black Pepper\n1/2 tsp Garlic Powder\n1 tbsp Olive Oil\n1 tbsp / 15g Unsalted Butter\n➡️SAUCE:\n120ml / 1/2 cup Chicken Stock\n1 large Lemon\n2 1/2 tbsp Honey\n2 tbsp / 30g Unsalted Butter (keep in the fridge until needed)\n1 tbsp finely diced Fresh Parsley, to serve\n\nMETHOD\n\n1️⃣Slice two rings in the centre of the lemon, then halve both of them to create 4 half moons (to serve). Use the remaining lemon to squeeze 1 1/2 tbsp of juice.\n2️⃣Horizontally slice the chicken breasts right through the centre to create 4 even-sized breasts. In a large shallow dish, combine flour, salt, black pepper and garlic powder. Take one of the chicken breasts and thoroughly coat it in the flour, then give it a shake then place to one side. Repeat with the remaining breasts.\n3️⃣Heat 1 tbsp butter and oil in a large pan over medium-high heat. Add the chicken and fry both sides for a few minutes, or until golden on the outside and just about cooked through the centre. Remove from the pan and place to one side. Turn off the heat.\n4️⃣Once the leftover oil stops sizzling, stir in the chicken stock, lemon juice and honey. Turn the heat to medium and bring to a gentle simmer for a couple of minutes, or until you notice it just about starting to thicken. Stir in any resting juices from the chicken then swiftly whisk in the cold butter. Once the sauce turns cloudy/glossy, turn the heat to low and check for seasoning.\n5️⃣Add in the chicken and place a lemon wedge on top of each breast. Baste in the sauce (the excess flour from the chicken will thicken up the sauce a little more) then serve with fresh parsley and a pinch of black pepper.", "owner": "Chris Collins", "username": "dontgobaconmyheart_", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 203, "clean_title": "Day 5 | 30 days of 30 minute dinners Here’s a really simple for..."},  🥗🙌🏻", "caption": "Easy Pasta Salad 🥗🙌🏻\n\nFollow @goodieschannel for more inspiring recipe like this one👇🏻\n\nIngredients: \nPasta \nArugula \nTomato \nMozzarella \nCorn \nPickles \nKedney beans \nChicken breast \nAvocado \n\nDressing:\n2-3 tbsp pesto rosso \nparmasan\nolive oil\nlemon juice\nbasil\nsalt ✨\n\n(Via: @tagesrezept_)🫶🏻\n#easyrecipes #lunchidea #dinneridea #recipeinspiration #pastasalad #salad #pasta", "owner": "Goodies Channel", "username": "goodieschannel", "hashtags": ["pasta", "recipeinspiration", "salad", "dinneridea", "pastasalad", "easyrecipes", "lunchidea"], "user_tags": [], "collection": "Meals", "id": 207, "clean_title": "Easy Pasta Salad"}, {"url": "https://www.instagram.com/reel/C7Cr9BrJlBd/", "title": "Crunchy Mediterranean roast potatos. By @hoda_alzubaidi", "caption": "Crunchy Mediterranean roast potatos. By @hoda_alzubaidi \n \nGlazed with oregano, feta and drizzling of honey. these Mediterranean baked potato’s are crunchy on the outside and fluffy on the inside. You’ve not had potato’s like this until you’ve tried this! \n \nThe sauce for this recipe is a go to for ANYTHING! It’s salty, zesty, sweet and goes well with potato’s, salads or even pasta!\n \nIngredients.\n- Zest of 1 lemon\n- Juice of 1 lemon\n- 3 tablespoon olive oil\n- 1 teaspoon oregano\n- 1 teaspoon chilli (optional)\n-  1teaspooon salt\n-  1teaspoon honey @wild.nectar.honey \n- 4 potato’s\n- 1 cube of feta\n \n \nMethod\n1.  Peel and cut the potato’s in cubes. In a pot half filled with water, place the cubed potato’s and bring to a boil for 15 minutes with a sprinkling of salt. In the last 5 minutes, place a deep baking tray with vegetable oil until it just covered the bottom of the tray in the oven at 200C for 5 minutes.\n2.  In the meantime, make the sauce combining the zest of a lemon, lemon juice, olive oil, oregano, chilli, salt and honey. Mix well and set aside\n3.  Drain the potato’s of the water and shake them to fluff the edges. Carefully place them into the baking tray with hot oil, mix and bake for 20 minutes. Repeat this process three times. By removing the tray form the oven and turning the potatoes each time.\n4.  By the fourth time, drizzle half the sauce in the tray and mix well, place into the oven for 5 minutes. Once cooled, sprinkle feta, and additional squeeze of honey.\n \n#potatoes #baked #bakedpotato #dinner #honey #greek #wildnectarhoney  #crunchy", "owner": "Organically 🍏", "username": "organicallyca", "hashtags": ["wildnectarhoney", "greek", "baked", "crunchy", "potatoes", "bakedpotato", "dinner", "honey"], "user_tags": [], "collection": "Meals", "id": 208, "clean_title": "Crunchy Mediterranean roast potatos. By"}, {"url": "https://www.instagram.com/reel/C6HCBubqoYI/", "title": "סלט קיץ עם רוטב סודי ☀️🥗", "caption": "סלט קיץ עם רוטב סודי ☀️🥗\n\nיאללה לעבודה:\nחסה קראנצית שטופה\nעלי נענע\nפרוסות נקטרינה/אפרסק\nשקדים קלופים ופרוסים דק\n\nלרוטב הסודי 🤫🤫🤫\nשן שום כתושה \nמיץ מחצי לימון\nרבע כפית עלי טימין לימוני \nכפית חרדל דיז׳ון (ללא גרגירים)\nרבע כפית צ׳ילי אדום גרוס\nמעט פלפל שחור גרוס\nכפית מלח שטוחה\n2-3 כפות שמן זית (תלוי בגודל הסלט)\n\nטורפים את רכיבי הרוטב יחד, שופכים על הסלט ומערבבים היטב\n\nתהנו 💛🎗️\n\n⚖️ בשפה שלנו בחלוקה של הסלט ל4-5 מנות כל מנה = מנת פחמימה אחת", "owner": "קים גפסון | תזונה ובריאות נשים", "username": "kimgafson", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 209, "clean_title": "סלט קיץ עם רוטב סודי"}, {"url": "https://www.instagram.com/reel/C5dt0QWI_LA/", "title": "סלט ברוקומיני", "caption": "סלט ברוקומיני\n\nאתם חייבים להכין את הסלט הזה בערב חג, אתם תתמכרו!\n5 דקות הכנה, בלי בישול, רק לערבב את הרוטב, להוסיף אגוזים ולהגיש - זה הסלט הכי קראנצ׳י ומדהים שיש. \n\nהמתכון המלא נמצא בבלוג, יש קישור בביו או בגוגל ״קראמבל שיר״ ותגיעו.\nאם לא מצאתם תשלחו לי הודעה 🫶🏻\n\nפרסום בשיתוף @shookit \n\n#salad #broccoli #kale #crumble_shir#dinner #brunch #פסח", "owner": "Crumble | Shir David Bahar", "username": "crumble_shir", "hashtags": ["crumble_shir", "kale", "salad", "brunch", meals #easyrecipe #easymeals #choosingbalance #healthylunch #healthymeals #lunchideas #lunchrecipes #lunchtime #healthylifestyle", "owner": "Peyton Pratte", "username": "choosing_balance", "hashtags": ["lunchrecipes", "10minutemeals", "lunchtime", "easyrecipe", "easymeals", "healthymeals", "healthylunch", "vegetarian", "healthylifestyle", "lunchideas", "choosingbalance"], "user_tags": [], "collection": "Meals", "id": 215, "clean_title": "10 Minute Meals: Feta + Cucumber + Feta Chickpea Salad. No..."}, {"url": "https://www.instagram.com/reel/C5gLoWuAzWG/", "title": "Avocado Corn Salad 💃", "caption": "Avocado Corn Salad 💃\nAKA. Cowboy caviar. Ready in 15 minutes and serves as a seasonal staple with the smoky cilantro lime dressing. You will LOVE this one. \n.\nFor the FULL RECIPE google Search 🔍 “Sailor Bailey Avocado Corn Salad” Or click the link in my profile.\n.\n#recipes #foodie #instagood #delicious #yum\n#salad #instadaily #food", "owner": "Bailey Rhatigan | Healthy Recipes", "username": "sailor_bailey", "hashtags": ["eathealthy", "healthyfood", "fiber", "eatclean", "instadaily", "instagood", "yum", "salad", "recipes", "food", "delicious", "foodie"], "user_tags": [], "collection": "Meals", "id": 216, "clean_title": "Avocado Corn Salad"}, {"url": "https://www.instagram.com/reel/C50LSS-ItVn/", "title": "🥬🍽️סלט כרוב צלוי🍽️🥬", "caption": "🥬🍽️סלט כרוב צלוי🍽️🥬\nהמנה שכולם אוהבים!\n\nלאחותו של שחר יש מתכון שתמיד מתחסל ראשון מהשולחן! \nהוא גם פרווה 😉\nתעשו סייב ובואו נתחיל 💫\n\nאכלנו אותו עשרות פעמים ואף פעם לא נשאר ממנו זכר על השולחן. כולם אוהבים אותו!\nסלט כרוב צלוי. טבעוני, ללא גלוטן*, מתאים לכל חג ולכל שולחן!\nההכנה שלו לוקחת 10 דקות בלבד וזו מנה שאתם יכולים לתקתק גם בזמן שהאורחים בדרך!\n\n*ניתן למצוא סויה ללא גלוטן וכשרה לפסח\nובמתכון גם כתבנו לכם תחליף אם לא מצאתם\n\nמתכון מחכה לכם אצלנו באתר!\nרוצים שנשלח לכם לינק?\nתכתבו בתגובות את המילה מתכון ויישלח אליכם קישור במהירות האור 💫\nאתם יכולים להגיע אלינו גם דרך גוגל :) פשוט תכתבו שחר ואורן ❤️", "owner": "Shahar & Oren - שחר ואורן", "username": "shahar.and.oren", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 217, "clean_title": "סלט כרוב צלוי"}, {"url": "https://www.instagram.com/reel/C5GBM7FNXwm/", "title": "סלט אטריות אורז קר ברוטב טחינה אסיאתי מחרפןןןןן🤤🤤", "caption": "סלט אטריות אורז קר ברוטב טחינה אסיאתי מחרפןןןןן🤤🤤\nברוכות הבאות לספיישל מתכונים קלילים ומרעננים לקיץ! מנות כיפיות וטעימות שגם לא מכבידות עלינו ואני יכולה לחיות עליהן בימים החמים.\n\nאז היום בפינתנו : סלט אטריות אורז קר שהוא בעצם ארוחה שלמה ברוטב טחינה אסיאתי עם קריספי אדממה (שזה מקור מעולה לחלבון) ומלא ירקות קראנצ’ים ושווים ברוטב אחד שעוטף את הכלללל! \n\nמצרכים:\n250 גרם אטריות אורז \n1/4 כרוב סגול פרוס דק\n2 גזרים מגורדים/ פרוסים \n2 מלפפונים חתוכים דק \n1/2 בצל סגול פרוס דק\nכוסברה קצוצה \nנענע \nצ’ילי אדום חריף (לא חובה אבל מוסיף)\n1/4 כוס בוטנים גרוסים קלויים על מחבת\n\nקריספי אדממה: \n1.5 כוסות פולי אדממה \n1 כפית שמן זית\n1/4 כפית מלח\n1/2 אבקת כפית שום גבישי\nמעט פפריקה \n\nרוטב:\n1/4 כוס טחינה גולמית\n5 כפות סויה (עדיף דלת נתרן)\n1.5 כף סילאן / מייפל \n1 כפית שמן שומשום\n3 שיני שום\n3-4 כפות מיץ לימון\n3 כפות מים פושרים\nמעט צ’ילי גרוס \n\nאופן ההכנה:\n1. מכינים את אטריות האורז ע״פ הוראות ההכנה שעל גבי האריזה. מסננים ומעבירים אותן לקערה לקירור. \n2. את האדממה משרים במים רותחים 10-15 דקות עד הפשרה ומוציאים מתוכם את פולי הסויה. \n3. חותכים את כל הירקות, מסדרים את כל הירקות ואטריות האורז בקערה גדולה.\n4. מפזרים מעל את הכוסברה, הנענע, הצ’ילי והבוטנים הגרוסים לאחר קלייה קלה. \n5. מכינים את הרוטב - מערבבים את כל רכיבי הרוטב בקערה קטנה.\n6. שופכים את הרוטב מעל הסלט ומערבבים היטב. מגישים ובתיאבוןןןן\nמגישים את הסלט קר! אפשר לשמור במקרר בכלי אטום 4 ימים. מושלם לקחת לארוחת צהריים בלימודים/ בעבודה .\n\n#ii_community #safedoldcity_ii #healthylifestyle #healthyfood #recipes #healthyrecipes #מתכונים #מתכוניםבריאים #טבעוני #מתכוניםטבעוניים #קיץ #סלט #בריא #אוכל #אוכלבריא #מתכוניםקלים", "owner": "Alona Eckrling | דיאטנית קלינית", "username": "alonaeck_", "hashtags": ["safedoldcity_ii", "ii_community", "מתכוניםקלים", "קיץ", "טבעוני", "healthyrecipes", "סלט", "מתכוניםבריאים", "recipes", "healthyfood", "healthylifestyle", "בריא", "אוכל", "אוכלבריא", "מתכונים", "מתכוניםטבעוניים"], "user_tags": [], "collection": "Meals", "id": 218, "clean_title": "סלט אטריות אורז קר ברוטב טחינה אסיאתי מחרפןןןןן"}, {"url": "https://www.instagram.com/reel/C5EeqwkvOkF/", "title": "Sometimes you just want to do the dough. Here’s the full ingredient list:", "caption": "Sometimes you just want to do the dough. Here’s the full ingredient list:\n\n🍪 8 tbsp. unsalted butter (1 stick), room temperature\n🍪 1 cup brown sugar, packed\n🍪 2 tbsp. heavy cream\n🍪 1 tsp. vanilla extract\n🍪 1/2 tsp. kosher salt\n🍪 1 cup flour (heat treated!)\n🍪 1/2 cup chocolate chips\n\n#benandjerrys #cookiedough #ediblecookiedough", "owner": "Ben & Jerry's", "username": "benandjerrys", "hashtags": ["cookiedough", "benandjerrys", "ediblecookiedough"], "user_tags": [], "collection": "Meals", "id": 219, "clean_title": "Sometimes you just want to do the dough. Here’s the full..."}, {"url": "https://www.instagram.com/p/C5D2EZxMIjt/", "title": "A little of what you fancy does you good... Prue Leith's very fancy fondant fancies.", "caption": "A little of what you fancy does you good... Prue Leith's very fancy fondant fancies. #GBBO", "owner": "The Great British Bake Off", "username": "britishbakeoff", "hashtags": ["gbbo"], "user_tags": [], "collection": "Meals", "id": 220, "clean_title": "A little of what you fancy does you good... Prue Leith's very..."}, {"url": "https://www.instagram.com/reel/C4O0Ce1PJ2T/", "title": "Garlic Parmesan Orzo", "caption": "Garlic Parmesan Orzo\nA flavorful side dish loaded with buttery garlic goodness, Parmesan cheese, and extra flavor from chicken broth. Simple, satisfying, and perfect for any meal! 🧀🍲 #orzo #SideDish #easyrecipe #pastarecipe #recipeshare #thefeedfeed\n\nIngredients:\n- 1 cup orzo pasta\n- 2 tablespoons butter\n- 2 cloves garlic, minced\n- 1 3/4 cups chicken broth\n- 1/2 cup grated Parmesan cheese\n- Salt and pepper to taste\n- Chopped parsley for garnish (optional)\n- 1/2 cup cream\n\nInstructions:\n1. In a medium saucepan, melt the butter over medium heat.\n2. Add the minced garlic and sauté for about 1 minute, or until fragrant.\n3. Stir in the orzo pasta and cook for an additional 2-3 minutes, stirring frequently.\n4. Pour in the chicken broth and bring to a boil.\n5. Reduce heat to low, cover, and simmer for about 10 minutes, or until the orzo is tender and the liquid is absorbed.\n6. Remove from heat and stir in cream and the Parmesan cheese until melted and well combined.\n7. Season with salt and pepper to taste.\n8. Garnish with chopped parsley, if desired, and serve hot.\n\nEnjoy your garlic Parmesan orzo as a delicious side dish!", "owner": "Emma Bice", "username": "ourcountertop", "hashtags": ["sidedish", "easyrecipe", "recipeshare", "orzo", "thefeedfeed", "pastarecipe"], "user_tags": [], "collection": "Meals", "id": 221, "clean_title": "Garlic Parmesan Orzo"}, {"url": "https://www.instagram.com/reel/C4tErXkKeof/", "title": "PASTA, PESTO E BURRATA 🇮🇹", "caption": "PASTA, PESTO E BURRATA 🇮🇹\n\nWelcome back to SAUCY PASTAS, the series where I show you how to make the best pasta in town. \n\nFor EPISODE 7, I’ve made my childhood favourite: PASTA & PESTO, served with burrata on top. \n\nI change the way I make pesto every time I make it depending on what I have at home. But the idea is always the same: fresh greens or herbs, toasted nuts or seeds, lots of good quality olive oil, plenty of garlic + lemon, then heaps of nutritional yeast. \n\nI’ve written this particular recipe out below - but feel free to use up what you’ve got in your fridge + cupboard - get creative! Enjoy, and let me know if you give it a go \n\nFOR THE PESTO (makes a batch to serve 4)\n\nLarge bunch of fresh green herbs (I used basil, parsley + mint)\n100g toasted nuts/seeds (I used sunflower seeds)\n6 tbsp nutritional yeast (I use instead of parmesan)\n2 garlic cloves\n1 lemon\n100-150ml extra virgin olive oil\n1-2 ice cubes\nSplash of pasta water to loosen\nSalt\nPepper\n\nTO SERVE: Pasta of choice (I used casarecce), cherry tomatoes, burrata (I used @juliennebruno burella), fresh basil + olive oil\n\nMETHOD\n\n1. Gently toast your nuts/seeds in the oven until golden + aromatic (5 minutes at 180 celsius will do). Allow to cool. \n2. Place the herbs, leaves + stems, in a food processor. You could use a pestle + mortar here, but I find it easier to make bigger batches of pesto in a processor. \n3. Add the nuts/seeds into the processor, along with the garlic cloves, juice of a lemon, nutritional yeast (or parmesan), then add half of the olive oil. \n4. While the machine is running, stream in the rest of the oil until a smooth paste forms. Season to taste with salt + pepper, then add an ice cube or two to keep things vibrant, creamy + fresh.\n5. Get your pasta onto boil into salted water. \n6. Loosen the pesto with a splash of pasta water, then mix into the drained pasta. \n7. To serve, place in bowls, top with burrata, chopped cherry tomatoes, fresh basil + a good drizzle of extra virgin olive oil - enjoy!\n\n#pesto #pasta #burrata #easyrecipes #healthyrecipes", "owner": "ALFIE STEINER", "username": "alfiecooks", "hashtags": ["pasta", "healthyrecipes", "burrata", "pesto", "easyrecipes"], "user_tags": [], "collection": "Meals", "id": 222, "clean_title": "PASTA, PESTO E BURRATA 🇮🇹"}, {"url": "https://www.instagram.com/reel/C4FT7-Aodmx/", "title": "ניוקי ביתי ממרכיב אחד בלבד", "caption": "ניוקי ביתי ממרכיב אחד בלבד\nכל כך קל להכנה שזאת פשוט חוצפה לא להכין בבית.\nהמתכון המצורף הוא לניוקי בלבד והוא גם צמחוני וגם טבעוני. אתם יכולים להכין עם איזה רוטב שאתם אוהבים. \nאני הכנתי עם רוטב לא כשר של ציר בקר ושמנת\nמי שרצה את המתכון המדיוק לרוטב שיכתוב לי ואני אשלח לו ❤️\n.\nמצרכים: \n1 כוס קמח \n1 כוס מים\nכפית מלח \n.\nאופן ההכנה:\nמרתיחים בסיר את המים והמלח.\nמורידים מהאש ומוסיפים את הקמח. \nמערבבים עד לאיחוד.\nמפזרים קמח על משטח עבודה ומעבירים את הבצק מהסיר למשטח. \nמפזרים מעליו עוד מעט קמח ומתחילים ללוש ביד \nעד לקבלת בצק חלק. \nמחלקים את כדור ההצק ל-4 חלקים ומכל חלק יוצרים צורה של ״נחש״ על משטח נקי ולא מקומח. שימו לב לא ללחוץ על הבצק יותר מידי\nחותכים לקוביות עם סכין חדה ושומרים בצד על משטח מקומח קלות שלא ידבקו.\nלבישול הניוקי, מרתיחים מים בסיר עם מעט מלח, מכניסים את הניוקי לבישול קצר מאוד של כ-3 עד 5 דקות או עד שהם מתחילים לצוף. ברגע שהם צפים במים, משאירים עוד דקה לבישול \nוזהו, יש לכם ניוקי. \n.\nהערות:\n-ממולץ ללוש את הבצק ישר כשהוא יוצא מהסיר למרות שהוא חם. הוא מתקרר תוך כדי לישה. \n-אם הבצק מרגיש לכם דביק מידי גם לאחר הלישה תפזרו עליו עוד מעט קמח.\n-שימו לב לא ללוש יותר מידי ולא חזק מידי.\n.\nנכון שזה ממש פשוט? \nיאללה אני רוצה לראות פה מלא ניוקים באוויר 😉\n.\nואם בטעות אתם עדיין לא עוקבים, זה הזמן להתחיל ❤️\n.\n.\n#ניוקי #gnocchi #מתכון #מתכוןקל #מתכוניםקלים #צמחוני #טבעוניטעים #OldCityJerusalem_ii", "owner": "דני גיל-אָנִי בְּשוּק", "username": "ani.beshuk", "hashtags": ["oldcityjerusalem_ii", "טבעוניטעים", "מתכוניםקלים", "מתכון", "צמחוני", "gnocchi", "מתכוןקל", "ניוקי"], "user_tags": [], "collection": "Meals", "id": 223, "clean_title": "ניוקי ביתי ממרכיב אחד בלבד"}, {"url": "https://www.instagram.com/reel/C4dpnZpo-yF/", "title": "CARAMELISED ONION LINGUINE 😍🧅", "caption": "CARAMELISED ONION LINGUINE 😍🧅 \nWritten recipe and measurements are on the link on my profile 🥰❤️🇮🇹\n\nIf you’re looking for a quick dinner recipe, you have to try my super easy (and super creamy) caramelised onion pasta 🤤\n\nTo make it super creamy my secret is to add a mixture of egg yolks and Parmigiano cheese at the very end. Make sure you turn off the heat when you add it otherwise you’ll make scrambled eggs which is not mamma mia 🤣\n\nWho is going to try it? 😋\n\n#pasta #italian #italianfood #italy #food #foodie #recipe", "owner": "Angelo Coassin", "username": "cookingwithbello", "hashtags": ["pasta", "italianfood", "italy", "recipe", "food", "italian", "foodie"], "user_tags": [], "collection": "Meals", "id":  ופטה ברוטב מייפל לימוני", "caption": "מתכון לסלט תרד עם תפוחים, פקאנים ופטה ברוטב מייפל לימוני\n\nמה צריך?\n200 גרם עלי תרד בייבי שטוף\nצרור לבבות חסה קיסר חתוך גס\n2 תפוחים פינק ליידי חתוכים דק (לערבב אותם ישר עם מיץ מחצי לימון)\nבצל סגול חתוך לרצועות דקות\nצרור בצל ירוק חתוך גס (רק החלק הירוק)\nסלסלת פטריות שמפיניון שטופות או מקולפות ופרוסות דק\n250 גרם גבינת פטה או בולגרית מעודנת חתוכה לקוביות\n200 גרם פקאנים קלויים (ניתן גם מלוחים)\n\nלרוטב-\nרבע כוס שמן זית\nרבע כוס מייפל טבעי / דבש\nמיץ מלימון וחצי טרי\nכפית חרדל\nכפית מלח (שטוחה)\nלערבב היטב הכל, מומלץ לטחון במעבד מזון.\nניתן להוסיף עוד לימון במידת הצורך.", "owner": "Tomer Umansky", "username": "tomerumansky", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 227, "clean_title": "מתכון לסלט תרד עם תפוחים, פקאנים ופטה ברוטב מייפל לימוני"}, {"url": "https://www.instagram.com/reel/C12H9O5xyiP/", "title": "Three-Fungi Alfredo Rigatoni 🍝", "caption": "Three-Fungi Alfredo Rigatoni 🍝 \n\nIngredients:\n\n0.5 lb rigatoni\n2 shallots, finely chopped\n1/2 cup Parmesan cheese, grated\n3 tbsp olive oil\n0.5 lb assorted mushrooms, cleaned and sliced (I recommend a mix of white, portobello, and baby bella mushrooms)\n2 tbsp unsalted butter\n1 clove garlic, minced\n1 ½ cups heavy cream\nSalt & black pepper, to taste\n1 1/2 tbsp Dan-O’s Cheesoning seasoning\n\nFor serving:\n\n2 tbsp fresh parsley, chopped\n2 tbsp Parmesan cheese, shaved or sliced\n\nInstructions:\n\n1. Cook the rigatoni in a large pot of boiling salted water according to the package instructions until al dente. Drain, reserving 1 cup of the pasta water.\n2. In a large skillet, heat the olive oil over medium-high heat. Add the chopped shallots, sautéing until translucent.\n3. Add the sliced mushrooms and cook until they release their moisture and it evaporates.\n4. Stir in the butter and minced garlic, cooking until the butter is fully melted and the garlic is fragrant.\n5. Pour in the heavy cream and season with Cheesoning, salt, and black pepper. Let it simmer for about 4 minutes.\n6. Add the al dente rigatoni and grated Parmesan cheese to the skillet. Toss to combine, gradually adding the reserved pasta water as needed to achieve a creamy sauce consistency.\n7. Continue cooking for an additional 3 minutes, ensuring the pasta is well-coated and heated through.\n8. Serve hot, garnished with freshly chopped parsley and shavings or slices of Parmesan cheese.\n\n#pasta #pastapasta #rigatoni #mushrooms #alfredo #easymeals #easyrecipeideas #foodsteer \n•\n•\nVideo by: @breadbakebeyond", "owner": "Foodsteer", "username": "foodsteer", "hashtags": ["mushrooms", "pasta", "rigatoni", "foodsteer", "easyrecipeideas", "alfredo", "easymeals", "pastapasta"], "user_tags": [], "collection": "Meals", "id": 228, "clean_title": "Three-Fungi Alfredo Rigatoni"}, {"url": "https://www.instagram.com/reel/C3VXChpLhF9/", "title": "If you love citrus, you’re going to want to try this Frozen Limoncello Cocktail🍋✨ It’s smooth, refreshing, and absolutel", "caption": "If you love citrus, you’re going to want to try this Frozen Limoncello Cocktail🍋✨ It’s smooth, refreshing, and absolutely delicious🤩 Tag a friend that loves limoncello! 💛 Inspired by: @liv.yah #frozenlimoncellococktail #frozen #limoncello #cocktail #lemon #citrus #citruscocktails #lemoncocktails #frozencocktails #refreshing\nIngredients:\n-Ice\n-Scoop of lemon sorbet\n-2 oz. limoncello\n-Juice from half a lemon\n-2 oz. prosecco or sparkling wine", "owner": "Cocktails (21+ to follow)", "username": "cocktails", "hashtags": ["frozenlimoncellococktail", "citrus", "cocktail", "limoncello", "lemon", "refreshing", "frozencocktails", "frozen", "lemoncocktails", "citruscocktails"], "user_tags": [], "collection": "Meals", "id": 229, "clean_title": "Ingredients"}, {"url": "https://www.instagram.com/reel/C3YVZp-JsL8/", "title": "EP 3 of HEALTHY COMFORT FOOD: golden girl curry 🧡🌞follow @healthygilrkitchen for more!", "caption": "EP 3 of HEALTHY COMFORT FOOD: golden girl curry 🧡🌞follow @healthygilrkitchen for more! \n\ningredients: \n1 finely diced yellow onion\n3 cloves minced garlic\nSpice blend: 1 tsp curry powder, 1/2 tsp coriander, 1/2 tsp paprika, 1/2 tsp turmeric powder, 1/2 tsp cumin, 1/4 tsp chili powder, 1/2 tsp ground ginger, 1 tsp salt, pinch pepper\n1 cup cherry tomatoes \n1 head cauliflower chopped in small pieces\n2 tbsp olive oil\n3 cans butter beans or chickpeas rinsed and drained\n1 cup veggie broth\n1/2 cup unsweetened coconut cream\n2 cups shredded kale or spinach \nGarnish: cilantro + coconut cream as pictured \nServe over rice or with bread \n\nHow to: \n1. Chop and prep onion, garlic, cauliflower. Rinse beans and drain. \n2. In a large pot or pan saute onion and garlic in olive oil on medium heat until translucent. Add spices and saute another minute.\n3. Add in cauliflower and tomatoes. Saute for another 5 minutes.\n4.  Add veggie broth to deglaze the pan. \n5. Add in butter beans. Stir. Cover and simmer 20 minutes. \n6. Add in coconut cream. Blend using immersion blender. Add in kale then cover and cook another 5 min. \n7. Garnish with cilantro. Serve over rice or with pita/naan.\n8. Enjoy! \n\n#vegan #curry #comfortfood #healthy #healthydinner #dairyfree #glutenfree #easydinner #onepot #recipeshare #recipeoftheday #easymeals #mealprep #healthyeating #vegetarian", "owner": "Danielle Brown | healthy recipes", "username": "healthygirlkitchen", "hashtags": ["healthydinner", "dairyfree", "healthy", "easydinner", "recipeshare", "easymeals", "onepot", "vegan", "mealprep", "recipeoftheday", "vegetarian", "healthyeating", "curry", "glutenfree", "comfortfood"], "user_tags": [], "collection": "Meals", "id": 230, "clean_title": "EP 3 of HEALTHY COMFORT FOOD: golden girl curry follow for more"}, {"url": "https://www.instagram.com/reel/C22Gdm7ghmX/", "title": "This simple but flavorful sweet potato peanut curry is a one pan meal that can be made in just about 30 minutes. ☺️ All ", "caption": "This simple but flavorful sweet potato peanut curry is a one pan meal that can be made in just about 30 minutes. ☺️ All you need are a few pantry staples like sweet potatoes, peanut butter, coconut milk and chickpeas. Serve over rice for a satisfying easy vegan dinner option.👏👏👏\n\n📌SAVE this post and follow @dietitiandebbie for more plant-based recipes and tips.💚💚\n\nINGREDIENTS\n1 tablespoons olive oil\n1 medium sweet potato, chopped\n1/3 cup chopped onion\n1 bell pepper, chopped\n2 cloves garlic, minced\n1 (15 oz) can fire roasted diced tomatoes\n1 (15 oz) can lite coconut milk\n1/3 cup creamy peanut butter\n1 tablespoon sriracha sauce\n1 tablespoon red curry paste\n1/2 tablespoon ginger paste or fresh grated ginger\n1 (15 oz) can chickpeas, drained\n1 (5 oz) bag baby spinach\nSalt, to taste\n\nDIRECTIONS\nAdd the olive oil, sweet potato, onion, and bell pepper to a pan. Sauté for 5 minutes over medium heat or until onion is translucent. Add the garlic and cook another minute. \nStir in the tomatoes, coconut milk, peanut butter, sriracha, curry paste, and grated ginger. Bring to a simmer and cook for 8-10 minutes or until sweet potatoes start to soften. \nStir in the chickpeas and spinach. Cook another 3-5 minutes or until the potatoes are fork tender and spinach is wilted. Taste and add salt if needed.\nServe over cooked rice or favorite grain. Garnish with fresh cilantro if desired. \n\n#dietitiandebbie #feedfeedvegan #veganbowls #curry #onepotmeal #healthyrecipe #vegandinnerrecipe", "owner": "Deborah Murphy MS, RD | Plant-Based Recipes", "username": "dietitiandebbie", "hashtags": ["healthyrecipe", "onepotmeal", "vegandinnerrecipe", "dietitiandebbie", "curry", "veganbowls", "feedfeedvegan"], "user_tags": [], "collection": "Meals", "id": 231, "clean_title": "This simple but flavorful sweet potato peanut curry is a one pan..."}, {"url": "https://www.instagram.com/p/C3QaAEhoOM4/", "title": "👉 @shanesmithpt is the guy to follow to stop wasting time on bs fitness tips!", "caption": "👉 @shanesmithpt is the guy ional) and the toppings.⁣\n▪️Cover and refrigerate overnight ⁣\n⁣\n#strawberrycheesecake #overnightoats #oats #breakfastideas #mealprep #mealpreprecipes #breakfast", "owner": "Divya Sharma | Healthy & Easy Recipes", "username": "doctorbowl", "hashtags": ["oats", "breakfast", "mealpreprecipes", "mealprep", "overnightoats", "strawberrycheesecake", "breakfastideas"], "user_tags": [], "collection": "Meals", "id": 236, "clean_title": "RECIPE BELOW ⁣"}, {"url": "https://www.instagram.com/p/C28RcpnyzFw/", "title": "Which of these viral pasta recipes by @maxiskitchen would you love to try - 1, 2 or 3? 🍝 Full recipes and instructions f", "caption": "Which of these viral pasta recipes by @maxiskitchen would you love to try - 1, 2 or 3? 🍝 Full recipes and instructions for every video is in the comment section below and tag a friend who would love these! 👇🏼", "owner": "Eating Healthy Today", "username": "eatinghealthytoday", "hashtags": ["meatlessmondays", "pasta", "flavorful", "yummy", "nutritious", "foodporn", "pastaaddict", "healthyrecipes", "pastalover", "foodvideo", "vegan", "homemade", "vegetarian", "healthylifestyle", "cleaneating", "deliciousfood", "foodie", "healthycooking", "cookingvideo", "easyrecipes"], "user_tags": [], "collection": "Meals", "id": 237, "clean_title": "Which of these viral pasta recipes by would you love to try - 1,..."}, {"url": "https://www.instagram.com/reel/C269Ja7ISI3/", "title": "פודינג שיבולת שועל וצ׳יה ✨🌾🍓🍫", "caption": "פודינג שיבולת שועל וצ׳יה ✨🌾🍓🍫\n\nמצרכים🛒\n3/4 כוס שיבולת שועל עבה\n3/4 כוס חלב (רגיל/שקדים/אורז/דל לקטוז…)\n2 כפות צ׳יה\nכף מייפל \n2 תותים \nקצת שוקולד חלב/מריר\n\nאופן ההכנה 👩🏻‍🍳\nמניחים בכוס את השיבולת שועל, צ׳יה, תותים, מייפל וחלב,\nומערבבים.\nמכסים ומכניסים למקרר ללילה.\nלמחרת ממיסים את השוקולד ומורחים מעל,\nמכניסים למקרר לעוד 15 דקות להתקשות השוקולד,\nובתאבון 🫶🏻🌾🍁🍓🍫🥛\n\n**להמסה קלה ומהירה, שימו את השוקולד בשקית,\nוהכניסו לכמה דקות לכוס מים רותחים (שימו לב שלא יכנסו מים לשקית, אחרת זה לא יעבוד).\nלאחר מכן מוציאים את השק e, colourful + comforting bowls of goodness, perfect for a sumptuous midweek meal 🤤\n\nEach pasta sauce will champion a seasonal vegetable, and I’ll show you how best to to turn it into something seriously saucy with just a handful of simple ingredients 👨🏻‍🍳\n\nAlong the way, I’ll be teaching you all my tips + tricks to make sure you’re getting your pasta sauce as saucy as can be at home…\n\nSo, if you like pasta as much as me, make sure you follow along for a new pasta recipe each week. \n\nAnd let me know in the comments below where you’d like me to start 👇\n\nI hope you’re as excited as I am 🤤\n\nAlfie x\n\n#pasta #sauce #series #comfortfood #easyrecipes", "owner": "ALFIE STEINER", "username": "alfiecooks", "hashtags": ["coyg", "pasta", "series", "sauce", "comfortfood", "easyrecipes"], "user_tags": [], "collection": "Meals", "id": 242, "clean_title": "WELCOME TO SAUCY PASTAS"}, {"url": "https://www.instagram.com/reel/C21EitVOzQA/", "title": "This is my favorite way to cut spaghetti squash to get long strands that actually look like spaghetti. You can stuff it ", "caption": "This is my favorite way to cut spaghetti squash to get long strands that actually look like spaghetti. You can stuff it with so many combinations like this creamy alfredo-like sauce made with butter, cream cheese and mozzarella cheese. 🍝\r\n\r\nINGREDIENTS\r\n1 spaghetti squash\r\n2 tablespoons butter\r\n½ teaspoon salt \r\n½ teaspoon black pepper\r\n4 tablespoon cream cheese\r\n1 cup mozzarella cheese\r\n1 cup baby spinach\r\nINSTRUCTIONS\r\n1. Preheat oven to 400°F degrees. Fill a baking sheet with about 1-inch of water. \r\n2. Cut spaghetti squash in half crosswise, scoop out the seeds and discard. Place cut side down in the prepared baking sheet and bake until tender, about 45 minutes\r\n3. Use a fork to pull apart the strands of squash that look like spaghetti and set half them aside. Season the spaghetti squash halves with salt and pepper, and then add butter, cream cheese an half the mozzarella cheese. Stir it together to combine. Then add the spinach and reserved spaghetti squash, season with salt and pepper and top with the remaining mozzarella cheese. \r\nBroil for 3-4 minutes until the cheese is bubbly and melted. Enjoy immediately.", "owner": "Yumna | Feel Good Foodie", "username": "feelgoodfoodie", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 243, "clean_title": "This is my favorite way to cut spaghetti squash to get long..."}, {"url": "https://www.instagram.com/reel/C2pIv4-M_bU/", "title": "סלט מלפפונים ברוטב חמאת בוטנים🥒🥢", "caption": "סלט מלפפונים ברוטב חמאת בוטנים🥒🥢\nשוטפים טוב מלפפונים גדולים ומקלפים גזר אחד.\nעם קולפן שעושה רצועות שאפשר לקנות בכל סטוק מקלפים את המלפפונים עד שמגיעים לליבה של המלפפון עוצרים. אנחנו רוצים רק את החלקים הקשים.\nאותו הדבר עם הגזר.\nקוצצים צ׳ילי חריף ובצל ירוק.\nמרתיחים חזה עוף ל15 דקות בערך עד שנהיה מוכן וחותכים לרצועות.\nלרוטב:\n2 כפות חמאת בוטנים\nמיץ מחצי לימון סחוט\nשן שום כתושה\nכפית שמן שומשום\nכף סויה\nקצת מלח וצ׳ילי גרוס\nרבע/חצי כוס מים קרים (תלוי במרקם שאתם רוצים)\nאם רוצים יותר דליל תשימו חצי כוס.\nמערבבים היטב ומרכיבים את הסלט.\nהוספתי גם נבטים (לדעתי מוסיף ברמות אבל אפשר לוותר)\nמניחים את כל המרכיבים בקערה ושופכים את הרוטב. מערבבים היטב ומוסיפים את הבצל ירוק והצ׳ילי החריף.\nמעל שמתי קצח (מי שלא אוהב שישים שומשום שחור) ושקדים קצוצים (עדיף בוטנים)\nאוכלים עם צ׳ופסטיקס🥢 ויוצא מושלם!!!\nבתאבון🫶🏻🫶🏻🫶🏻", "owner": "Elad Levi 🫧", "username": "elad_levi14", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 244, "clean_title": "סלט מלפפונים ברוטב חמאת בוטנים"}, {"url": "https://www.instagram.com/reel/C2umoNbIQks/", "title": "עם ישראל צ'אי - משקה שקדים סטייל סחלב 🥛", "caption": "עם ישראל צ'אי - משקה שקדים סטייל סחלב 🥛 \nחם מפנק ומנחם לחורף - עם הצ'אי שקדים של ויסוצקי\n\nמצרכים:\n1 תיון צ'אי שקדים ויסוצקי\n2 כוסות מים חמים\n2 כוסות חלב\n4 כפות סוכר\n4 קוביות שוקולד לבן\n0.5 כפית מחית וניל (או תמצית)\n4 כפות קורנפלור\n2 מקלות קינמון\nקמצוץ מלח\n\nלטופינג מלמעלה:\n- מפזרים על צלחת ס life’ 🍚 series is a hawaiian inspired salmon poke bowl!", "caption": "next on my ‘rice is life’ 🍚 series is a hawaiian inspired salmon poke bowl! \n\nthe seasonings used are inspired by hawaiian poke making it light yet incredibly satisfying. this is a no cook recipe (except for the rice) and it’s perfect when you want a quick and nourishing meal. just a bit of chopping and mixing is all that’s really needed. also makes for a great meal prep option! full recipe link in bio :)\n\n#rice #poke #ricebowls #pokebowls #salmonpoke #ricerecipes #pescatarian #homecookedmeals #hawaiianpoke #easymeals #pescatarianrecipes #연어덮밥", "owner": "Jecca ⍥", "username": "jeccachantilly", "hashtags": ["ricebowls", "rice", "salmonpoke", "pescatarian", "연어덮밥", "ricerecipes", "homecookedmeals", "pescatarianrecipes", "easymeals", "hawaiianpoke", "poke", "pokebowls"], "user_tags": [], "collection": "Meals", "id": 247, "clean_title": "next on my ‘rice is life’ series is a hawaiian inspired salmon..."}, {"url": "https://www.instagram.com/reel/C2R46FSIjF1/", "title": "Pasta spinaci e ricotta ❤️", "caption": "Pasta spinaci e ricotta ❤️\nIn soli 15 minuti\n\nIngredienti:\n300 g di spaghetti \n300 g di spinaci\nDue cucchiai abbondanti di ricotta\nUna manciata di pinoli o mandorle\nParmigiano\nOlio extravergine d’oliva \nAcqua di cottura \nSale\nPepe\n\nLa proverai? Fammi sapere qui sotto 🙋🏻‍♀️\n\n#pasta #ricettefacilieveloci #food #recipes", "owner": "Carmen Rose", "username": "carmen.rose", "hashtags": ["pasta", "recipes", "food", "ricettefacilieveloci"], "user_tags": [], "collection": "Meals", "id": 248, "clean_title": "Pasta spinaci e ricotta"}, {"url": "https://www.instagram.com/reel/C2QG-MJIvZ4/", "title": "Honey Chicken 😍😍 this is so banging my new favourite and healthier fakeaway 👌", "caption": "Honey Chicken 😍😍 this is so banging my new favourite and healthier fakeaway 👌\n\nSAVE this recipe for later!\n\nHere’s your shopping list:\n2 egg whites.\n1/2 tsp of white pepper.\nTsp of sesame oil.\n300g chicken breast - cut into 3cm cubes.\n50g of cornflakes.\n1/2 tsp salt.\n1/2 tsp smoked paprika.\nTsp of extra virgin olive oil, for baking.\n3 tbsp runny honey.\n2 tbsp of water.\nTbsp rice wine vinegar.\nTsp of custard powder.\nTsp of sesame oil.\n15g of ginger - grated.\n\nTo serve:\n250g of cooked white rice. \nSesame seeds, to garnish.\n\n#Honey #Chicken #TheGoodBite #HighProtein #Healthy #Recipe", "owner": "The Good Bite", "username": "thegoodbite", "hashtags": ["healthy", "thegoodbite", "highprotein", "recipe", "honey", "chicken"], "user_tags": [], "collection": "Meals", "id": 249, "clean_title": "Honey Chicken this is so banging my new favourite and healthier..."}, {"url": "https://www.instagram.com/p/C2SPpRDqNYR/", "title": "Blending seamlessly city and nature: two homes for high-tech in the heart of Tianfu Software Park! 💡🌱", "caption": "Blending seamlessly city and nature: two homes for high-tech in the heart of Tianfu Software Park! 💡🌱\n\nLocated in the southeast of Chengdu, MVRDV’s design for Tianfu Software Park consists of a 150-metre-tall tower and a four-storey cultural centre. The dramatic centrepieces of the campus are the office tower’s full-height atrium filled with lush cascading greenery, and the faceted sloping form of the cultural centre inviting visitors to climb both its green roof and terraced interiors.\n\nDeveloped by Chengdu High-Tech Investment Group, the office tower will host companies focused on developing high-tech interests, such as 5G, AI, big data, Satellite Internet, and more. The cultural centre will include an art museum, a conference hall, a library, and an exhibition space.\n\n“In our designs for both office tower and cultural centre, the atrium is key”, says MVRDV founding partner Winy Maas. “Though they take different forms – one more vertical and the other terraced and traversable – both atria serve the same Functions. They bring in greenery, they connect the buildings from bottom to top, they provide shading and ventilation that make the buildings sustainable, and most importantly, they make these buildings exciting, social places to be.”\n\nRenders @atchain\n\n#mvrdv #chengdutianfu #architecture #china #chengdu #sustainability #cultural #office #greenification #urbanism", "owner": "MVRDV", "username": "mvrdv", "hashtags": ["chengdutianfu", "sustainability", "mvrdv", "greenification", "architecture", "china", "cultural", "office", "urbanism", "chengdu"], "user_tags": [], "collection": "Meals", "id": 250, "clean_title": "Blending seamlessly city and nature: two homes for high-tech in..."}, {"url": "https://www.instagram.com/reel/CzUCarIIAs5/", "title": "בלונדיז שוקולד מריר, חמאה חומה ואספרסו🤎", "caption": "בלונדיז שוקולד מריר, חמאה חומה ואספרסו🤎\n.\n.\nעוגה חדשה לשבוע חדש. \nשכל אחד שנכנס אליי לפגישה יקבל חיבוק מתוק, ממליצה גם לכם למלא את הבית בדברים טובים לרומם את הנפש.\nאז הכנתי בלונדיז מפנקים שממש קל להכין, שידרגתי עם חמאה חומה כי אני אוהבת וכמובן שזה ממש לא חובה.\n\nאז יאללה, בואו למטבח😇\n\nמה צריך? \n• 110 גר׳ חמאה\n• 1 ביצה+ חלמון\n• 50 גר׳ סוכר חום+ 50 גר׳ תחליף סוכר או סוכר- השתמשתי בתחליף\n• 1 כוס קמח לבן\n• 1 שוט אספרסו\n• כפית תמצית וניל/ מחית\n• 100 גר׳ שוקולד צ׳יפס מריר+ 25 גר׳ שוקולד מריר איכותי קצוץ\n• 1/3 כפית מלח+ קורט שבבי מלח/ גס\n• 1/2 כפית קינמון טחון\n \nמה עושים? \nחממו את התנור ל175 מעלות צלזיוס.\nבשלו את החמאה כמה דקות תוך כדי ערבוב תמידי- עד שהיא הולכת לחומה עם ריח אגוזי וישר הורידו מהגז.\nהעבירו לקערה והוסיפו את הסוכר, ביצים, אספרסו ותמצית וניל תוך כדי טריפה במטרפה.\nהוסיפו קמח, קינמון, שוקולד צ׳יפס, מלח וערבבו. \nסדרו בתבנית אינגליש מרופדת בנייר אפיה, הוסיפו מעל שוקולד קצוץ ומלח והכניסו ל20-22 דקות בתנור.\nצננו לפחות כשעה וחתכו.\n\nאת העוגה חילקתי ל14 חתיכות, הערכים לחתיכה-\n✔️קלוריות-130\n✔️חלבון-2 גר׳\n✔️פחמימה-12 גר׳\n✔️שומן-9 גר׳\nאוהבת אתכם❤️\n\n#blondie #blondes #brownsugar #food #sweet #nutrition #mentalhealth #israel #war #מתכונים #בלונדיז #עוגה #תזונה #אפיה #bake #recipe #standwithisrael", "owner": "Adi Cohen | דיאטנית קלינית", "username "nourishedbynic", "hashtags": ["oatmeal", "easybreakfast", "easyrecipeideas", "easymeals", "mealprep", "overnightoats", "healthybreakfast", "breakfastideas"], "user_tags": [], "collection": "Meals", "id": 253, "clean_title": "NOURISHED top recipes of 2023 ⬇"}, {"url": "https://www.instagram.com/reel/C1qH-UpLQy8/", "title": "Growing up, there was not one ailment that wasn’t treated with a bowl of pastina. Winter cold, belly ache, sore throat, ", "caption": "Growing up, there was not one ailment that wasn’t treated with a bowl of pastina. Winter cold, belly ache, sore throat, hang nail… you name it, it was treated with pastina.  It was considered a cure-all.  My Mother and Grandmother would disappear into the kitchen only to re-emerge with a steaming bowl of this soup and soon you would be feeling better.  It was nourishing, and cozy and comforting and exactly what the doctor ordered. \nPastina in brodo means tiny pasta in broth. \nThis soup happens when the most minimal ingredients come together to make something pretty fabulous. \nThis is the tomato version as opposed to the OG pastina soup.  It’s made by adding a can of tomato paste and allowing it to caramelize slightly.  It’s simple and delicious. \n.\n** Yes, Ronzoni has discontinued their Pastina, but I’ve been able to find other brands still on the grocery shelves.  If you can’t find it where you live, just substitute out for another small pasta shape like Acini de Pepe, Stelline, Orzo, Ditalini, Alphabet Pasta\n.\n.\nTomato Pastina Soup\n.\n.\n1/4 cup olive oil\n2 carrot,  chopped\n1 medium onion, chopped \n3 cloves garlic, chopped \n5 sprigs thyme (tied together with kitchen string) \n1 6oz can tomato paste \nKosher salt and black pepper to taste \nPinch of chili flakes \n1 piece parmesan cheese rind\n2 quart chicken stock \n2 cups  pastina pasta \n6 basil leaves ripped apart \n1/2 cup grated parmesan cheese\n\nHeat the oil in a saucepan. Add the onion, garlic and carrot and cook until softened and aromatic, about 5 minutes. Add the tomato paste and let cook for about 5 minutes.  The paste will begin to caramelize which intensifies the flavor. \nAdd the thyme, Parmesan rind and broth and season with salt and pepper, scraping the bottom of the pot to deglaze it.  Bring to a boil, reduce to a simmer and cook for 10 minutes.\nAdd the pastina and stir well. Let simmer for 8 to 10 minutes or until the pasta is cooked. If it gets to thick and to much broth has been absorbed into the pastina, just add some water to loosen it up.  Remove the thyme sprigs and parmesan rind and stir in the basil.  Check for seasoning.  Serve in bowls with grated Parmesan.\n.\n.\n.", "owner": "Diane Morrisey", "username": "dianemorrisey", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 254, "clean_title": "Growing up, there was not one ailment that wasn’t treated with a..."}, {"url": "https://www.instagram.com/reel/C0P8bwCPBvA/", "title": "The creamiest orzo you ever did lay eyes on. We just found your easy dinner for you. Full recipe can be found through ou", "caption": "The creamiest orzo you ever did lay eyes on. We just found your easy dinner for you. Full recipe can be found through our link in bio. \n\nCover 📷 @gaylemcleod \n\n#orzo #easydinner #dinnerideas #risotto #pasta #pastalover", "owner": "The Modern Proper", "username": "themodernproper", "hashtags": ["pasta", "risotto", "easydinner", "pastalover", "orzo", "dinnerideas"], "user_tags": [], "collection": "Meals", "id": 255, "clean_title": "The creamiest orzo you ever did lay eyes on. We just found your..."}, {"url": "https://www.instagram.com/reel/C174YD9pnY8/", "title": "Consider dinner sorted this week with any (or all) of these super easy & super tasty recipes!!🥣❤️‍🔥✨", "caption": "Consider dinner sorted this week with any (or all) of these super easy & super tasty recipes!!🥣❤️‍🔥✨\n\n1️⃣ Spinach & Feta Pasta\n2️⃣ Bacon & Gouda Twice-baked Potatoes\n3️⃣ Creamy Garlic Tortellini\n4️⃣ Crispy Prosciutto & Parmesan Cream G pper to taste\n\nInstructions:\n1. Cook pasta according to package instructions then set aside to cool.\n2. Chop the veggies, set aside, then chop your shred the chicken.\n3. Prepare the dressing: I mixed everything together in the video then realized it needed to be blended so… add all dressing ingredients to a food processor or blender and blend until smooth. If too thick add some more water to thin it out. \n4. To 4 glass jars add dressing, then layer with cucumber, chicken, pasta, lettuce, and Parmesan cheese. \n5. Store in the fridge for up to 4 days!\n\n#pastasalad #saladrecipe #mealprepidea #mealprep #healthyrecipes #healthylunch #highprotein", "owner": "Marianna Moore", "username": "mariannas_pantry", "hashtags": ["mealprepidea", "saladrecipe", "healthyrecipes", "mealprep", "highprotein", "healthylunch", "pastasalad"], "user_tags": [], "collection": "Meals", "id": 258, "clean_title": "Chicken Caesar protein pasta salad jars!! Probably one of my..."}, {"url": "https://www.instagram.com/reel/C1sH333PRBO/", "title": "crispy sesame salmon bites 🔥", "caption": "crispy sesame salmon bites 🔥\n\n✨Comment “send recipe” below and we’ll send the recipe straight to your inbox\n\n✨ingredients \n▫️1lb salmon fillet, skin removed + cut into cubes\n▫️season with 1/2 tsp garlic powder + 1/4 tsp ground ginger + kosher / coarse sea salt + black pepper (to taste)\n\n✨sauce:\nwhisk together \n▫️1/4 cup coconut aminos (can also sub with gluten-free tamari or low-sodium sauce if you’re not gluten-free)\n▫️3 tbsp honey, maple syrup or preferred sticky liquid sweetener\n▫️1 tsp toasted sesame oil (adds a hint of nuttiness - can omit if preferred or sub with 1/2 tsp tahini or even 1/4 tsp creamy almond butter)\n▫️1-2 tsp Sriracha , or preferred hot sauce, to taste or omit if sensitive to spice\n▫️1 tsp rice wine vinegar or 1/2 tsp apple cider vinegar \n\n✨marinate salmon for 20 mins.\n\n✨air fry at 390F 6-8 mins (or until crispy + golden shaking / flipping halfway through)\nOR \n▫️ba
