ך 15 דקות. \nבקערה נערבב את הביצים וכל התבלינים \nבקערה שנייה נערבב את הפירורי לחם והשומשום \nנקח כל פרח כרובית נטבול בקערה של הרוטב ונעטוף את הפרח טוב טוב ברוטב ואז נטבול בפירורי לחם \n•ממליצה ביד אחת לטבול את הפרח ברוטב וביד השנייה בפירורי לחם \n\nנסדר את כל הפרחים בתבנית \nנרסס מעל הכל קצת שמן \nנאפה בתנור על טורבו 180 מעלות עד שמזהיב (בערך חצי שעה)\nובתיאבון ✌🏻❤️", "owner": "רותם עדיני", "username": "rotem_adini", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 266, "clean_title": "פרחי כרובית מצופים בפירורי לחם"}, {"url": "https://www.instagram.com/reel/C01oyKgIM_T/", "title": "הכל התחיל משם:) שעות על גבי שעות (כנראה ימים במצטבר) של ישיבה מול הפס, שאלות והטרדות לטבחים מכאן ועד להודעה חדשה, כל זה ", "caption": "הכל התחיל משם:) שעות על גבי שעות (כנראה ימים במצטבר) של ישיבה מול הפס, שאלות והטרדות לטבחים מכאן ועד להודעה חדשה, כל זה הביאנו עד הלום:)\nלכל מי שטרם נחשף, המנה המלאזית, כנראה האהובה עליי ביותר מאותם הימים, תכינו ותהנו\n\nהמנה המלאזית\n\nלפסטו מלאזית\n\n2 כוסות בזיליקום\nכוס וחצי כוסברה\n1 כף גדושה קארי אדום (מאוד אוהבת לאחרונה את של mae ploy)\n1/2 כוס בוטנים מטוגניפ קלופים\n1/2 פחית קרם קוקוס\n2 שיני שום\n1 כפית ג׳ינג׳ר\n1/2 כפית סוכר\n1/4 כפית מלח\n\nלהקפצה:\n\n1 בצל לבן פרוס לרצועות\n1 גמבה קטנה פרוסה לרצועות דקות\n1 מלפפון (רק הקשה שלו) פרוס לרצועות דקות\n1 כוס נבטים\n1 חזה עוף בגריל פרוס לרצועות (מתבלת בשמן זית מלח פלפל ומכניסה לתנור על 180 מעלות לבערך 20 דק עד שהעוף עשוי לחלוטין)\n1/2 פחית קרם קוקוס\n\n3 חבילות אטריות חיטה מוכנות להקפצה - יש להשרות במים רותחים 2 דק, לשטוף ולסנן, להפריד את האטריות בעדינות עם הידיים \n\nלקישוט:\n\nפרחי כוסברה\nבוטנים מטוגנים כתושים\n\nהוראות הכנה:\n\nלטחון את כל מרכיבי הפסטו בבלנדר / מג׳ימיקס.\nנוסיף לווק שמן ניטראלי ואז את הבצל. נשפוך את מחצית קרם הקוקוס ונבשל את הבצל על אש בינונית דקה.\nנוסיף את הפסטו ונגביר אש, נערבב כמה שניות ונוסיף את שאר הירקות והעוף. נקפיץ ונוסיף גם את האטריות, נערבב היטב ונגיש לוהט עם חופן של כוסברה ובוטנים קצוצים.\n\nועכשין לטיפים!!\n\n*את הבצל לא צריך לצרוב. רק לבשל אותו מעט בקרם הקוקוס וזה נותן לו מתיקות שמאוד מאפיינת את המנה.\n*שימו לב לא לרכך את הירקות! כל הכיף זה שהם קראנצ׳יים ופרש. \n*חשוב להשתמש בבוטנים מטוגנים כי יש להם טעם שונה מהקלויים. אני מצאתי במכולת השכונתית, נמכר בשקית, אבל בטוחה שיש גם בפיצוציות או איפה שמוכרים פיצוחים.\n*המנה המקורית היא עם שמנת אבל אני תמיד חשבתי שזה קצת כבד ואהבתי את המתיקות של קרם הקוקוס, תמיד הייתי מבקשת שיכינו לי אותה ככה אבל אם אתם מעדיפים אחרת - מוזמנים להחליף את קרם הקוקוס בשמנת. \n*חשוב לעבוד על חום גבוה בווק אבל, אם הגעתם למצב שהנוזלים מתאדים והמנה מתייבשת, תנמיכו רגע אש, תוסיפו קצת קרם קוקוס או אפילו מעט מים, תגבירו קצת ותערבבו.\n*נשאר לכם במקרר ואתם רוצים לחמם מחדש?? הסוד לטעים הוא פשוט להוסיף קצת נוזלים ולהקפיץ שנית. לא במיקרו!\n\nתהנו ❤️", "owner": "דנה מויאל רייכר |  יוצרת תוכן | אוכל אסייתי בקלות", "username": "danareicher", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 267, "clean_title": "הכל התחיל משם:) שעות על גבי שעות (כנראה ימים במצטבר) של ישיבה..."}, {"url": "https://www.instagram.com/reel/CzKTLIrs25z/", "title": "Good lord. I used to go back and forth daily on if I was a cookie girl or a brownie girl and this solidified it for me -", "caption": "Good lord. I used to go back and forth daily on if I was a cookie girl or a brownie girl and this solidified it for me - I’m a brownie girl. Espresso lover or not, these are a must try. Very subtle in espresso but rich in flavor of browned butter and melted chocolate. Not to mention legit THEEEEEEEE perfect texture ugh dreaming about them forever. Recipe is linked in my bio!", "owner": "Megan Sheley", "username": "megansheley", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 268, "clean_title": "Good lord. I used to go back and forth daily on if I was a..."}, {"url": "https://www.instagram.com/reel/CyyyjpWvebh/", "title": "Crispy Parmesan Potatoes👌 my preferred way of making potatoes. So crispy and good every time! I served it with a pesto a", "caption": "Crispy Parmesan Potatoes👌 my preferred way of making potatoes. So crispy and good every time! I served it with a pesto aioli, I hope y’all enjoy! Follow @thedailykale for more ✨\n\nWhat you need ⤵️\n•Potatoes\n•Parmesan (fresh grated or powdered, both work)\n•Spices \n\n-Cut potatoes and then place in boiling water for about 5-7 minutes until fork tender, but not falling apart. Drain. Place in a bowl, add oil to coat and then the spices: I use a heavy pinch of garlic powder, paprika, oregano, salt and pepper. Toss around. Add a lot of parmesan and toss again, until it’s coated on all sides. \n-Air fry at 400 for about 15 minutes (or until crispy) flipping halfway. Everyone’s air fryer is different so keep an eye on them! Cooking time may vary. \n\n#crispypotatoes #comfortfood #easyrecipe #potatoes", "owner": "Kristen Jorgensen", "username": "thedailykale", "hashtags": ["crispypotatoes", "easyrecipe", "potatoes", "comfortfood"], "user_tags": [], "collection": "Meals", "id": 269, "clean_title": "Crispy Parmesan Potatoes my preferred way of making potatoes. So..."}, {"url": "https://www.instagram.com/reel/CzbINl0IK8b/", "title": "עוגת שוקולד חמה תוך דקה במיקרוגל 🍫", "caption": "עוגת שוקולד חמה תוך דקה במיקרוגל 🍫\nמושלמת למי שיש מאנץ׳ ודודא למתוק\n\nמרכיבים לעוגה אישית אחת קטנה:\n2  כפות קמח תופח \n1  כף אבקת קקאו \n1  כף סוכר חום או לבן \n1  כף שמן קנולה (לא שמן זית)\n3  כפות חלב \n1  כף ממרח שוקולד גדושה (אפשר להשתמש בממרח שוקולד אגוזי לוז שאוהבים)\n\nאופן ההכנה:\n1: מוסיפים לכלי קטן שמתאים לחימום במיקרוגל את כל החומרים היבשים ומערבבים. אח״כ מוסיפים את החלב והשמן ומערבבים.\n2: מוסיפים כף גדושה ממרח שוקולד אגוזי לוז או ממרח שוקולד שאוהבים ומכניסים לדקה למיקרוגל ומוציאים בזהירות.\n3 מוסיפים עוד ממרח שוקולד מומס מלמעלה ושיהיה בתיאבון! אהבתם? פרגנו בלייק ותנו תגובה ❤️\n\nבשיתוף שיח מדיקל גרופ @seach \nאין באמור לעיל להוות תחליף לייעוץ רפואי ו/או מקצועי וכל מטרתם לספק מידע ובשום מקרה אינם בגדר המלצה או עצה רפואית ו/או חוות דעת רפואית מקצועית.\n\n#שוקולד #נוטלה #עוגתשוקולד #מתכוניםקלים #מתכוניםלילדים", "owner": "שחר חן - Shahar hen", "username": "shahar_hen_hayokra", "hashtags": ["מתכוניםקלים", "נוטלה", "מתכוניםלילדים", "שוקולד", "עוגתשוקולד"], "user_tags": [], "collection": "Meals", "id": 270, "clean_title": "עוגת שוקולד חמה תוך דקה במיקרוגל"}, {"url": "https://www.instagram.com/reel/CzBAmDUNycY/", "title": "מתכון לעוגיות שוקולד ״רעידת אדמה״", "caption": "מתכון לעוגיות שוקולד ״רעידת אדמה״\nמצרכים (12 עוגיות)-\n200 גרם שוקולד מריר \n40 גרם חמאה \n2 ביצים L בטמפ׳ החדר \n150 גרם סוכר \n20 גרם קקאו \n10 גרם קמח\n1/2 כפית אבקת אפיה\nקורט מלח \n100 גרם מטבעות שוקולד מריר \n\nאופן הכנה: \nמחממים תנור ל-180 מעלות (חום עליון תחתון).\nשמים בקערה שוקולד מריר וחמאה וממיסים בפולסים של 30 שניות עד שהכל נמס. שמים בינתיים בצד. \nבקערה נפרדת שמים ביצים וסוכר ומקציפים כ-2 דקות עד לתערובת בהירה. מוסיפים את תערובת השוקולד בפעמיים לתערובת הביצים ומערבבים. מוסיפים קקאו, קמח אבקת אפיה ומלח ומערבבים. מוסיפים מטבעות שוקולד מריר ומערבבים. ברגע שהתערובת מוכנה לוקחים כף גלידה ויוצרים בעזרתה את העוגיות על גבי מגש עם נייר אפיה (לשמור על רווחים בין העוגיות כי הן מתרחבות בתנור). \nאופים כ-13 דקות עד שהעוגיות מקבלות סדקים. \nכשהעוגיות יוצאות מהתנור והן עוד חמות ניתן לסדר את בצורה שלהן בעזרת רינג.\nלאחר מכן נותנים להם להתקרר לגמרי בטמפ׳ החדר כ-20-30 דקות ומגישים. \nמציעה לכם להכין כמות כפולה כי זה ממכרררר!! \n\n#עוגיותשוקולד#עוגיותשוקולד#שוקולד#chocolatecook#vira#viral#yummy#מתכון", "owner": "עדי כהן - סדנאות אפייה דיגיטליות | עוגות מעוצבות", "username": "adidicohen1990", "hashtags": ["viral", "yummy", "עוגיותשוקולד", "מתכון", "chocolatecook", "vira", "שוקולד"], "user_tags": [], "collection": "Meals", "id": 271, "clean_title": "מתכון לעוגיות שוקולד ״רעידת אדמה״"}, {"url": "https://www.instagram.com/reel/CxgN2h2PrPt/", "title": "Here's another healthy dessert idea!🍫 3-ingredient PB Swirl Brownies by @run2food", "caption": "Here's another healthy dessert idea!🍫 3-ingredient PB Swirl Brownies by @run2food \n\nGiving it a try this weekend? Comment down below if you loved it! 🥰\n\nMakes: 4 pieces\n\nINGREDIENTS:\n✅ 200g ripe bananas (2-3 bananas worth)\n✅ 4 tablespoons (60g) runny peanut butter\n✅ 1/3 cup (35g) cocoa powder\n*Optional: maple syrup or other sweetener if you want more sweetness\n\nTopping:\n✅ 2 tablespoons runny peanut butter\n\nMETHOD:\n1. Preheat the oven to 180 degrees C/360 degrees F. Grease a mini cake tin or line it with non-stick paper\n2. In a separate bowl, peel and mash the bananas until pureed.\n3. Add in the peanut butter, mix until will combined.\n4. Stir in the cocoa powder until no dry lumps remain and a thick batter forms\n5. Transfer to the prepared cake tin\n6. Drizzle peanut butter over the top and use a skewer or knife to swirl it into the batter\n7. Bake for 18-20 minutes until firm on the outside and still a bit soft on the inside\n8. Allow the brownie to cool before slicing and serving\n\n📸 @run2food \n\nLet us help you achieve your health goals this year!🌿 Make delicious and healthy meals at home. Plan your meals ahead and jumpstart your health with our new Vegan Bowls App.📱 Your new best friend in the kitchen!💚 (link in bio to download)\n\n#chocolate #chocolaterecipes #dessertideas #vegandesserts", "owner": "Max | Vegan Transformation Coach", "username": "veganbowls", "hashtags": ["dessertideas", "chocolate", "vegandesserts", "chocolaterecipes"], "user_tags": [], "collection": "Meals", "id": 272, "clean_title": "Here's another healthy dessert idea! 3-ingredient PB Swirl..."}, {"url": "https://www.instagram.com/reel/CvmyjTxNBxj/", "title": "These Monster Cookie Oat Cups are our latest obsession! Our friend @FitFoodieFinds created this viral recipe and we are ", "caption": "These Monster Cookie Oat Cups are our latest obsession! Our friend @FitFoodieFinds created this viral recipe and we are hooked! With a peanut butter base, layers of more peanut butter, chocolate, and mini M&Ms, it’s the perfect sweet treat to have on hand. Plus, they chill and freeze perfectly!\nINGREDIENTS \nOat Layer\n2 c quick-cooking oats\n½ c honey\n⅓ c peanut butter\n⅓ c mini chocolate chips\nChocolate Layer\n6 oz. dark chocolate chopped\n2 tsp coconut oil\nPeanut Butter Layer\n½ c all-natural creamy peanut butter\n1 tsp coconut oil\n¼ c mini M&M’s\n2 tbsp mini chocolate chips\nHead to @FitFoodieFinds for the full recipe \n#peanutbutter #dessert #chocolate #healthier #easyrecipes #fooddolls", "owner": "Alia & Radwa Elkaffas", "username": "fooddolls", "hashtags": ["peanutbutter", "fooddolls", "healthier", "chocolate", "dessert", "easyrecipes"], "user_tags": [], "collection": "Meals", "id": 273, "clean_title": "These Monster Cookie Oat Cups are our latest obsession! Our..."}, {"url": "https://www.instagram.com/reel/CyHBpFgy5xZ/", "title": "Honey Soy Chicken", "caption": "Honey Soy Chicken\n\nEasy to make and you can prep this advance for a busy week ahead. \n\n𝗜𝗡𝗚𝗥𝗘𝗗𝗜𝗘𝗡𝗧𝗦\n•1/4 cup soy sauce \n•3 tbsp honey \n•1/2 tbsp garlic \n•1 tsp sriracha (optional but add a nice flavour to it) \n•250g chicken thigh \n•200g cooked basmati rice \n•Greens of choice - I used broccolini and green beans \n\n𝗠𝗘𝗧𝗛𝗢𝗗\n\n1. In a bowl, mix soy sauce, honey, garlic and sriracha to create the marinade. \n2. Cut and marinate the chicken pieces in the sauce for at least 15 minutes or overnight\n3. Heat a pan over medium-high heat, add a bit of oil, and cook the marinated chicken until it’s fully cooked and slightly caramelised (this may mean cooking yours for longer than expected). Do not use all of the marinade when cooking. Add in a little bit of it but to get the same glaze as the video only add in a small amount of the marinade. Remove and set aside.\n4. In the same pan, stir-fry your veggies of choice.\n5. While the veggies cook, heat up your rice in the microwave.\n6. Serve the honey soy chicken over a bed of rice, alongside the stir-fried vegetables.\n7. Garnish with sesame seeds or chopped green onions, enjoy!\n\n𝗖𝗔𝗟𝗢𝗥𝗜𝗘𝗦 & 𝗠𝗔𝗖𝗥𝗢𝗦\nThis makes 2 servings. \nCalories 520\nP 33 | C 71 | F 11", "owner": "The Healthy Living Journal", "username": "thehealthylivi  זית\n0.5 כפית פלפל שחור\nכפית מלח שטוחה\n2 שיני שום כתושות\n1 צרור בזיליקום ללא הגבעולים\n\nלציפוי על הדג:\n1 חופן שקדים קלופים\n1 חופן פיסטוקים גרוסים\n\nאופן ההכנה:\n1: מבשלים תפוחי אדמה בסיר עם מים ומלח כשלושתרבע בישול ומעבירים לקערה עם מי קרח.\n2: מדליקים תנור על 200 מעלות חום עליון תחתון לא טורבו.\n3: הכנת הרוטב פסטו: בעבד מזון טוחנים חצי כוס שקדים, חצי כוס אגוזי מלך, חופן צנוברים, 1 צרור בזיליקום ללא הגבעולים, 2 שיני שום כתושות מלח פלפל וכוס שמן זית למרקם נוזלי. אפשר לתקן תיבול לפי טעם אישי ומי שרוצה את זה חלבי שיוסיף קצת גבינת פרמז'ן מגורדת.\n4: מוסיפים לקערה גדולה חופן עגבניות שרי צבעוניות (שרי, שרי תמר, שרי שוקולד, שרי כתום, צהוב) ואת תפוחי האדמה המבושלים ומוסיפים 2-3-4 כפות מרוטב הפסטו שעשינו, מעט מלח ומערבבים בעדינות היטב.\n5: מניחים על תבנית גדולה עם נייר אפייה את 2 נתחי הסלמון הגדולים במרכז התבנית, מוסיפים את העגבניות ותפוחי האדמה שערבבנו עם הפסטו, מורחים את חתיכות הסלמון בנדיבות ברוטב הפסטו, מוסיפים שקדים פרוסים מלמעלה ופיסטוקים גרוסים אם רוצים ואופים בתנור שחומם מראש ל-200 מעלות חום עליון תחתון לא טורבו כ-20-25 דקות (זהירות לא לייבש) אם אתם אוהבים את הסלמון במידת עשייה פחותה יותר שימו פחות זמן בתנור. תהנו ובתיאבון, אהבתם? פרגנו בלייק תגובה, זה חינם וזה עוזר המון :) ספרו לי מה דעתכם.\n\n#סלמון #פרווה #דגים #שבת #ארוחתצהריים", "owner": "שחר חן - Shahar hen", "username": "shahar_hen_hayokra", "hashtags": ["דגים", "ארוחתצהריים", "פרווה", "שבת", "סלמון"], "user_tags": [], "collection": "Meals", "id": 282, "clean_title": "סלמון בתנור ברוטב פסטו עם תפוחי אדמה ועגבניות פרווה"}, {"url": "https://www.instagram.com/reel/Cu2aKxSsaSd/", "title": "🫢🔥💕EP 1 QUICKIES: 15-Minute Spicy Peanut Noodles. 🤯Saucy, satisfying and wildly delicious, these plant-based peanut nood", "caption": "🫢🔥💕EP 1 QUICKIES: 15-Minute Spicy Peanut Noodles. 🤯Saucy, satisfying and wildly delicious, these plant-based peanut noodles are about to become a staple in your weeknight rotation. 🙏GRAB THE RECIPE NOW at plantyou dot com :) Love y’all, Carleigh\n.\n#vegan #noodles #peanutnoodles #quickmeal #quickrecipe #quickrecipes #15minutemeal #peanutnoodlerecipe #spicyrecipe #plantbased #veganfood #veganrecipe #vegannoodles #healthyfood #healthyrecipe #healthydiet #peanutbutter #veganism #whatveganseat", "owner": "Carleigh Bodrug", "username": "plantyou", "hashtags": ["peanutnoodlerecipe", "noodles", "veganism", "whatveganseat", "peanutbutter", "veganfood", "healthydiet", "plantbased", "healthyrecipe", "15minutemeal", "spicyrecipe", "vegan", "peanutnoodles", "quickmeal", "veganrecipe", "healthyfood", "vegannoodles", "quickrecipe", "quickrecipes"], "user_tags": [], "collection": "Meals", "id": 283, "clean_title": "EP 1 QUICKIES: 15-Minute Spicy Peanut Noodles. Saucy, satisfying..."}, {"url": "https://www.instagram.com/reel/CuJolnQKIw9/", "title": "🍊 orange tofu 🍊you’re going to want to add this to your tofu rotation asap. thanks to @ellysplate for the inspo on this ", "caption": "🍊 orange tofu 🍊you’re going to want to add this to your tofu rotation asap. thanks to @ellysplate for the inspo on this one. To make:\n\n1 block of firm tofu (300g)\n1/2 cup cornflour \n1tsp salt and pepper \n\n2.5tbsp light soy sauce\n1.5tbsp rice wine vinegar\n1 tsp agave or maple syrup\n1/2 tsp msg (if desired)\n1/2 tsp black pepper\n200ml orange juice\nZest of 1/2 orange\n1 spring onion \n1 clove garlic \n1tsp minced ginger \n1 chilli\n\n1tsp sesame oil \n—For the tofu, cut diagonally into triangles the coat in the cornflour and salt & pepper —fry in oil (or air fry) until crispy (takes about 10 mins) \n-for the sauce, mix 1 tsp sesame oil, 2.5 tbsp light soy sauce, 1.5 tbsp rice wine vinegar, 1 tsp agave or maple syrup, 1/2 tsp msg (if desired), 1/2 tsp black pepper\nAnd 200ml orange juice + zest of 1/2 orange\n-fry some minced garlic, ginger and chopped chilli in a splash of sesame oil until fragrant\n-add the sauce and add a cornflour slurry to thicken (cornflour and water)\n-add your tofu back and serve on a bed of rice, top with sesame seeds and spring onions and drizzle over c ad hits. #plantbaseddiet #eatmoreplants #bigsalad #seinfeld\n.\n.\n.\n.\n.\n.\n#healthyish #intuitiveeating #veganfood #mealprep #mealprepping #plantbasedrecipes #saladrecipes #memorialdayfood #holidayweekend #friday #weekend #allfoodsfit #mindfuleating #plantbasednutrition #saladideas #thenewhealthy #healthyish #basilrecipes", "owner": "mary elizabeth", "username": "radiatefoodvibes", "hashtags": ["seinfeld", "friday", "weekend", "veganfood", "mealprepping", "healthyish", "intuitiveeating", "basilrecipes", "plantbasedrecipes", "saladrecipes", "thenewhealthy", "mealprep", "bigsalad", "holidayweekend", "plantbaseddiet", "eatmoreplants", "saladideas", "allfoodsfit", "memorialdayfood", "plantbasednutrition", "mindfuleating"], "user_tags": [], "collection": "Meals", "id": 291, "clean_title": "mary elizabeth"}, {"url": "https://www.instagram.com/reel/CsZL5nULqcN/", "title": "When life gives you lemons, make this lemon garlic butter fettuccine because it is simply the *zest* 🍋", "caption": "When life gives you lemons, make this lemon garlic butter fettuccine because it is simply the *zest* 🍋\n \nHappy Thursday friends!!! Full disclaimer for this recipe: I am usually NOT a lemon lover. I tend to skip adding it when trying new recipes because I’m just not a huge fan. However, when @sarahh_font brought over a version of this dish a few weeks ago, it was so good I couldn’t wait to recreate it for Eat Drink Orlando!! If you like flavorful, quick, and easy recipes with *minimal* ingredients, this lemon garlic butter fettuccine is the dish for you!\n\nRecipe can be found below, make sure to save this post to easily revert back! Also, I’m finally starting to add recipes to the blog from the last few months so once that’s updated I’ll be sure to share!\n\nLEMON GARLIC BUTTER FETTUCCINE 🍋\n \n-1 stick of butter\n-8 cloves of garlic, minced\n-1 cup of spinach (I could have added more!)\n-1 box of fettuccine pasta, cooked in chicken broth/chicken bouillon ***save a cup of chicken broth pasta water\n-1/2 to 1 lemon, squeezed (add as much or as little lemon as you’d like)\n-1.5 cups of parmesan cheese (more to top)\n-salt and topped with pepper to taste\n \nMelt butter over medium low heat. Add garlic and cook until fragrant. Add spinach & mix. Cut lemon in half and squeeze half of the lemon. Add pasta once al dente and be sure to save a cup of chicken broth pasta water!!\n \nAdd parmesan cheese with pasta water, and another heavy squeeze of lemon. Mix and top with pepper and parmesan. So simple, so delicious and so quick & easy to make! ENJOY!\n\n#eatdrinkorlando #fettuccine #pastapasta #pastalovers #pastarecipe #eatathome #lemonpasta #lemonbutter #garlicbutter #easyrecipesathome", "owner": "Sara Simpkins", "username": "thehostedkitchen", "hashtags": ["lunchrecipes", "eastcoastfoodies", "pastanight", "recipeideas", "foooodieee", "eastcoastfeastcoast", "pastaaddict", "pastalover", "simplerecipes", "recipeshare", "foodagram", "ilovepasta", "food52grams", "noodleworship", "pastarecipes", "quickrecipes", "pastalovers", "easyrecipesathome", "lemonpasta", "eatdrinkorlando", "garlicbutter", "eatathome", "fettuccine", "pastapasta", "lemonbutter", "pastarecipe"], "user_tags": [], "collection": "Meals", "id": 292, "clean_title": "When life gives you lemons, make this lemon garlic butter..."}, {"url": "https://www.instagram.com/reel/Cr4HWEOO2VC/", "title": "GLUTEN FREE CHICKEN CAESAR PASTA SALAD", "caption": "GLUTEN FREE CHICKEN CAESAR PASTA SALAD \n \nIngredients:\n12oz package of GF penne pasta (I’m using @barillaus) \n2 large chicken breasts\n1 tsp smoked paprika\n1 tsp onion powder\n1 tsp garlic powder \nSalt and pepper, to taste \n6 strips bacon\n4 cups romaine lettuce, chopped\n1 cup of gluten free croutons  \n3/4 cup caesar dressing\n1/3 cup parmesan cheese, shaved\n \nCaesar dressing:\n1 cup mayonnaise \n3 cloves of garlic \nJuice from 1 lemon \n1 tsp dijon mustard \n1 tsp worcestershire sauce\n1/2 cup parmesan cheese, grated\n1/2 tsp black pepper\n1/4 tsp salt\n \nCroutons:\n1 gluten free baguette, cut into 1/2 inch cubes \n1 tbsp avocado oil \n2 tsp Italian seasoning\n \nItalian seasoning: \n2 tbsp dried oregano\n2 tbsp dried basil\n2 tbsp dried parsley\n1 tbsp dried thyme \n1 tbsp dried rosemary\n1 tsp dried sage\n1 tsp garlic powder\n \nDirections:\n1) Croutons: Cut bread into 1/2 inch cubes then transfer to a baking sheet. Drizzle with avocado oil and spices and bake at 400F x12-15 minutes until golden brown and crunchy.\n2) Bacon: Add bacon to a separate baking sheet and bake at 400F x18-20 minutes until crispy. \n3) Chicken: Season both sides of chicken breast with smoked paprika, salt and pepper. Add avocado oil to a skillet over medium heat then cook chicken x4-5 minutes on each side or until cooked through. \n4) Caesar dressing: Combine all ingredients in a blender and blend until evenly combined and smooth \n5) Pasta: cook pasta according to package instructions. \n6) Assembly: Assemble the pasta salad with pasta first, then romaine lettuce, bacon, chicken, croutons, parmesan cheese and dressing. Toss together and serve!", "owner": "Jasmine", "username": "thenakdlife", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 293, "clean_title": "GLUTEN FREE CHICKEN CAESAR PASTA SALAD"}, {"url": "https://www.instagram.com/reel/CroKzCvsJWh/", "title": "ריזוטו פתיתים ללא חמאה וללא שמנת ממקרר של רווקים!!😂", "caption": "ריזוטו פתיתים ללא חמאה וללא שמנת ממקרר של רווקים!!😂 \nשיוצא מחרפן כמו פתיתים מק אנד צ׳יז.. ומה נותן את כל המרקם המשוגע? 2 פרוסות גבינה צהובה 9%!\nלא להאמין מה יוצא לי מהאילתורים אצל ניר בבית\n@nir_solomon \nמצרכים:\n2 כפות שמן זית\nבצל גדול לבן קצוץ\n1 כוס פתיתים בצורת אורז\n2.5 כוסות מים \nכפית אורגנו\nכפית אבקת שום גבישי \nחצי כפית כורכום\nכף מלח \n2 פרוסות גבינה צהובה 9%\n\nאופן הכנה:\nבסיר נחמם שמן זית, נוסיף בצל קצוץ ונטגן על טמפ בינונית עד שהבצל מתחיל להיות שקוף.\nמוסיפים כוס פתיתים ומערבבים היטב עם השמן והבצל (לפני המים).\nמוסיפים כוס וחצי מים ומערבבים, משאירים על טמפ נמוכה-ב rn!). You can heat the oil on medium flame for about 2-3 minutes. Add it to mixture and let it sizzle. \nAdd peanut butter, soy sauce, add a splash of hot noodle water and give it a good mix.\nAdd the sauce to the noodles, stir it and heat up if necessary.\nAdd toasted sesame seeds to garnish and voila!\nNotes\nFor a gluten free option, swap out regular wheat-based ramen for brown rice ramen and use a gluten free alternative to soy sauce, such as tamari. The rest of the ingredients are naturally gluten free.\nThis version is not spicy. Adjust the gochugaru or chili flakes accordingly based on your spice tolerance level.", "owner": "Vegancuts", "username": "vegancuts", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 304, "clean_title": "Ingredients"}, {"url": "https://www.instagram.com/reel/CmJrlCFoC6k/", "title": "📣 This is INSTANT RAMEN HACK NO. 15 and today we’re making sesame-scallion noodles to combine a few of our favourite fla", "caption": "📣 This is INSTANT RAMEN HACK NO. 15 and today we’re making sesame-scallion noodles to combine a few of our favourite flavours in one delicious bowl of noods. These are seriously so comforting, make them now and hug me later 🤗 Recipe below serves two 👇 \n.\nCook 2 packets of ramen noodles/ any noodles of choice; drain and reserve the starchy cooking water.\n.\nIn a heat proof bowl, mix together:\n- 2-3 cloves of garlic, minced\n- Small knob of ginger, finely grated\n- 1 tbsp gochugaru (crushed red chilli flakes) or chilli flakes/ paprika \n- 1/3 - 1/2 cup scallions/ spring onions\n.\nPour 3 tbsp hot oil on top and let it sizzle. I added 2 tbsp sesame oil + 1 tbsp neutral-flavoured avocado oil.\n.\nGive it a mix, then stir in: \n- 3 tbsp light soy sauce\n- 1 tbsp dark soy sauce\n- 1.5 tbsp rice vinegar\n- 1.5 - 2 tbsp sesame paste (you can sub tahini)\n- 1/2 - 1 tbsp peanut butter (optional; can omit altogether or swap in miso and/or gochujang)\n.\nStir it will, then add a splash of the starchy noodle water. Mix until your sauce comes together.\n.\nFeel free to adjust according to preference, for instance adding more sesame or peanut butter for a nuttier sauce etc.\n.\nPour the sauce over the noodles and serve garnished with sliced cucumbers, scallions and/or sesame seeds \n.\nENJOY and don’t forget to tag me when you try this at home!\n#sesamenoodles #ramennoodles #ramen #instantramen #ramenhacks #chillioil #spicynoodles #easyrecipesathome #hotoil #asmrcommunity #asmrfood #asmrsounds #peanutbutternoodles", "owner": "Ayushi Gupta-Mehra", "username": "the_foodiediaries", "hashtags": ["spicyfood", "chefsofinsta", "noodleslover", "noodlelover", "homemadeisbest", "homecookingisthebest", "peanutnoodles", "asmreating", "noodlelife", "easyrecipes", "quickrecipe", "noodles🍜", "homechefsofinstagram", "homecookingisbest", "mumbaifoodie", "ramen", "chillioil", "spicynoodles", "sesamenoodles", "peanutbutternoodles", "asmrfood", "easyrecipesathome", "asmrsounds", "ramennoodles", "ramenhacks", "instantramen", "hotoil", "asmrcommunity"], "user_tags": [], "collection": "Meals", "id": 305, "clean_title": "This is INSTANT RAMEN HACK NO. 15 and today we’re making..."}, {"url": "https://www.instagram.com/reel/Cj8kST_KoOZ/", "title": "5min PEANUT NOODLES 🍜", "caption": "5min PEANUT NOODLES 🍜 \nStudent gourmet week 🌱\n\nI came home from school, tired, hungry and we didn’t have anything for lunch at home… so I made these noodles in 5mins, BEST DECISION! 😋👀\nMuch love\nMaya ✨\nRECIPE (1 serving, 5min prep time):\n-1 serving (I used about 80g) quick cooking noodles \nBOIL in water\n-1 Tbsp peanut butter\n-1 Tbsp soy sauce\n-1 Tsp sriracha \n-1 Tsp sugar \n-1/2 Tsp garlic powder and ginger powder\nMix with a little noodle cooking water.\n-1/3 cucumber, thinly sliced\nAdd noodles and cucumber to the sauce, stir and enjoy. 😌\n-\n5min ERDNUSS NUDELN 🍜 \nStudent gourmet week 🌱\n\nIch bin von der Schule gekommen, müde, hungrig und wir hatten nichts mehr zu Hause… also hab ich mir in 5min diese Nudeln gemacht, BESTE ENTSCHEIDUNG! 😋👀\nAlles liebe \nMaya ✨\nREZEPT (1 Portion, 5min Zubereitungszeit):\n-1 Portion (hab ca. 80g benutzt) Asia Nudeln\nIn Wasser kochen.\n-1 El Erdnussmus \n-1 El Sojasauce \n-1 Tl Sriracha \n-1 Tl Zucker \n-1/2 Tl Knoblauchpulver und Ingwerpulver \nMit etwas Nudelwasser mischen\n-1/3 Gurke, dünn geschnitten\nNudeln und Gurke mit der Sauce vermischen und genießen . 😌\n#easyrecipes #easyveganrecipes #easyveganmeals #quickcooking #quickrecipes #quicklunch #peanutnoodles #veganlunch", "owner": "Maya / plant-based food and recipes", "username": "fitgreenmind", "hashtags": ["quickcooking", "easyveganmeals", "peanutnoodles", "quicklunch", "veganlunch", "easyrecipes", "quickrecipes", "easyveganrecipes"], "user_tags": [], "collection": "Meals", "id": 306, "clean_title": "5min PEANUT NOODLES"}, {"url": "https://www.instagram.com/reel/CjdVE7Not51/", "title": "Easy Creamy Mushroom Pasta 🍝", "caption": "Easy Creamy Mushroom Pasta 🍝\n\nIngredients in order:\n\nA drizzle of olive oil\nButter\nOnion\nMushrooms (as you want )\nTomato paste\nSalt, oregano, garlic powder, pepper\nHeavy cream\nPasta water\nPasta\nMozzarella cheese (as needed )\n\n#recipe #foodinstagram  #cooking #pastarecipe #cheesy #food #reels #foodie #pasta #pastarecipe #easyrecipes #pastalovers #instareels #foodreels", "owner": "Jo and Bart", "username": "joandbart", "hashtags": ["foodreels", "pasta", "reels", "instareels", "cooking", "pastalovers", "recipe", "foodinstagram", "food", "cheesy", "foodie", "easyrecipes", "pastarecipe"], "user_tags": [], "collection": "Meals", "id": 307, "clean_title": "Easy Creamy Mushroom Pasta"}, {"url": "https://www.instagram.com/p/CbE9q7jtRUx/", "title": "להעלות תמונה של העוף של גנרל טסו בלי מתכון צריכה להיות פעולה שמוגדרת כפשע🤪 אבל אל תדאגו כי ממש מחר אני מעלה ריל עם המתכו", "caption": "להעלות תמונה של העוף של גנרל טסו בלי מתכון צריכה להיות פעולה שמוגדרת כפשע🤪 אבל אל תדאגו כי ממש מחר אני מעלה ריל עם המתכון המלא, אז מוזמנים לעקוב ולרוץ להכין כי זו ה-מנה הכ . מאחדים הכל ומוסיפים רסק ולאחר דקה מוזגים יין אדום. נותנים ליים להתאדות ומכסים במים. מביאים לרתיחה ומנמיכים את האש ומבשלים מספר שעות עד לריכוך. \nשמים חמאה חומה בסיר/ שמן זית וצולים את הירקות מוסיפים ציר בקר עד שהירקות מתרככים (את התרד שמים בסוף) סוגרים בחמאה(או שפשוט מצמצמים לרוטב טעים) . מוסיפים את הפסטה לאחר בישול ואת הבשר עם הרוטב ואוכלים. @opriel_butcher_shop  @carmella.co.il", "owner": "עדן דוד | ארוחות פרטיות | סדנאות בישול", "username": "edendavid23", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 311, "clean_title": "עוד יום כיפי עם המשפחה שבעיני שווה את הכל. אז יש כאן פסטה בגודל..."}, {"url": "https://www.instagram.com/p/B5DpyhRlgk9/", "title": "What’s your favorite protein source?⠀", "caption": "What’s your favorite protein source?⠀\n*Swipe for Chicken, Fish, Steak details  and Plant Based Proteins!🍗🐟🥩 🌱⠀\n.⠀\nIt’s important to vary your protein sources to get the different benefits from each.⠀\n.⠀\nAlso, if you can, go with pasture-raised chicken & eggs, grass-fed beef & bison and wild salmon 🍃 It’s not the meat that has inflammatory properties but if they’re fed a diet of grains & antibiotics with little to no sunshine that can be detrimental to your health!❤️⠀\n⠀⠀\nBenefits of the proteins shown:⠀\nPasture-Raised Chicken⠀\nHigh protein source, lean, a good source of vitamin B6 & niacin.⠀\n⠀⠀\nWild-caught salmon⠀\nHigh in omega-3 fatty acids, vitamin D, selenium, vitamins B3, B6, B5 and potassium.⠀\n⠀⠀\nGrass-fed beef⠀\nHigh in conjugate linoleum acid which has been shown in studies to lower cancer risk & packed with omega-3 fatty acids & antioxidant vitamins.⠀\n⠀⠀\nGrass-fed bison⠀\nA lean source of protein, high in vitamin B12, zinc, selenium, niacin & iron.⠀\n⠀⠀\nPasture-Raised Eggs⠀\nHigh in choline, omega-3 fatty acids, contain carotenoids which are important for your eyes (lutein and zeaxanthin) plus packed with more vitamins & minerals.⠀\n.⠀\nPlant based proteins:⠀\nBlack beans ⠀\nLentils⠀\nHemp seeds⠀\nPumpkin seeds ⠀\nPeas⠀\nChickpeas⠀\nTempeh (not shown)⠀\n.⠀\n#protein #proteinsources #iifym #iifymgirls #cooking #chicken #ifitfitsyourmacros #mealprep #myfitnesspal #knowyourfood #eattherainbow #foodfacts #meat #healthyfoods #healthyeating #absaremadeinthekitchen #healthytips #meatlover #foodcomparison #makinggains #gains #fitfood #wholefoods #mealprepsunday #whole30 #workoutdaily #paleo #mealprepmonday #salmon", "owner": "Amanda (Meixner) Rocchio", "username": "meowmeix", "hashtags": ["knowyourfood", "paleo", "eattherainbow", "workoutdaily", "iifym", "meatlover", "cooking", "fitfood", "absaremadeinthekitchen", "salmon", "whole30", "healthytips", "iifymgirls", "mealprepmonday", "foodcomparison", "healthyfoods", "mealprep", "gains", "protein", "wholefoods", "chicken", "meat", "myfitnesspal", "healthyeating", "ifitfitsyourmacros", "proteinsources", "foodfacts", "makinggains", "mealprepsunday"], "user_tags": [], "collection": "Meals", "id": 312, "clean_title": "What’s your favorite protein source?⠀"}, {"url": "https://www.instagram.com/p/Bxs14gJFpBq/", "title": "Weight loss vs. muscle gain protein shake ideas! 🥤 *Swipe to see 2 more!* Which combo is your fav?", "caption": "Weight loss vs. muscle gain protein shake ideas! 🥤 *Swipe to see 2 more!* Which combo is your fav?\n.\nI often get asked “is a protein shake a good idea from someone who wants to lose weight?”. My answer to that is yes, because a shake can be an easy & convenient way to get in more protein and have a healthy snack.\n.\nNow, you don’t have to get a protein powder if you don’t want to. You could also use Greek yogurt like I did in the 3rd shake example. However, I love a good chocolate protein powder because it satisfies my sweet tooth while still being a healthy option!\n.\nMy current favorite protein powders are @atp_labs whey protein and @vega_team performance protein - both healthy and clean options. Below is the breakdown of the macros for each shake - remember to add water, ice and stevia as needed:\n.\n🥜 PB&J shake weight loss - 261 cals, 38g protein, 30g carbs, 4.5g fat.\n. 🥜 PB&J shake muscle gain - 501 cals, 41g protein, 54g carbs, 18.5g fat.\n.\n🍫 Mocha shake weight loss - 224 cals, 25.5g protein, 9.8g carbs, 9.2g fat.\n.\n🍫 Mocha shake muscle gain - 459 cals, 32g protein, 45g carbs, 18.2g fat\n.\n🌴 Tropical shake weight loss (I added stevia too) - 202 cals, 15g protein, 23g carbs, 6.6g fat.\n.\n🌴 Tropical shake muscle gain (I added stevia too) - 456 cals, 31g protein, 50g carbs, 17g fat.\n.\nReminder, these are just examples but you can make anything in between. Sometimes 1 scoop protein with water & ice is all I need for a low calorie snack!\n.\nMake sure to click the link bio to get my 101 Healthy Snack Ebook packed with more ideas!\n.\nXoxo,\nAmanda\n.\n.\n.\n#cleaneating #healthyeating #nutrition #cleaneats #mealprep #foodprep #fitfood #protein #weightloss #mealplan #paleo #healthychoices #mealprepsunday #healthyfood #mealprepping #macros #mealprepmonday #flexibledieting #iifym #protein #glutenfree #getfit #gains #meals #healthyliving #determination #healthylifestyle #proteinshake", "owner": "Amanda (Meixner) Rocchio", "username": "meowmeix", "hashtags": ["determination", "healthychoices", "paleo", "healthyliving", "meals", "getfit", "iifym", "cleaneats", "mealprepping", "flexibledieting", "fitfood", "mealprepmonday", "mealprep", "gains", "protein", "weightloss", "proteinshake", "healthyfood", "healthylifestyle", "mealplan", "cleaneating", "nutrition", "macros", "healthyeating", "foodprep", "glutenfree", "mealprepsunday"], "user_tags": [], "collection": "Meals", "id": 313, "clean_title": "Weight loss vs. muscle gain protein shake ideas! *Swipe to see 2..."}, {"url": "https://www.instagram.com/p/BxQDVLsgLHC/", "title": "Here’s Four delicious + easy Grilled Chicken MealPrep ideas🍗🌱! *Swipe for all recipes + calories👩🏻‍🍳:) ...Which is your ", "caption": "Here’s Four delicious + easy Grilled Chicken MealPrep ideas🍗🌱! *Swipe for all recipes + calories👩🏻‍🍳:) ...Which is your fa anda\n.\nP.s. you can also go to www.101healthysnacks.com if that’s easier!\n. .\n.\n #cleaneating #healthyeating #nutrition #cleaneats #mealprep #foodprep #fitfood #protein #weightloss #mealplan #paleo #healthychoices #mealprepsunday #healthyfood #mealprepping #macros #mealprepmonday #flexibledieting #iifym #instahealth #snackideas #glutenfree #getfit #gains #meals #healthyliving #healthylifestyle", "owner": "Amanda (Meixner) Rocchio", "username": "meowmeix", "hashtags": ["instahealth", "healthychoices", "paleo", "healthyliving", "meals", "getfit", "iifym", "cleaneats", "mealprepping", "flexibledieting", "fitfood", "mealprepmonday", "mealprep", "gains", "protein", "weightloss", "healthyfood", "healthylifestyle", "mealplan", "cleaneating", "nutrition", "macros", "healthyeating", "foodprep", "glutenfree", "mealprepsunday", "snackideas"], "user_tags": [], "collection": "Meals", "id": 320, "clean_title": "If you’re new to following me or for those of you not aware, I..."}, {"url": "https://www.instagram.com/p/BwaKWIphp3s/", "title": "Here’s my reminder to you that there’s a healthy way to lose weight and it definitely doesn’t involve starving yourself!", "caption": "Here’s my reminder to you that there’s a healthy way to lose weight and it definitely doesn’t involve starving yourself! ❤️*Swipe to see two more examples of why this doesn’t work*\n.\nI want to keep you from making the same mistakes I did when I was younger. Starving yourself all day only to binge later at night won’t leave you feeling good! Not to mention all the hormonal issues and health issues that arise when we eat too little.\n.\nLosing weight the healthy way may take more time but it will leave you feeling so much better overall! Eating in a slight calorie deficit while paying attention to the quality of our food, getting movement in, hydrating and picking up healthy habits along the way is where the magic happens. Here are my tips on how to lose weight the healthy way:\n.\n1️⃣ Stop drinking your calories, aside from low sugar kombuchas, actually green green juices (mostly veggies), & high quality protein shakes. Aka get rid of the juices, fruit smoothies, sodas, sugary coffee drinks etc\n2️⃣ Limit the processed foods you eat.\n3️⃣ Add tons of veggies to your dishes! This will add loads of volume.\n4️⃣ Make sure you’re getting an adequate amount of protein. This will help you feel full.\n5️⃣ Add in some healthy fats. Fats are super important for the absorption of certain vitamins & important for overall health.\n6️⃣ Find the right amount of whole food carbs for you. You definitely shouldn’t fear carbs either! Pick whole food ones like sweet potatoes, potatoes, fruit, rice & beans and you’re on the right track!\n.\nI hope you found this helpful 😁 Reminder there are some benefits to intermittent fasting & fasting in general but you should make sure you’re doing those for the right reason, eat filling meals in between and avoid if you have an eating disorder.\n.\nXoxo,\nAmanda\n.\n.\n.\n#cleaneating #healthyeating #nutrition #cleaneats #mealprep #foodprep #fitfood #protein #weightloss #mealplan #paleo #healthychoices #mealprepsunday #healthyfood #mealprepping #macros #mealprepmonday #flexibledieting #iifym #instahealth #getfit #gains #meals #healthyliving #healthylifestyle", "owner": "Amanda (Meixner) Rocchio", "username": "meowmeix", "hashtags": ["instahealth", "healthychoices", "paleo", "healthyliving", "meals", "getfit", "iifym", "cleaneats", "mealprepping", "flexibledieting", "fitfood", "mealprepmonday", "mealprep", "gains", "protein", "weightloss", "healthyfood", "healthylifestyle", "mealplan", "cleaneating", "nutrition", "macros", "healthyeating", "foodprep", "mealprepsunday"], "user_tags": [], "collection": "Meals", "id": 321, "clean_title": "Here’s my reminder to you that there’s a healthy way to lose..."}, {"url": "https://www.instagram.com/reel/C4_APrZLWVJ/", "title": "This is my summer espresso martini 😍 I’m telling you, you have to try this espresso m pan, then add cauliflower rice, sea salt & pepper and cook until soft. Add desired seasoning or chopped veggies, like peas.\n⠀\n3️⃣ 484 CALORIES\nFast and delicious Greek 🥗Salad\nChopped 2 mini cucumbers, 1 cup cherry tomatoes, 1/2 cup chickpeas, onion with the oil, 1/4 lemon juice, & salt in a bowl. You can top with olives and 1 grilled chicken thigh. Swap chicken for feta to make this vegetarian, or add both😋\n⠀\n4️⃣ 395 CALORIES\nSalmon Pesto with Healthy Carbs\n4oz wild caught salmon grilled with pesto zoodles, with stir fry vegetables (asparagus, 1 cup mushrooms, 1 cup cherry tomatoes, oil, garlic, salt & pepper)\n⠀\n5️⃣ 469 CALORIES\nEggplant Mozzarella with Grilled Chicken\n1 Eggplant, 3 oz Fresh Mozzarella, 2 cups Marinara Sauce, 3 Basil Leaves. Slice eggplant into 1/2” pieces, and season. Lightly grill eggplant and in pan place slices of mozzarella, 2 tbsp marinara, and 1 basil leaf on each piece.\nBake for 10-12 minutes or until cheese is melted.\n⠀\nAll credit @meowmeix and @chris.rocchio_fit❤️ caption by @caloriefixes\n⠀\n#mealprepping #mealprep #wholefood #wholefoods #eattherainbow #cleaneatingrecipe #healthyrecipe #easyrecipes", "owner": "Lewis Marsden📝", "username": "lewfitness", "hashtags": ["wholefood", "eattherainbow", "mealprepping", "cleaneatingrecipe", "healthyrecipe", "mealprep", "wholefoods", "easyrecipes"], "user_tags": [], "collection": "Food", "id": 336, "clean_title": "Here are Five simple yet delicious Dinner Recipes *Swipe to see..."}, {"url": "https://www.instagram.com/p/BuQc6YHB5Ui/", "title": "甘酸っぱさが絶妙！鶏と野菜のバルサミコあんかけ🐔", "caption": "甘酸っぱさが絶妙！鶏と野菜のバルサミコあんかけ🐔\nㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤ\n作ったら #tastyjapan をつけて投稿してくださいね！✨\nㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤ\nレシピはこちらをご覧ください♪\nㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤ\n鶏と野菜のバルサミコあんかけ\n2人分\nㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤ\n材料:\n鶏むね肉（ひと口大）200g\n酒 大さじ1\nしょうゆ 大さじ1\nにんにく 1片\nしょうが 1片\n片栗粉 1/2カップ\nㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤ\n人参（乱切り）1/2本\n玉ねぎ（くし切り） 1/4個　\nピーマン（(乱切り） 1個\nㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤ\n揚げ油 適量\nㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤ\n＜バルサミコあん＞\nバルサミコ酢 大さじ2\n水 大さじ2\n砂糖 大さじ1\nみりん 大さじ1\nしょうゆ 大さじ1\n水溶き片栗粉 小さじ1（同量の水と片栗粉を溶いたもの）\nㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤ\n作り方\n1.ビニール袋に鶏むね肉、酒、しょうゆ、にんにく、しょうがを入れて揉み込み、冷蔵庫に入れて10分ほど漬けておく。\nㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤ\n2.(1)をボウルに入れ、片栗粉をまんべんなくまぶす。\nㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤ\n3.180度の揚げ油で人参は3−4分、玉ねぎ・ピーマンは30秒ほど素揚げする。網かクッキングペーパーにとって油をきる。\nㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤ\n4.(2)を4-5分ほど、黄金色になるまで揚げる。\nㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤ\n5.大きめのフライパンに水溶き片栗粉以外のバルサミコあんの材料を入れ、沸騰させる。沸騰したら水溶き片栗粉を入れ、ダマにならないように混ぜる。とろみが出たら、素揚げした野菜と鶏肉を加え、バルサミコあんをからめたら、完成！\nㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤ\n#料理 #手料理 #レシピ #料理動画 #クッキング #美味しい #ランチ #おうちごはん #夜ごはん #鶏 #野菜 #バルサミコ #あんかけ", "owner": "Tasty Japan-人気No.1簡単料理・幸せレシピ", "username": "tastyjapan", "hashtags": ["クッキング", "あんかけ", "レシピ", "おうちごはん", "美味しい", "ランチ", "バルサミコ", "料理", "鶏", "手料理", "夜ごはん", "野菜", "料理動画", "tastyjapan"], "user_tags": [], "collection": "Food", "id": 337, "clean_title": "甘酸っぱさが絶妙！鶏と野菜のバルサミコあんかけ"}, {"url": "https://www.instagram.com/p/BhblB_nBKSi/", "title": "🍣製氷皿で楽チン♬一口キューブ寿司🍣", "caption": "🍣製氷皿で楽チン♬一口キューブ寿司🍣\n.\n✨Check👉 @cchannel_girls ＆ #cchannel 💗\n💄C CHANNELのアプリもよろしくお願いします😊💕\n.\nちょっとしたパーティにぴったり✨握る手間いらずだから手を汚さずきれいに作れちゃう💓\nお好みの具材でアレンジしてみてね❣️\n.\n■調理時間：約20分\n■材料費：約400円\n.\n🍣材料 （2〜3人分）\n・サーモン…2枚\n・レモン…少々\n.\n・小エビ…2尾\n・青じそ…1枚 ・錦糸卵…適量\n・貝割れ大根…2枚\n.\n・しめ鯖…2枚\n・しょうがチューブ…少々\n.\n・桜でんぶ…適量\n・枝豆…2粒\n.\n・酢飯…お茶碗1杯分\n.\n🍣手順\n（下準備）取り出しやすいように、製氷皿にハケですし酢をぬる。\n.\n1. お好みの具を製氷皿の中に詰める。\n2. その上から、酢飯を入れてご飯の具が密着するようにしゃもじやスプーンを使って、ご飯をぎゅっと詰める。\n3. 細長いお皿の上に製氷皿をひっくり返し、お寿司を取り出す。\n4. レモン、貝割れ大根、しょうがチューブ、枝豆などデコレーションを乗せたら完成です♪\n.\n#寿司#お寿司#簡単#ランチ#晩ごはん#クッキングラム#美味しい#かわいい#パーティ#food#cafe#cute#japan#yummy#instafood#delicious#cooking#foodpic#beautiful#brunch#lunch#dinner#love#japanese#spring#sushi#salmon#amazing#party", "owner": "C CHANNEL ごはん", "username": "cchannel_food", "hashtags": ["love", "yummy", "japan", "寿司", "foodpic", "美味しい", "クッキングラム", "cooking", "cafe", "spring", "ランチ", "簡単", "salmon", "cchannel", "party", "brunch", "かわいい", "dinner", "food", "お寿司", "instafood", "beautiful", "japanese", "晩ごはん", "lunch", "cute", "sushi", "delicious", "amazing", "パーティ"], "user_tags": [], "collection": "Food", "id": 338, "clean_title": "製氷皿で楽チン一口キューブ寿司"}, {"url": "https:           <input class="title-input" id="title-input-${r.id}" type="text" value="${displayTitle}"
            onblur="saveTitle(${r.id})"
            onkeydown="if(event.key==='Enter')saveTitle(${r.id});if(event.key==='Escape')cancelTitle(${r.id})">
        </div>
        <button class="fav ${fav?'on':''}" onclick="toggleFav(${r.id},this)">⭐</button>
      </div>
      <div class="card-meta">
        <span class="card-user">@${esc(r.username||'')}</span>
        ${collLabel?`<span class="coll-badge">${collLabel}</span>`:''}
      </div>
      ${cap?`<div class="card-caption">${cap}</div>`:''}
      <div class="tags" id="tags-${r.id}">${renderTags(r)}</div>
      <div class="tag-editor">
        <button class="tag-add-btn" onclick="openTagInput(${r.id})">+ תגית</button>
        <div class="tag-input-wrap" id="tinput-${r.id}">
          <input class="tag-in" id="tval-${r.id}" type="text" placeholder="שבת, חריף, קל..." maxlength="25"
            onkeydown="if(event.key==='Enter')addTag(${r.id})">
          <button class="tag-save" onclick="addTag(${r.id})">הוסיפי</button>
        </div>
      </div>
      <div class="card-foot">
        <input class="note-in" type="text" placeholder="הערה אישית..." value="${esc(note)}"
          onchange="saveNote(${r.id},this.value)">
        <a class="open-btn" href="${esc(r.url)}" target="_blank">פתחי ▸</a>
      </div>
    </div>`;
  }).join('');
}

function go(){CQ=document.getElementById('q').value.toLowerCase();render();}
function filt(f,btn){CF=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render();}
function saveNote(id,val){notes[id]=val;try{localStorage.setItem('rn',JSON.stringify(notes));}catch(e){}}
function toggleFav(id,btn){
  favs[id]=!favs[id];btn.classList.toggle('on',favs[id]);
  try{localStorage.setItem('rf',JSON.stringify(favs));}catch(e){}
  if(CF==='fav')render();
}
function openTagInput(id){
  const w=document.getElementById('tinput-'+id);
  w.classList.toggle('open');
  if(w.classList.contains('open'))document.getElementById('tval-'+id).focus();
}
function addTag(id){
  const inp=document.getElementById('tval-'+id);
  const val=inp.value.trim();
  if(!val)return;
  if(!userTags[id])userTags[id]=[];
  if(!userTags[id].includes(val)){userTags[id].push(val);try{localStorage.setItem('rt',JSON.stringify(userTags));}catch(e){}}
  inp.value='';
  document.getElementById('tinput-'+id).classList.remove('open');
  const r=R.find(x=>x.id===id);
  if(r)document.getElementById('tags-'+id).innerHTML=renderTags(r);
}
function removeTag(id,val){
  if(!userTags[id])return;
  userTags[id]=userTags[id].filter(t=>t!==val);
  try{localStorage.setItem('rt',JSON.stringify(userTags));}catch(e){}
  const r=R.find(x=>x.id===id);
  if(r)document.getElementById('tags-'+id).innerHTML=renderTags(r);
  if(!['all','fav','noted'].includes(CF))render();
}

// Title editing
function startEditTitle(id){
  const titleEl=document.getElementById('card-'+id).querySelector('.card-title');
  const inp=document.getElementById('title-input-'+id);
  inp.value=getTitle(R.find(x=>x.id===id));
  titleEl.style.display='none';
  inp.style.display='block';
  inp.focus();inp.select();
}
function saveTitle(id){
  const inp=document.getElementById('title-input-'+id);
  const val=inp.value.trim();
  if(val){customTitles[id]=val;try{localStorage.setItem('ct',JSON.stringify(customTitles));}catch(e){}}
  const r=R.find(x=>x.id===id);
  const titleEl=document.getElementById('card-'+id).querySelector('.card-title');
  if(titleEl){titleEl.textContent=getTitle(r);titleEl.style.display='';}
  inp.style.display='none';
}
function cancelTitle(id){
  const inp=document.getElementById('title-input-'+id);
  const titleEl=document.getElementById('card-'+id).querySelector('.card-title');
  inp.style.display='none';
  if(titleEl)titleEl.style.display='';
}

// Add recipe modal
function openModal(){document.getElementById('overlay').classList.add('open');document.getElementById('newUrl').focus();}
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('newUrl').value='';
  document.getElementById('newTitle').value='';
  document.getElementById('newTags').value='';
  document.getElementById('modalStatus').textContent='';
}
function saveNewRecipe(){
  const url=(document.getElementById('newUrl').value||'').trim();
  const title=(document.getElementById('newTitle').value||'').trim();
  const coll=document.getElementById('newColl').value;
  const tagsRaw=(document.getElementById('newTags').value||'').trim();
  const status=document.getElementById('modalStatus');

  if(!url){status.textContent='⚠️ נא להכניס קישור';status.style.color='#e57373';return;}
  if(!url.includes('instagram.com')&&!url.includes('tiktok.com')&&!url.includes('vm.tiktok')){
    status.textContent='⚠️ הקישור צריך להיות מאינסטגרם או TikTok';status.style.color='#e57373';return;
  }
  if(!title){status.textContent='⚠️ נא להכניס שם מנה';status.style.color='#e57373';return;}
  if(R.some(r=>r.url===url)){status.textContent='ℹ️ הקישור הזה כבר קיים באוסף';status.style.color='var(--purple)';return;}

  const newId=Date.now();
  const tags=tagsRaw?tagsRaw.split(',').map(t=>t.trim()).filter(Boolean):[];
  const isIG=url.includes('instagram.com');
  const isTT=url.includes('tiktok.com')||url.includes('vm.tiktok');
  const platform=isIG?'Instagram':isTT?'TikTok':'';

  const newRecipe={
    id:newId,url,clean_title:title,title,caption:'',
    owner:platform,username:platform.toLowerCase(),
    hashtags:[],collection:'user'
  };

  if(tags.length){userTags[newId]=tags;try{localStorage.setItem('rt',JSON.stringify(userTags));}catch(e){}}
  R.push(newRecipe);
  userAdded.push(newRecipe);
  try{localStorage.setItem('ua',JSON.stringify(userAdded));}catch(e){}

  status.textContent='✓ המתכון נוסף לאוסף!';status.style.color='#7c5cbf';
  setTimeout(()=>{closeModal();render();},900);
}

render();
</script>
</body>
</html>
