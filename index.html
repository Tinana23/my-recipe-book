<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ספר המתכונים שלי</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#f5f2fc;--card:#fff;
    --purple:#9575cd;--purple-mid:#b39ddb;--purple-pale:#ede7f6;--purple-soft:#f3eefb;
    --pink:#f48fb1;--pink-pale:#fce4ec;
    --teal:#80cbc4;--teal-pale:#e0f2f1;
    --text:#2d2540;--muted:#9585aa;--border:#e8e0f5;
    --shadow:0 2px 14px rgba(149,117,205,.1);
  }
  body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  header{background:linear-gradient(135deg,#b39ddb 0%,#ce93d8 55%,#f48fb1 100%);padding:18px 20px 14px;position:sticky;top:0;z-index:100;box-shadow:0 3px 18px rgba(179,157,219,.35);}
  .header-top{max-width:980px;margin:0 auto 12px;display:flex;justify-content:space-between;align-items:center;gap:12px;}
  header h1{color:white;font-size:1.2rem;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.12);}
  header h1 span{font-weight:300;opacity:.8;font-size:.87rem;margin-right:8px;}
  .count{background:rgba(255,255,255,.25);color:white;padding:5px 13px;border-radius:20px;font-size:.82rem;font-weight:500;white-space:nowrap;}

  .search-row{max-width:980px;margin:0 auto;display:flex;gap:8px;}
  .search-wrap{position:relative;flex:1;}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.7;}
  .search-wrap input{width:100%;padding:10px 14px 10px 36px;border:none;border-radius:10px;outline:none;font-family:'Heebo',sans-serif;font-size:.93rem;background:rgba(255,255,255,.22);color:white;}
  .search-wrap input::placeholder{color:rgba(255,255,255,.65);}
  .search-wrap input:focus{background:rgba(255,255,255,.3);}
  .add-btn-header{background:rgba(255,255,255,.25);color:white;border:1.5px solid rgba(255,255,255,.4);border-radius:10px;padding:9px 14px;font-family:'Heebo',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .15s;}
  .add-btn-header:hover{background:rgba(255,255,255,.35);}

  .filters{max-width:980px;margin:14px auto 0;padding:0 14px;display:flex;gap:7px;flex-wrap:wrap;}
  .fb{padding:5px 14px;border-radius:18px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-family:'Heebo',sans-serif;font-size:.8rem;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .fb:hover{border-color:var(--purple-mid);color:var(--purple);}
  .fb.on{background:var(--purple);border-color:var(--purple);color:white;box-shadow:0 2px 8px rgba(149,117,205,.3);}

  main{max-width:980px;margin:0 auto;padding:16px 14px 52px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;}

  .card{background:var(--card);border-radius:15px;padding:16px;border:1px solid var(--border);display:flex;flex-direction:column;gap:9px;box-shadow:var(--shadow);transition:transform .14s,box-shadow .14s;}
  .card:hover{transform:translateY(-2px);box-shadow:0 7px 24px rgba(149,117,205,.16);}

  .card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;}
  .title-wrap{flex:1;position:relative;}
  .card-title{font-size:.92rem;font-weight:600;line-height:1.45;color:var(--text);cursor:pointer;}
  .card-title:hover{color:var(--purple);}
  .title-edit-hint{font-size:.65rem;color:var(--muted);opacity:0;transition:opacity .2s;margin-top:1px;}
  .title-wrap:hover .title-edit-hint{opacity:1;}
  .title-input{width:100%;border:1.5px solid var(--purple-mid);border-radius:7px;padding:5px 9px;font-family:'Heebo',sans-serif;font-size:.9rem;font-weight:600;color:var(--text);outline:none;display:none;background:var(--purple-soft);}

  .fav{background:none;border:none;font-size:1rem;cursor:pointer;padding:1px;opacity:.25;transition:opacity .15s,transform .15s;flex-shrink:0;}
  .fav.on{opacity:1;transform:scale(1.15);}

  .card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .card-user{font-size:.75rem;color:var(--purple);font-weight:500;}
  .coll-badge{font-size:.67rem;padding:2px 7px;border-radius:5px;background:var(--purple-pale);color:var(--purple);font-weight:600;}

  .card-caption{font-size:.78rem;color:var(--muted);line-height:1.55;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}

  .tags{display:flex;flex-wrap:wrap;gap:4px;min-height:4px;}
  .tag{background:var(--purple-soft);color:var(--purple);font-size:.68rem;padding:2px 8px;border-radius:5px;}
  .tag.user-tag{background:var(--pink-pale);color:#c2185b;cursor:pointer;transition:opacity .12s;display:flex;align-items:center;gap:3px;}
  .tag.user-tag:hover{opacity:.75;}
  .tag.user-tag::before{content:'✏️';font-size:.6rem;}
  .tag-x{font-size:.75rem;opacity:.6;}

  .tag-editor{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
  .tag-add-btn{background:none;border:1.5px dashed var(--border);border-radius:6px;color:var(--muted);font-size:.7rem;padding:3px 9px;cursor:pointer;font-family:'Heebo',sans-serif;transition:all .15s;}
  .tag-add-btn:hover{border-color:var(--pink);color:var(--pink);}
  .tag-input-wrap{display:none;gap:4px;align-items:center;}
  .tag-input-wrap.open{display:flex;}
  .tag-in{border:1.5px solid var(--purple-mid);border-radius:7px;padding:3px 9px;font-family:'Heebo',sans-serif;font-size:.72rem;outline:none;width:115px;color:var(--text);}
  .tag-save{background:linear-gradient(135deg,var(--purple),var(--purple-mid));color:white;border:none;border-radius:6px;padding:3px 9px;font-size:.7rem;cursor:pointer;font-family:'Heebo',sans-serif;}

  .card-foot{display:flex;gap:7px;align-items:center;padding-top:9px;border-top:1px solid var(--border);margin-top:auto;}
  .note-in{flex:1;border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-family:'Heebo',sans-serif;font-size:.74rem;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;}
  .note-in:focus{border-color:var(--purple-mid);}
  .note-in::placeholder{color:var(--muted);opacity:.55;}
  .open-btn{background:linear-gradient(135deg,#b39ddb,#ce93d8);color:white;border:none;border-radius:7px;padding:6px 12px;font-family:'Heebo',sans-serif;font-size:.76rem;font-weight:600;cursor:pointer;text-decoration:none;white-space:nowrap;transition:opacity .14s;box-shadow:0 2px 6px rgba(149,117,205,.25);}
  .open-btn:hover{opacity:.85;}

  /* Add recipe modal */
  .overlay{display:none;position:fixed;inset:0;background:rgba(45,37,64,.45);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
  .overlay.open{display:flex;}
  .modal{background:white;border-radius:18px;padding:28px;width:min(440px,92vw);box-shadow:0 12px 48px rgba(149,117,205,.25);}
  .modal h2{font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:6px;}
  .modal p{font-size:.82rem;color:var(--muted);margin-bottom:20px;line-height:1.5;}
  .modal-field{margin-bottom:14px;}
  .modal-field label{display:block;font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:5px;}
  .modal-field input,.modal-field select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:'Heebo',sans-serif;font-size:.88rem;color:var(--text);outline:none;transition:border-color .15s;}
  .modal-field input:focus,.modal-field select:focus{border-color:var(--purple-mid);}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
  .btn-cancel{background:var(--bg);border:1.5px solid var(--border);color:var(--muted);border-radius:9px;padding:8px 18px;font-family:'Heebo',sans-serif;font-size:.85rem;cursor:pointer;}
  .btn-save{background:linear-gradient(135deg,var(--purple),var(--purple-mid));color:white;border:none;border-radius:9px;padding:8px 22px;font-family:'Heebo',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;}
  .modal-status{font-size:.78rem;color:var(--purple);margin-top:10px;min-height:18px;text-align:center;}

  .empty{text-align:center;padding:70px 20px;color:var(--muted);}
  .empty .big{font-size:3rem;margin-bottom:12px;}
  .empty h3{margin-bottom:5px;font-size:1.05rem;color:var(--text);}

  @media(max-width:580px){.grid{grid-template-columns:1fr;}header h1{font-size:1rem;}.add-btn-header{font-size:.78rem;padding:8px 10px;}}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>ספר המתכונים שלי <span>· אינסטגרם</span></h1>
    <div style="display:flex;gap:8px;align-items:center;">
      <div class="count" id="cnt">טוען...</div>
      <button class="add-btn-header" onclick="openModal()">+ מתכון חדש</button>
    </div>
  </div>
  <div class="search-row">
    <div class="search-wrap">
      <svg width="15" height="15" fill="none" stroke="white" stroke-width="2.2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="q" type="text" placeholder="חפשי לפי מנה, מצרך, שף, תגית..." oninput="go()">
    </div>
  </div>
</header>

<div class="filters">
  <button class="fb on" onclick="filt('all',this)">הכל</button>
  <button class="fb" onclick="filt('fav',this)">⭐ מועדפים</button>
  <button class="fb" onclick="filt('shabbat',this)">🕯️ שבת</button>
  <button class="fb" onclick="filt('cocktails',this)">🍹 קוקטיילים</button>
  <button class="fb" onclick="filt('vegan',this)">🌱 טבעוני</button>
  <button class="fb" onclick="filt('chicken',this)">🍗 עוף</button>
  <button class="fb" onclick="filt('fish',this)">🐟 דגים</button>
  <button class="fb" onclick="filt('pasta',this)">🍝 פסטה</button>
  <button class="fb" onclick="filt('salad',this)">🥗 סלט</button>
  <button class="fb" onclick="filt('dessert',this)">🍰 קינוח</button>
  <button class="fb" onclick="filt('soup',this)">🍲 מרק</button>
  <button class="fb" onclick="filt('noted',this)">📝 עם הערות</button>
</div>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    <div class="big">🔍</div>
    <h3>לא נמצאו תוצאות</h3>
    <p>נסי מילות חיפוש אחרות או הסירי פילטר</p>
  </div>
</main>

<!-- Add recipe modal -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>+ הוספת מתכון חדש</h2>
    <p>הדביקי קישור מאינסטגרם או TikTok — האפליקציה תוסיף אותו לאוסף שלך.</p>
    <div class="modal-field">
      <label>קישור לסרטון</label>
      <input id="newUrl" type="url" placeholder="https://www.instagram.com/reel/... או https://vm.tiktok.com/...">
    </div>
    <div class="modal-field">
      <label>שם המנה</label>
      <input id="newTitle" type="text" placeholder="למשל: פסטה ברוטב עגבניות שרי">
    </div>
    <div class="modal-field">
      <label>קטגוריה</label>
      <select id="newColl">
        <option value="Meals">🍽️ Meals</option>
        <option value="Cocktails">🍹 Cocktails</option>
        <option value="Food">🥘 Food</option>
      </select>
    </div>
    <div class="modal-field">
      <label>תגיות (אופציונלי, מופרדות בפסיק)</label>
      <input id="newTags" type="text" placeholder="סלט, שבת, טבעוני">
    </div>
    <div class="modal-status" id="modalStatus"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">ביטול</button>
      <button class="btn-save" onclick="saveNewRecipe()">הוסיפי לספר ✓</button>
    </div>
  </div>
</div>

<script>

"Divya Sharma | Healthy & Easy Recipes", "username": "doctorbowl", "hashtags": ["breakfast", "healthyrecipes", "recipe"], "user_tags": [], "collection": "Meals", "id": 21, "clean_title": "RECIPE BELOW"}, {"url": "https://www.instagram.com/reel/DYNgaHYR_Tt/", "title": "HONEY GARLIC-BUTTER ZUCCHINI! I thought zucchini had reached its limit until I caramelized it in honey garlic butter. No", "caption": "HONEY GARLIC-BUTTER ZUCCHINI! I thought zucchini had reached its limit until I caramelized it in honey garlic butter. Now I make this on repeat 💥 \n\nDeeply caramelized and coated in a honey garlic butter, then finished with goat cheese, pine nuts, greens, & enough charred edges to make the whole thing addictive!\n•\n3-4 medium zucchini \nSalt\nOlive oil\n•\nFor the butter:\n3 tbsp unsalted butter, softened \n1 tbsp olive oil \n1 tbsp honey \n1/2 tsp salt \n2 tbsp parsley \n3 cloves minced garlic \nPepper to taste\n•\nFor the toppings/\n1/4 cup chopped arugula\n3 tbsp crumbled goat cheese \n2 tbsp toasted pine nuts \n•\n1️⃣Preheat the oven to 425. 2️⃣Slice the zucchini lengthwise and score the tops, then place on a plate and salt the tops generously. Let them sit for 10 minutes. 3️⃣While the zucchini sits, make the butter. Add the butter, olive oil, honey, salt, parsley, garlic and pepper to a small bowl. Mix together to form a paste. Set aside. 4️⃣Use a paper towel to remove the moisture from the tops of the zucchini. Do not rinse. 5️⃣Heat a cast iron pan or heavy skillet over medium-high heat. Add some olive oil and place the zucchini face down. Place a heavy pan on top to press the zucchini down. Sear for 2 minutes, until the tops are browned. Flip the zucchini over and place in the oven for 10 minutes. 6️⃣Remove the zucchini from the oven, then place a spoonful of the butter over each zucchini and spread over the tops. Place them back in the oven for 10-12 more minutes, until tender. If you would like the tops more brown, place under the broiler for 1-2 minutes. 7️⃣Plate the zucchini then top with the arugula, pine nuts and goat cheese.\n•\n#zucchinirecipe #easyvegetables #foodreels #summerrecipes #healthyish", "owner": "Caitlin Latessa-Greene", "username": "starinfinitefood", "hashtags": ["foodreels", "zucchinirecipe", "easyvegetables", "healthyish", "summerrecipes"], "user_tags": [], "collection": "Meals", "id": 22, "clean_title": "HONEY GARLIC-BUTTER ZUCCHINI! I thought zucchini had reached its..."}, {"url": "https://www.instagram.com/reel/DXlA9zLjsbr/", "title": "Crispy Rice Creamy Teriyaki Salmon Salad", "caption": "Crispy Rice Creamy Teriyaki Salmon Salad\n\n(Per Serving - 2 Total)\n632 Calories \n45gP | 49gC | 26gF\n\nIngredients:\n2 Large Cucumber\n¼ Diced Red Onion\n250g Salmon (raw weight)\n125g Cooked White Rice\n1 Tsp Chili Oil\n½ Tsp Sesame Oil\n½ Tbsp Soy Sauce\n150g Edamame\n1 Cup Shredded Red Cabbage\nGreen Onion\nSesame Seeds\n\nSalmon Seasonings:\n2 Tsp Salt\n1 Tsp Pepper\n2 Tsp Garlic Powder\n\nCreamy Teriyaki Dressing:\n125g Greek yogurt\n1 Tbsp Low Fat Mayonnaise\n1 Tsp Sesame Oil\n½ Tbsp Vinegar/Rice Vinegar\n2 Tbsp Soy Sauce\n10ml Honey\n1 Tbsp Stevia\n1 Tsp Minced Ginger\n1 Tsp Garlic Powder\nSalt and Pepper to taste\n\nInstructions:\n1. Prepare the rice by adding 125g Cooked White Rice, 1 Tsp Chili Oil, ½ Tsp Sesame Oil, 1 Tbsp Soy Sauce and giving it a good mix\n2. Place on a baking sheet and bake in the oven at 370F for about 35-40mins, giving it a stir occasionally.\n3. Season the salmon filet with the following seasonings: 2 Tsp salt, 1 Tsp Pepper, 2 Tsp Garlic Powder and air fry or bake in the oven at 370F for 13-16 mins (Depending on the thickness). \n4. Make the dressing by combining 125g Greek yogurt, 1 Tbsp Low Fat Mayonnaise, 1 Tsp Sesame Oil, ½ Tbsp Vinegar/Rice Vinegar, 2 Tbsp Soy Sauce, 10ml Honey, 1 Tbsp Stevia, 1 Tsp Minced Ginger, 1 Tsp Garlic Powder, Salt and Pepper to taste\n5. Into a large bowl add in all the ingredients above and mix well. \n6. Best eaten right away as the rice will start to rehydrate if left for too long and will no longer be crispy. Enjoy!\n\nFollow for daily healthy recipes!", "owner": "Chris Lee", "username": "kyungsoofit", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 23, "clean_title": "Crispy Rice Creamy Teriyaki Salmon Salad"}, {"url": "https://www.instagram.com/reel/DXckuZyERoh/", "title": "SWEET POTATO SALAD WITH CRISPY PARMESAN-ARTICHOKE CRUMBLE! This is how you turn sweet potatoes into an epic salad.", "caption": "SWEET POTATO SALAD WITH CRISPY PARMESAN-ARTICHOKE CRUMBLE! This is how you turn sweet potatoes into an epic salad.\nRoasted until caramelized, layered with herbs, & finished with a crispy parmesan–artichoke crumble that hits every texture.\nThe creamy cumin dressing pulls it all together. Always use a good quality olive oil—me, I only use @latourangelle—best tasting & best quality out there! \n•\nDressing:\n3 tbsp La Tourangelle Olive Oil \n2 tbsp plain Greek yogurt\n1 tbsp maple syrup \n1 tbsp Dijon mustard \n1/2 tbsp balsamic vinegar \n1/2 tsp dried oregano \n1/2 tsp cumin\n1/4 tsp salt\nPepper to taste\n•\nSalad:\n2 1/2-3 lbs sweet potatoes, peeled and chopped\n2-3 tbsp La Tourangelle Olive Oil\n3/4 tsp salt\n1 tsp dried basil \n1/2 tsp garlic powder \n2 cups chopped arugula\n•\nTopping:\n1 cup jarred artichoke hearts, drained/ patted dry/ finely chopped \n3/4 cup shredded Parmesan cheese \n1 tbsp La Tourangelle Olive Oil \n1/2 cup chopped scallions\n1/4 cup chopped cashews\n1 tsp lemon zest\n•\n1️⃣Preheat the oven to 425. Line a large sheet pan and a small sheet pan with parchment paper. 2️⃣Add the sweet potatoes to the large sheet pan, add the olive oil and seasonings and toss to coat. Spread out the sweets and roast for 25-30 minutes, tossing halfway. Remove from the oven and allow to cool. 3️⃣Add the artichokes and Parmesan to the small sheet pan, then drizzle with the olive oil and toss. Place it in the oven for 12-16 minutes, tossing a bit at the 8 minute mark. The edges should be crisp and the Parmesan just browned when you remove it from the oven. Allow it to cool. 4️⃣Make the dressing. Add all the ingredients to a jar and whisk or shake to combine. 5️⃣Once the sweets are cool, add the arugula to the sheet pan and toss. 6️⃣Once the artichokes are cool, gently break apart the crispy cheese to create a crumble, then add the cashews, scallions and lemon zest. Toss. 7️⃣Plate the salad, then top with the crumble and dress to coat. Toss everything together.\n•\n#sweetpotatorecipes\n#healthyrecipes\n#saladideas\n#easyrecipes\n#foodporn", "owner": "Caitlin Latessa-Greene", "username": "starinfinitefood", "hashtags": ["foodporn", "healthyrecipes", "saladideas", "easyrecipes", "sweetpotatorecipes"], "user_tags": [], "collection": "Meals", "id": 24, "clean_title": "SWEET POTATO SALAD WITH CRISPY PARMESAN-ARTICHOKE CRUMBLE! This..."}, {"url": "https://www.instagram.com/reel/DWzdPxzEYHQ/", "title": "ZUCCHINI & HALLOUMI SALAD WITH CHARRED VINEGAR DRESSING! Hard seared until jammy and smoky, tossed with crispy golden ha", "caption": "ZUCCHINI & HALLOUMI SALAD WITH CHARRED VINEGAR DRESSING! Hard seared until jammy and smoky, tossed with crispy golden halloumi, thin shaved shallots, and finished with a warm charred vinegar + honey glaze that hits sweet, sharp, and just a little sticky. Made with the BEST @latourangelle olive oil—the only one I use!\n\nIt’s soft, crispy, tangy, rich — all at once.\n•\n•\nFor the zucchini & halloumi:\n4 medium zucchini\nSalt\n2-3 tablespoons La Tourangelle Olive Oil\n3/4 cup halloumi, cut into bite sized pieces \n•\nFor the dressing:\n1/4 cup white wine, rice or champagne vinegar \n1 clove minced garlic \n3 tbsp La Tourangelle Olive Oil\n1 tbsp honey\nSalt and pepper to taste\n•\nFor the salad: \nBig handful greens (I used arugula and mixed greens)\n1/2 cup thinly sliced shallots\n1/2 cup chopped dates\n2 tbsp chopped almonds\n•\n1️⃣Slice the zucchini in half lengthwise, then score the tops of the zucchini diagonally, and then slice into thirds. 2️⃣Add the zucchini to a plate and top liberally with salt. Let the zucchini sit for 15 minutes then pay dry with paper towels. Do not rinse. 3️⃣While the zucchini sits, make the dressing. Heat the vinegar over medium high with the garlic for about 1-2 minutes until it reduces about half (this happens fast). Turn the heat off, add the olive oil, honey, salt and pepper. Whisk and set aside. 4️⃣Heat a large skillet over medium high heat, add 1 tablespoon olive oil and the zucchini face down (do this in batches—do not over crowd and use more oil if needed ). Sear for about 2-3 minutes per side, then remove to a plate, clean out the pan and add 1 tablespoon olive oil and the halloumi. Cook for 1 minute per side. Place it on a plate. 5️⃣Add the greens, the zucchini, the halloumi, the shallots, the dates and the almonds to a bowl. Add dressing to taste and toss.\n•\n#zucchinirecipe #healthyrecipes #easyrecipes #halloumi #homecooking", "owner": "Caitlin Latessa-Greene", "username": "starinfinitefood", "hashtags": ["zucchinirecipe", "healthyrecipes", "halloumi", "homecooking", "easyrecipes"], "user_tags": [], "collection": "Meals", "id": 25, "clean_title": "ZUCCHINI & HALLOUMI SALAD WITH CHARRED VINEGAR DRESSING! Hard..."}, {"url": "https://www.instagram.com/reel/DWj0aw1D-v-/", "title": "SMALL BATCH BROWNIE PUDDING 🍫✨ // I know i’m late to the party with this one but it’s for good reason OK.. i’ve been tes", "caption": "SMALL BATCH BROWNIE PUDDING 🍫✨ // I know i’m late to the party with this one but it’s for good reason OK.. i’ve been testing and testing this recipe behind the scenes to perfect it and i’m so glad i took my sweet time because it is absolute PERFECTION. \n\nIt’s rich, fudgy, and has that molten, brownie batter center that makes every bite better than the last. PLUSSSS you don’t need any fancy equipment either and comes together in just about 20 minutes. it’s Gluten-free, naturally sweetened, and honestly one of the best textures I’ve ever had. I’ve made this more times than I can count already and I’m still not over it.\n\nComment RECIPE and I’ll send it your way 🤎\n\nhttps://lovelydelites.com/small-batch-brownie-pudding-re-fined-sugar-free-gluten-free/\n\n1/4 cup creamy almond butter (I like the one from Trader Joe’s! )\n1 tbsp coconut oil\n½ cup dark chocolate chips\n¼ cup coconut sugar\n¼ cup maple syrup\n1 whole egg\n1 egg yolk\n1 tsp vanilla extract\n2 tbsp almond flour\n3 tbsp cacao powder (dark preferred)\n\nPreheat oven to 350°F. Butter/grease an 8×8 ceramic baking dish.\nIn a heatproof bowl, gently melt almond butter, coconut oil and chocolate until smooth (you can use a double boiler on the stove-top, or microwave in 20–30 second bursts).\nStir in coconut sugar and maple syrup while warm.\nWhisk in eggs one at a time until glossy and thick (whisking slowly) this helps create the crackly top. Add vanilla extract last.\nIn a small bowl, whisk together the almond flour, cocoa powder and salt.\n\nFold dry into wet and mix with a spatula until just combined. Batter was silky, thicker than brownie batter, but thinner than cookie dough. Add to prepared dish and spread evenly.\nBake 18-22 minutes or until edges are set and the center is mostly set. (a little jiggle is ok) If your oven runs hot, check it at the 15 minute mark!\nLet sit 10–12 minutes to let the pudding center thicken before serving.\nTop with flakey sea salt if desired, scoop and enjoy warm with vanilla ice cream!\n\n#browniepudding #inagartenbrowniepudding #smallbatchdessert #glutenfreebaking", "owner": "hannah kling", "username": "lovelydelites", "hashtags": ["inagartenbrowniepudding", "smallbatchdessert", "glutenfreebaking", "browniepudding"], "user_tags": [], "collection": "Meals", "id": 26, "clean_title": "SMALL BATCH BROWNIE PUDDING // I know i’m late to the party with..."}, {"url": "https://www.instagram.com/reel/DXpLOBJDrUM/", "title": "Healthy Brownie Skillet✨ This nutritious dessert is rich in potassium, iron, & heart healthy fats! Make sure your banana", "caption": "Healthy Brownie Skillet✨ This nutritious dessert is rich in potassium, iron, & heart healthy fats! Make sure your banana is RIPE & use a honey peanut butter for extra sweetness! I tried it with a regular banana & a natural peanut butter & it didn’t come out as good. Just warning you! (Recipe below!) \n\nRecipe:\n\nIngredients-\n1 ripe banana\n3 tbsp honey peanut butter\n2 tbsp cocoa powder\nChocolate chips to liking\nIce cream for serving (optional/I used a protein based ice cream)\n\nDirections-\n1. Preheat the oven to 350F. Or you can air fry that at 350F for 10-15 minutes.\n2. Alto a skillet, add the banana & mash into a puree. Then add the honey peanut butter & cocoa powder.\n3. Mix until well combined, top with chocolate chips to liking, & bake for 15 minutes.\n4. Take out, top with ice cream, & enjoy!\n\n#food #instafood #healthy #dessert", "owner": "Dr. Jenna Ann Hunter, EdD MS RD", "username": "thehealthyhophead", "hashtags": ["healthy", "dessert", "food", "instafood"], "user_tags": [], "collection": "Meals", "id": 27, "clean_title": "Healthy Brownie Skillet This nutritious dessert is rich in..."}, {"url": "https://www.instagram.com/p/DWhC7aaCAJm/", "title": "Rich espresso brownie with your perfect topping", "caption": "Rich espresso brownie with your perfect topping \nIce cream for indulgence or whipped cream for a lighter vibe \n\nRecipe\n• Preheat oven to 170°C and line a baking pan\n\n• Melt chocolate and butter until smooth\n\n• Whisk in sugar, then eggs and vanilla\n\n• Add espresso (and liqueur if using)\n\n• Mix in flour, cocoa powder, and salt\n\n• Pour into pan and bake 18–22 minutes until fudgy\n\n• Cool slightly but serve warm\n\n• Top with either:\n– A scoop of vanilla ice cream (for contrast + melt effect)\n– A dollop of whipped cream (lighter, airy finish)\n\n• Optional: drizzle chocolate or espresso on top", "owner": "Crave Flash", "username": "craveflash", "hashtags": [], "user_tags": [], "colle al #proteinoats", "owner": "Kızıl Mutfak | Healthy | Breakfast | Oatmeal Recipes", "username": "kizilmutfak", "hashtags": ["oatmeal", "proteinoats", "overnightoats", "oatsforbreakfast", "breakfastideas"], "user_tags": [], "collection": "Meals", "id": 32, "clean_title": "Chocolate & Hazelnut Overnight Oats"}, {"url": "https://www.instagram.com/reel/DU1cSoSEmxi/", "title": "Mocha Cookie Crumble Frappuccino ✨", "caption": "Mocha Cookie Crumble Frappuccino ✨\n\nIngredients:\n\n• 1 cup Ice\n• 1 cup Milk\n• 1-2 tsp Instant Coffee\n• 1 Tosp sugar (if you want extra sweet)\n• 2 Tbsp Mocha Sauce\n• 2 tosp Chocolate Chips\n• Xanthum gum (for the creamy texture) optional\n• Whipped cream\n• Chocolate cookie crumble\n\nInstructions:\n1. Blend: Combine ice, milk, instant coffee, xanthan gum, mocha sauce, sugar and chocolate chips. Blend until smooth.\n2. Layer the Bottom: Add whipped cream and cookie crumble (crush some oreo cookies) to the bottom of the cup.\n3.Pour: Pour the blended mix into the cup over the bottom layer.\n4. Top: Add whipped cream, drizzle with mocha sauce, and sprinkle with more cookie crumble.\nEnjoy your Mocha Cookie Crumble Frappuccino!\n\n#frappucino #cookiecrumble #coffeegirl #reelsinstragram #instantcoffee", "owner": "Divya | CoffeeVibes", "username": "coffeevibes03", "hashtags": ["reelsinstragram", "cookiecrumble", "frappucino", "coffeegirl", "instantcoffee"], "user_tags": [], "collection": "Meals", "id": 33, "clean_title": "Mocha Cookie Crumble Frappuccino"}, {"url": "https://www.instagram.com/reel/DUWVNAVE2_t/", "title": "HOT CHOCOLATE MOCHI BITES!", "caption": "HOT CHOCOLATE MOCHI BITES!\nLet’s make the super soft and delicious mochi bites with no microwave and no steamer!\nIt was so good and too EASY to make! Do try and Enjoy Bestie!💗✨\n \nIngredients:💌\n♡Cocoa powder- 5g\n♡Sugar- 30g\n♡Corn starch- 10g\n♡Milk- 85g\n♡Glutinous Rice Flour- 45g\n♡Butter- 10g\n \n1. In a pan, Add cocoa powder, Sugar, Corn starch and 35g Milk; Mix until combined.\n2. Add 50g Milk and Mix until combined.\n3. Add Glutinous Rice Flour and Mix until combined.\n4. Add Butter.\n5. Mix and cook on low heat until soft dough is formed.\n6. Use hand gloves and Knead until stretchy.\n7. Divide into bite size pieces and coat with corn starch to prevent sticking.\n8. Dip in nutella and crushed biscoff cookies.\n9. Enjoy!✨", "owner": "Suzu Homecafe🧸", "username": "suzuvibes", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 34, "clean_title": "HOT CHOCOLATE MOCHI BITES"}, {"url": "https://www.instagram.com/reel/DWUBl11kZju/", "title": "Brownie Batter Iced Latte 🍫🤍☕️", "caption": "Brownie Batter Iced Latte 🍫🤍☕️\n\nThis one is para todos mis chocolate lovers - super rich, creamy y literal like licking the spatula when making brownies! \n\nFor this latte you’ll need:\n• 2 tsp instant espresso \n• 1 tbsp chocolate sauce \n• 1 tsp brown sugar \n• 1 tsp vanilla bean paste \n• pinch of salt\n• 2 oz water\n• 6oz milk of choice \n\n#browniebatter #instantcoffee #coffeerecipes #coffeeathome #homecafe", "owner": "Fifi’s Home Coffee Bar | Sofia H.", "username": "fifiscoffee", "hashtags": ["homecafe", "coffeerecipes", "browniebatter", "instantcoffee", "coffeeathome"], "user_tags": [], "collection": "Meals", "id": 35, "clean_title": "Brownie Batter Iced Latte"}, {"url": "https://www.instagram.com/reel/DWV5vIojJzR/", "title": "⁨\t⁨\tהמאפייה הכשרה פרק 6- פיצה משפחתית ללא גלוטן כשרה לפסח!!!", "caption": "⁨\t⁨\tהמאפייה הכשרה פרק 6- פיצה משפחתית ללא גלוטן כשרה לפסח!!! \n(לאוכלי קטניות)\n\nמצרכים לתבנית מלבנית (25x35):\n•500 גרם קמח מולינו ירוק כשר לפסח \n•ביצה L\n•כף שמרים יבשים (של חברת תמי יש כשלפ)\n•כף סוכר \n•כפית מלח \n•550 מ״ל מים פושרים \n•4 כפות שמן זית \n•רוטב עגבניות לפיצה \n•מיקס גבינות מגורדות- מוצרלה, צהובה, צ׳דר\n•עלים שאוהבים- אורגנו/בזיליקום \n\nאופן ההכנה: \n1) בקערה שמים את הקמח, שמרים, מלח, סוכר, ביצה, שמן זית ומים בהדרגה ולשים עד לקבלת בצק אחיד ודביק מאוד, מעבירים אותו ישר לתבנית מרופדת בנייר אפייה משומנת בשמן זית ובעזרת הידיים בלי לישהפרק 1"}, {"url": "https://www.instagram.com/reel/DWR9NCWEQsm/", "title": "ROASTED CAULIFLOWER SALAD WITH CRISPY WHITE BEAN CRUMBLE! Crispy edges, creamy dressing, a little sweetness…& just enoug", "caption": "ROASTED CAULIFLOWER SALAD WITH CRISPY WHITE BEAN CRUMBLE! Crispy edges, creamy dressing, a little sweetness…& just enough tang. This salad is layered in the best way—crunchy white bean crumble, fresh herbs, & a tangy maple tahini dressing that pulls everything together. (note—you likely won’t need all the dressing). Using @latourangelle olive oil, because it is the best tasting and quality out there 🤜 \n\nSave this—great for meal prep 👌\n•\nFor the cauliflower:\n1 large head cauliflower, broken into tiny florets including leaves\n3 tbsp La Tourangelle Olive Oil\n1 tbsp paprika\n1 tsp garlic powder \n1 tsp cumin\n1/2 tsp salt\n2 cups chopped arugula \n1/2 cup finely chopped red onion\n•\nFor the beans:\n1 15 oz can cannellini beans, rinsed/drained/patted dry\n1 tbsp La Tourangelle Olive Oil \n1/2 tsp salt\n1 tsp dried basil or oregano \nPepper to taste\n1/2 cup chopped arugula \n1/4 cup chopped pistachios \n•\nFor the dressing:\n2 tbsp La Tourangelle olive oil \n4 tbsp tahini \n4 tbsp lemon juice \n1/2tsp salt \nPepper to taste\n2 tbsp maple syrup \n1/4 cup chopped scallions \n1-2 tbsp Water\n•\n1️⃣Preheat the oven to 425. Place a sheet pan in the oven while it preheats. 2️⃣Add cauliflower to the hot sheet pan, add the oil and spices and toss to combine. Place in the oven for about 30 minutes, tossing halfway. 3️⃣Make sure the beans are patted dry then roughly chop them, then place on a smaller sheet pan. Add the oil and spices and toss, then roast them for 15-20 minutes, until they are brown with crispy edges. Remove them from the oven and after 5 minutes of cooling, add the arugula and pistachios and toss together. Set aside. 4️⃣While the cauliflower roasts, make the dressing. Add all ingredients to a jar with one of the tablespoons of water and whisk or shake to combine. For thinner consistency, add more water 1 teaspoon at a time and mix. 5️⃣Remove the cauliflower from the oven, add the arugula and the onion to the sheet pan and toss. 6️⃣Plate the salad, top with the crispy bean topping, then dress as desired and toss. \n•\n#cauliflowerrecipes #healthyrecipes #vegetarianrecipes #foodreels #easyhealthymeals", "owner": "Caitlin Latessa-Greene", "username": "starinfinitefood", "hashtags": ["foodreels", "vegetarianrecipes", "easyhealthymeals", "healthyrecipes", "cauliflowerrecipes"], "user_tags": [], "collection": "Meals", "id": 43, "clean_title": "ROASTED CAULIFLOWER SALAD WITH CRISPY WHITE BEAN CRUMBLE! Crispy..."}, {"url": "https://www.instagram.com/reel/DVoU1tkDIhE/", "title": "תכתבו מתכון והוא ישלח אליכם", "caption": "תכתבו מתכון והוא ישלח אליכם", "owner": "יועצת תזונה | YUVFITNESS", "username": "yuval.madmon", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 44, "clean_title": "תכתבו מתכון והוא ישלח אליכם"}, {"url": "https://www.instagram.com/reel/DWJujEUDAgf/", "title": "מתכונים מקוטג׳ חלק  והפעם 3 מאפים מבצק אחד, בסלסלה מושלמת ומרשימה לאירוח ✨", "caption": "מתכונים מקוטג׳ חלק #6 והפעם 3 מאפים מבצק אחד, בסלסלה מושלמת ומרשימה לאירוח ✨\nלבצק:\n2 קוטג׳ 5%\n2 ורבע כוסות קמח \n2 כפיות אבקת אפיה \nכפית מלח \n\nטוחנת את הקוטג׳ למרקם חלק, מכניסה לקערה גדולה ואליה את הקמח, אבקת האפיה והמלח. לישה ביד עד שנהיה בצק אחיד (תראו בסרטון, אחיד אבל לא חלקלק כזה)\n*אם הקוטג׳ נוזלי יכול להיות שתצטרכו עוד קצת קמח, תראו תוך כדי לישה ואם צריך תוסיפו ממש בהדרגה. \n\nמחלקת את הבצק שנוצר ל3 חלקים\nמאפה ראשון: פרעצל 🥨\nמגלגלת לנחש, חותכת עם סכין בערך 5 ס״מ כל חתיכה, ומכניסה את החתיכות לסיר על הגז עם מים רותחים ו3 כפות של סודה לשתיה. נותנת להן 20-30 שניות ומוציאה חזרה לתבנית אפיה. \nמברישה בביצה, קצת מלח גס ולתנור 180 מעלות 15-20 דקות אבל תשגיחו ותראו שמשחים יפה אך לא מדיי. \n\nמאפה שני: לחמניות גבינה- \nאת החלק השני של הבצק חילקתי לכדורים בגודל של קצת פחות מכדור פינג פונג. \nעל חלק הברשתי ביצה וגירדתי מוצרלה, וחלק הרטבתי יים קצוצים\n2 שיני שום קצוצות\nבצל לבן בינוני או חצי בצל לבן גדול קצוץ דק דק\n2 כפות שמן זית\n20 גרם חמאה\nמלח פלפל לפי הטעם \nלימון פרסי (אופציונלי ולמי שאוהב)\n\nמתחילים בטיגון הבצל עם מעט מלח עד שהוא מזהיב. מוסיפים שום וארטישוקים ומטגנים עוד דקה. מוסיפים את הפתיתים ומטגנים קלות בשמן הזית.\n\nמוסיפים כוס מים ומיץ לימון ומבשלים על אש בינונית עד שהנוזלים מצטמצמים מעט. מוסיפים אפונה ואז עוד מים לפי הצורך. יכול להיות שבשלב הזה תצטרכו להוסיף עוד מים אז פשוט תטעמו מדי פעם ותוסיפו מים בהדרגה עד שהפתיתים רכים ומוכנים.\n\nכשהפתיתים מוכנים מוסיפים פנימה את הירוקים הקצוצים פרמזן וגרידת לימון. מתקנים תיבול עם מלח עוד מיץ לימון ומי שאוהב ממליצה להוסיף לימון פרסי או פלפל שחור ולבסוף מוסיפים קוביית חמאה.\n\nמומלץ להגיש עם כף שמנת חמוצה.\n\nותכלס? אפשר גם לוותר על החמאה אם פחות בא לכם זה יוצא נהדר גם בלי.⁩⁩", "owner": "Yuval Rozen | יובל רוזן", "username": "yuval_rozen", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 54, "clean_title": "פתיתים ברוטב לימון וארטישוק"}, {"url": "https://www.instagram.com/reel/DVY29OOghG9/", "title": "אולי המתכון המהיר בעולם ⏱️🍜⬇️", "caption": "אולי המתכון המהיר בעולם ⏱️🍜⬇️\n\nמטרת הסדרה היא לאו דווקא לתת את המתכונים *הכי* טובים בעולם, אלה לתת מתכונים למנות ממש טעימות שמכינים בדקות בודדות כדי שלא תשארו רעבים במקלטים😬 בתאבון ולא לשכוח לעקוב לפרק שני! \n\nמתכון לפי חבילה אחת של נודלס (50 גרם):\n\n- 3 כפות שמן\n- שליש כפית צ׳ילי חריף\n- חופן בצל ירוק (אפשר לדלג אם אין זמן)\n- כף שמנה מאוד של חמאת בוטנים או טחינה גולמית\n- 3-4 כפות סויה\n- סוכר אם צריך \n\n#אוכל #פוריו #מתכון #בישול #ארוחתערב", "owner": "Ron Shirazi | רון שירזי", "username": "ronshirazii", "hashtags": ["פוריו", "ארוחתערב", "מתכון", "בישול", "אוכל"], "user_tags": [], "collection": "Meals", "id": 55, "clean_title": "אולי המתכון המהיר בעולם ⏱️⬇"}, {"url": "https://www.instagram.com/reel/DUtMXRBCNKs/", "title": "Ep 93 of EAT LIKE A GREEK🇬🇷✨ follow @chefmarinie for all recipes in the series!", "caption": "Ep 93 of EAT LIKE A GREEK🇬🇷✨ follow @chefmarinie for all recipes in the series! \n\nThese tiropita-inspired stuffed flatbreads are my shortcut version: soft homemade dough wrapped around a simple mix of feta, mozzarella, olive oil and black pepper, then pan-fried until golden and blistered😮‍💨\n\nThey’re crispy on the outside, molten in the middle, and dangerously easy to make💅🏻\n\nComment “flatbreads” or “recipe” and I’ll DM you the link to the recipe 🔗🫶🏻\n\n#flatbreads #greekfood #easyrecipe", "owner": "Marina Georgallides", "username": "chefmarinie", "hashtags": ["easyrecipe", "greekfood", "flatbreads"], "user_tags": [], "collection": "Meals", "id": 56, "clean_title": "Ep 93 of EAT LIKE A GREEK🇬🇷 follow for all recipes in the series"}, {"url": "https://www.instagram.com/reel/DVO7BRMkdDD/", "title": "Addicting CAESAR SALAD DIP ‼️🥬✨comment “cookbook” and I’ll dm you the link to my salad cookbook!", "caption": "Addicting CAESAR SALAD DIP ‼️🥬✨comment “cookbook” and I’ll dm you the link to my salad cookbook!\n\nCaesar salad dip recipe:\n1 head romaine lettuce, micro chopped\n1 head kale, micro chopped\n1 cup toasted gluten-free panko breadcrumbs (toasted in olive oil and salt in pan on medium heat for 5 min, stirring every 30 seconds)\n1/2 cup shredded Parmesan (I use vegan Parmesan)\n\nDressing:\n1 cup cream cheese I use @kitehillfoods\n1/2 cup @kitehillfoods yogurt unsweetened\n2 tbsp olive oil\n1/3 cup chopped capers\n1 tbsp nutritional yeast\n2 tbsp lemon juice\n1/2 tsp garlic powder\n1 tsp red or white miso paste\n2 tsp Dijon mustard\n\n*whisk all dressing ingredients in bottom of a bowl then add the greens and the rest of the ingredients and mix well! Serve with chips, or crackers or veggies.\n\n#salad #caesarsalad #healthyrecipes", "owner": "Danielle Brown | healthy recipes", "username": "healthygirlkitchen", "hashtags": ["salad", "healthyrecipes", "caesarsalad"], "user_tags": [], "collection": "Meals", "id": 57, "clean_title": "Addicting CAESAR SALAD DIP ‼️comment “cookbook” and I’ll dm you..."}, {"url": "https://www.instagram.com/reel/DVHDJwojiVf/", "title": "Single Serve Cookie Pudding✨ this recipe was inspired by @the_foodiediaries & it came out PERFECT! This is a great recip", "caption": "Single Serve Cookie Pudding✨ this recipe was inspired by @the_foodiediaries & it came out PERFECT! This is a great recipe for those of you who want a sweet treat but struggle with portion control! (Recipe below!)\n\nRecipe:\n\nIngredients-\n1 tbsp egg \n1 1/2 tbsp melted salted butter \n2 tbsp granulated sugar\n1 tbsp brown sugar\nDash of vanilla\n3 tbsp all purpose flour \n1/8 tsp baking soda\nChocolate chips to liking \n(Optional) ice cream for topping \n\nDirections-\n1. Preheat the oven to 350F.\n2. To a small baking dish (I have the one I used linked in my Amazon storefront linked in bio), add the egg, butter, granulated sugar, brown sugar, & vanilla. Mix until well combined then add the flour & baking soda. Mix again until well combined.\n3. Add the chocolate chips & fold into the mixture. Clean the sides of the dish, then top with more chocolate chips. \n4. Bake for 8-10 minutes or until desired doneness.\n5. Take out, top with ice cream, & enjoy!\n\n#food #dessert #snack #instafood #foodphotography", "owner": "Dr. Jenna Ann Hunter, EdD MS RD", "username": "thehealthyhophead", "hashtags": ["snack", "foodphotography", "dessert", "food", "instafood"], "user_tags": [], "collection": "Meals", "id": 58, "clean_title": "Single Serve Cookie Pudding this recipe was inspired by & it..."}, {"url": "https://www.instagram.com/reel/DUq-_XJkuGk/", "title": "CREAMY LEMON-SHALLOT PASTINA (no cream!) There’s something about a bowl of pastina that feels like a hug 🤍", "caption": "CREAMY LEMON-SHALLOT PASTINA (no cream!) There’s something about a bowl of pastina that feels like a hug 🤍 \n\nCreamy lemon + shallots + that velvety sauce…but the creaminess actually comes from whipped cottage cheese (you’d literally never know!) Comfort food energy with a protein boost & no heavy feeling. My kind of Valentine’s night in. Non-negotiable: use the best quality olive oil—@latourangelle! Save this for your next cozy dinner.\n•\n3 tbsp La Tourangelle Olive Oil, divided, plus more for topping \n1 yellow onion, diced\n2 shallots, diced\n1 1/2 cups stelline pasta\n3 cloves garlic, grated\n4 cups vegetable broth\n1 tbsp unsalted butter\n1 tsp salt\nPepper to taste\n1 cup cottage cheese, blended\n1 1/2 cups shredded Parmesan cheese, plus more for topping \nJuice of 1/2 lemon\nZest of 1/2 lemon, plus more for topping \n1/4 cup fresh chopped parsley, plus more for topping \n•\n1️⃣Heat a large skillet over medium heat. Add 2 tablespoons olive oil with the onion and shallots. Sauté for about 3-4 minutes, until they begin to soften and become translucent. 2️⃣Add the pasta and give it a few stirs, then add the garlic and cook for another 1-2 minutes until fragrant. 3️⃣Add the broth, butter, salt and pepper and stir every few minutes, making sure nothing sticks to the bottom of the pan. Continue to cook over medium heat for about 25 minutes, until most of the broth has been absorbed and the pasta is mostly cooked but slightly al dente. 4️⃣Add the cottage cheese, Parmesan, lemon juice and lemon zest, stirring after each ingredient to make sure it is well incorporated. Cook for about 5 minutes or so. The consistency should be that of a thick creamy sauce that takes shape—you don’t want it too runny. Once it is done, turn off the heat and add the parsley, salt and pepper to taste, then stir to combine. 5️⃣Serve the pasta in a bowl, optionally topped with extra Parmesan, parsley, lemon zest and a drizzle of olive oil. \n•\n#healthyrecipes #highproteinmeals #comfortfood #pastalover #starinfinitefood", "owner": "Caitlin Latessa-Greene", "username": "starinfinitefood", "hashtags": ["starinfinitefood", "highproteinmeals", "healthyrecipes", "pastalover", "comfortfood"], "user_tags": [], "collection": "Meals", "id": 59, "clean_title": "CREAMY LEMON-SHALLOT PASTINA (no cream!) There’s something about..."}, {"url": "https://www.instagram.com/reel/DTSXxeGjCft/", "title": "אורזו של ימי חורף", "caption": "אורזו של ימי חורף \nהגרסה המוצלחת לפתיתים, משהו ביניהם לריזוטו\nטעם עמוק וכיפי\nהדבר שהכי זורם עכשיו במזג אוויר הזה \nשמחה לספר לכם שאחרי הרבה זמן העלתי מתכון לאתר \nמצרפת לינק בסטורי אפשר גם דרך הפרופיל\nמקווה שהתגעגעתם\nצירפתי גם ורסיה צמחונית כשרה יוצא גם מהמם\nשבת שלוםםם\n•\n•\n#עדןדוד #אורזו #פתיתים #חורף", "owner": "עדן דוד | ארוחות פרטיות | סדנאות בישול", "username": "edendavid23", "hashtags": ["אורזו", "חורף", "פתיתים", "עדןדוד"], "user_tags": [], "collection": "Meals", "id": 60, "clean_title": "אורזו של ימי חורף"}, {"url": "https://www.instagram.com/reel/DS8VxRoEvUK/", "title": "my second most viral video of 2025 with a combined 25 million views—HONEY GLAZED SALMON BOWLS W/CUCUMBER AVOCADO SALAD a", "caption": "@kalejunkie my second most viral video of 2025 with a combined 25 million views—HONEY GLAZED SALMON BOWLS W/CUCUMBER AVOCADO SALAD avocado salad and a no-mayo protein packed spicy sauce! This recipe is easy and soooo delicious, so if you haven’t made it yet, this is your sign 🪧!⁣\n⁣\nMakes 4 servings⁣\nSalmon bites⁣\n1 1/2 pounds salmon, skin removed and cut into bite sized pieces ⁣\n2 tb avocado oil ⁣\n2 tb honey⁣\n3 tb sriracha ⁣\n1/4 cup low sodium soy sauce (or coconut aminos/tamari for a gf option)⁣\n2 cups cooked rice⁣\n⁣\nCucumber avocado salad⁣\n2 persian cucumbers, finely diced⁣\n1 avocado, finely diced⁣\n1/4 cup cilantro⁣\n1 lime, juiced ⁣\n1 tb honey⁣\n⁣\nSpicy sauce⁣\n1 cup cottage cheese⁣\n1 lime, juiced ⁣\n1/4 cup sriracha⁣\n2 tsp cumin⁣\n1 tsp smoked paprika ⁣\n1 tb honey ⁣\n⁣\nPreheat oven to 400F. Coat the salmon in the avocado oil, honey, sriracha and soy sauce. Transfer to a parchment-lined baking sheet. Bake 10-11 minutes, then broil for 1-2 minutes at the end to get that crunchy top. Remove from oven and set aside. Cook rice according to package instructions and set aside. Make the spicy sauce by adding everything to a blender and blending until completely smooth. Taste and adjust seasonings as needed. Last, make the cucumber-avocado salad. Add all ingredients to a bowl and toss well. Finally, assemble your bowls. Add rice first, followed by the salmon bites, then the cucumber-avocado salad, and last, a drizzle of the delicious spicy sauce on top. Enjoy!⁣\n⁣\n#salmonbowls #salmon #dinnertonight #dinnerrecipes⁣", "owner": "Nicole Keshishian | KALEJUNKIE®", "username": "kalejunkie", "hashtags": ["salmon", "salmonbowls", "dinnertonight", "dinnerrecipes"], "user_tags": [], "collection": "Meals", "id": 61, "clean_title": "Makes 4 servings⁣"}, {"url": "https://www.instagram.com/reel/DTAL7y6iftQ/", "title": "bringing on 2026 with this sticky, sweet, and oh so delicious salmon bowl 💛", "caption": "bringing on 2026 with this sticky, sweet, and oh so delicious salmon bowl 💛\n\nIt’s comforting without being heavy and the kind of meal I could eat every night of the week😛🤌🏻\n\nFull recipe on my Substack via the link in my bio\n\nHappy cooking and HNY🥳🥳🥳\n\n#stickysalmonbowl #salmonbowls #healthydinnerrecipes #salmonrecipe #quickdinnerideas", "owner": "The Fit Feast", "username": "thefitfeast", "hashtags": ["stickysalmonbowl", "quickdinnerideas", "salmonbowls", "salmonrecipe", "healthydinnerrecipes"], "user_tags": [], "collection": "Meals", "id": 62, "clean_title": "bringing on 2026 with this sticky, sweet, and oh so delicious..."}, {"url": "https://www.instagram.com/reel/DTJIWrxkjSc/", "title": "ROASTED BROCCOLI & CHICKPEA SALAD WITH TAHINI-PARMESAN DRESSING! Salads should not be boring—so make your veggies fancy ", "caption": "ROASTED BROCCOLI & CHICKPEA SALAD WITH TAHINI-PARMESAN DRESSING! Salads should not be boring—so make your veggies fancy this year🤌 This one is flavorful & super easy to make 👊 Perfect for meal prep\n•\nFor the broccoli & salad:\n2 large heads broccoli, chopped\n2 1/2 tbsp olive oil\n1/2 tsp salt\n1/2 tsp garlic powder\n1/2 tsp dried oregano \n1/2 cup chopped dates\n1/2 cup chopped cashews\n1/2 cup chopped cilantro\n1/2 cup finely chopped red onion\n•\nFore the chickpeas:\n1 15-oz can chickpeas, rinsed and drained \n1/2 tbsp olive oil \n1/2 tbsp maple syrup \n1/2 tsp salt\n1/2 tsp paprika\n•\nFor the dressing: \n6 tbsp tahini\n1/4 cup grated Parmesan\n1/2 tbsp maple syrup\n1/4 tsp salt, or more to taste \nPepper to taste \nJuice of 1 lemon\n1 clove minced garlic\n3-4 tbsp water\n•\n1️⃣Preheat the oven to 425. Add a large sheet pan to the oven while it preheats. 2️⃣Add the broccoli to the sheet pan, add the olive oil, salt, garlic powder and oregano and toss to coat. Place it in the oven for 25-30 minutes, tossing halfway. 2️⃣Place the chickpeas on a parchment lined sheet pan and place in the oven to dry roast for 10 minutes. Remove them from the oven, add the oil, salt, paprika and maple syrup and toss to coat. Place them back in the oven for 8-10 minutes. 3️⃣Make the dressing. Add the tahini, Parmesan, maple syrup, salt, pepper, lemon juice, garlic and water. Mix until smooth. 4️⃣ Add the broccoli, dates, onion, cashews and cilantro to a large bowl. Add a few spoonfuls of dressing then toss to combine. 5️⃣Add the chickpeas and more dressing and toss to combine. \n•\n#salad #broccolisalad #broccoli #easyrecipes #veggielover", "owner": "Caitlin Latessa-Greene", "username": "starinfinitefood", "hashtags": ["veggielover", "salad", "broccolisalad", "broccoli", "easyrecipes"], "user_tags": [], "collection": "Meals", "id": 63, "clean_title": "ROASTED BROCCOLI & CHICKPEA SALAD WITH TAHINI-PARMESAN DRESSING!..."}, {"url": "https://www.instagram.com/reel/DSrsZgcjfGR/", "title": "Праздничный лосось в медово-горчичном соусе под фисташковой шубой", "caption": "Праздничный лосось в медово-горчичном соусе под фисташковой шубой \n\nесли еще не определились с горячим на новогодний стол, то это оно! готовится все на одном противне, выглядит необычно + потрясающе вкусно) \n\nчто понадобится:\nфиле лосося — 1 кг\nкартофель бэби — 700 г\nспаржа — 200 г\nмайонез — 2 ст.л\nгорчица дижонская — 1 ч.л\nчеснок — 2 зубчика\nлимонный сок — 1 ст.л\nмед — 1 ст.л\nсоль, перец \n\nдля шубы:\nфисташки/миндаль/пекан — 1/2 стакана\nсухари измельч. — 3 ст.л\nсоль — 1/2 ч.л\nпетрушка измельч.— пару веточек\n\n1. Лосось очищаем от кожи, делаем 2 надреза вдоль, чтобы получилоаь 3 одинаковые полоски. \nЗаплетаем косичку и концы соединяем зубочисткой. Солим и перчим. \n\n2. На противень выкладываем картофель, солим, слегка поливаем оливковым маслом и отправляем в духовку на 25 мин на 190°.\n\n3. В миске смешиваем майонез, горчицу, чеснок, мед и лимонный сок. Обильно смазываем лосось соусом.\n\n4. Измельчаем фисташки, добавляем сухари, петрушку и соль, перемешиваем. \nЗасыпаем лосось слоем из фисташки. \n\n5. Выкладываем на тот же противень с картофелем спаржу, поливаем остатками соуса, посередине лосось. Отправляем в духовку на 20 мин при 210°.\n\n#лосось #менюнановыйгод #рецепты #горячее #фудблог", "owner": "Lianna", "username": "lioganesian", "hashtags": ["лосось", "горячее", "фудблог", "менюнановыйгод", "рецепты"], "user_tags": [], "collection": "Meals", "id": 64, "clean_title": "Праздничный лосось в медово-горчичном соусе под фисташковой шубой"}, {"url": "https://www.instagram.com/reel/DSSXpOrCI5q/", "title": "Drop me follow for more lunch ideas 🥰", "caption": "Drop me follow for more lunch ideas 🥰", "owner": "Louise Frances - Health Coach For High Performing Women", "username": "_francesfitness", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 65, "clean_title": "Drop me follow for more lunch ideas"}, {"url": "https://www.instagram.com/reel/DSrrcflCiFq/", "title": "מתכון לשעועית הירוקה של אייל שני מא׳ ועד ת׳", "caption": "מתכון לשעועית הירוקה של אייל שני מא׳ ועד ת׳\nמצרכים:\n\n500 גרם שעועית ירוקה טרייה או לוביה טרייה\nגרידת לימון מלימון שלם\nמיץ לימון מחצי לימון\n2 שיני שום \n3 כפות שמן זית\nכף מלח ים (חשוב מלח ים)\n\nאופן הכנה:\n\nראשית מחממים סיר מינימום 3 ליטר עם מים ומלח - כמה מלח? שהמים יהיו מלוחים כמו הים.\nבקערה גדולה ועמוקה מערבבים קרח ומים קרים ומניחים בצד.\nשוטפים את השעועית היטב ואז קוטמים רק את ראש השעועית - דוגמא בסרטון.\nברגע שהמים רתחו, השעועית חתוכה ומוכנה ויש לנו מי קרח בצד מתחילים בבישול.\nזורקים את השעועית לסיר עם המים חמים ל-4 דק׳ בדיוק ולא שניה יותר (לוביה 5 דק׳).\nדואגים שהשעועית כולה במים.\nברגע שהסתיים הזמן מעבירים מיד את השעועית למי הקרח - שוב דואגים שהשעועית כולה במי הקרח.\nבמקביל לקירור השעועית מכינים את הרוטב.\nלקערה גדולה מגרדים לימון, סוחטים חצי ממנו פנימה, מגרדים שום, שופכים פנימה שמן זית איכותי ומלח ים.\nערבוב קטן לרוטב ומכניסים פנימה את השעועית ישירות מהמי קרח - תנסו להעביר עם כמה שפחות מים לקערה.\nעכשיו מערבבים בצורה עדינה על מנת לשמור על שלמות השעועית והקראנצ׳יות שלה - דוגמא בסרטון.\nמוכן! מעבירים לכלי הגשה - אפשר עם נייר אפייה כמו אייל שני.\nרגע לפני הביס שופכים את יתרת הרוטב מעל ובתאבון!\n\nרוצים את המיקרופליין שגירדתי איתו את הלימון והשום? עדכנו בתגובות", "owner": "Rubi Michael | רובי מיכאל", "username": "rubimichael1", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 66, "clean_title": "מתכון לשעועית הירוקה של אייל שני מא׳ ועד ת׳"}, {"url": "https://www.instagram.com/reel/DSKBHnHjLDQ/", "title": "פיצה קוטג׳ - 10 גרם חלבון ליחידה 🍕", "caption": "פיצה קוטג׳ - 10 גרם חלבון ליחידה 🍕 \n\nמרכיבים: (10 יחידות)\n1 גביע קוטג’ 250 גרם\n2 ביצים L\n⅓ כוס שמן קנולה או שמן זית\n1 ו-¾  כוסות קמח לבן מנופה\n½ שקית אבקת אפייה\n½ כפית שטוחה מלח\n\nלתוספות:\nגבינה צהובה מגוררת\nתירס\nזיתים חתוכים\nבצל סגול פרוס\nתבלינים (תבלין פיצה/ צ׳ילי גרוס/ אורגנו)\n\nלרוטב פיצה:\n200 גרם פחית עגבניות חתוכות דק\nכף גדושה רסק עגבניות מרוכז\nשן שום כתושה\n¾ כף שמן זית\n¼ כפית אורגנו יבש\n¼ כפית שטוחה מלח\n\nאופן ההכנה:\n1. מחממים תנור ל-190 מעלות.\n2. בקערה גדולה טורפים את הביצים, הקוטג’ והשמן עד לתערובת אחידה.\n3. בקערה נפרדת מערבבים את הקמח, אבקת האפייה והמלח. מוסיפים את תערובת היבשים לתערובת הרטובה ומערבבים עד לקבלת בצק רך ודביק.\n4. בעזרת כף עוגיות או ידיים מעט משומנות יוצרים כדורים קטנים, ומשטחים בעדינות לעיגולים על תבנית מרופדת בנייר אפייה.\n5. מוסיפים מעל רוטב פיצה, גבינה ותוספות.\n6. אופים במשך 18–20 דקות עד להזהבה יפה.⁩", "owner": "𝐒 𝐇 𝐈 𝐑 𝐀 𝐙", "username": "shirazhalevi_", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 67, "clean_title": "פיצה קוטג׳ - 10 גרם חלבון ליחידה"}, {"url": "https://www.instagram.com/reel/DR7v1OlDG4p/", "title": "סלמון ספרינג רולס 🍣🥬Salmon Spring Rolls", "caption": "סלמון ספרינג רולס 🍣🥬Salmon Spring Rolls \nבמחשבה שניה הייתי מתבלת את האיטריות לפני הגלגול אבל אפשר באמת לשים כל מה שאוהבים!✨ \n\nדפי אורז\nפרוסות סלמון טרי \nמלפפונים חתוכים לפסים דקים \nאיטריות שעועית \nעלי חזרת \n\nלרוטב:\n1/2 כוס חמאת בוטנים טבעית \n1 כף רוטב סויה\nמעט מיץ לימון \nמעט מים חמים עד שמגיעים למרקם הרצוי \n\nמרטיבים דף אורז במים קרים ומניחים על קרש.\nמניחים פרוסות סלמון בקרבה לשוליים הרחוקים של דף האורז, מניחים את יתר התוספות במרכז, מקפלים את הקצוות כלפי פנים ומגלגלים תוך כדי הידוק \n\nRice paper sheets\nFresh salmon slices\nCucumbers, cut into thin strips\nGlass noodles\nHorseradish leaves\n\nFor the dipping sauce:\n1/2 cup natural peanut butter\n1 tbsp soy sauce\nA little lemon juice\nA little hot water, until the desired consistency is reached\n\nDip a rice paper sheet in cold water and place it on a board.\nArrange the salmon slices near the far edge of the rice paper, place the remaining ingredients in the center, fold the sides inward, and roll tightly.\n\n#bareaders #foodgasm #foodgram #tlvfood #israelifood #gargeran #foodpic #foodpics #foodblogger #foodlover #eat #yummy#foodstyling #food#foodstagram #ronisrecipes", "owner": "𝗥𝗼𝗻𝗶 𝗖𝗼𝗵𝗲𝗻 | רוני כהן | 𝙵𝚘𝚘𝚍 𝙱𝚕𝚘𝚐", "username": "ronis_recipes", "hashtags": ["ronisrecipes", "foodgram", "foodlover", "foodstagram", "yummy", "foodstyling", "eat", "foodpic", "foodpics", "gargeran", "tlvfood", "foodblogger", "food", "foodgasm", "bareaders", "israelifood"], "user_tags": [], "collection": "Meals", "id": 68, "clean_title": "סלמון ספרינג רולס Salmon Spring Rolls"}, {"url": "https://www.instagram.com/reel/DRzVcGujAwy/", "title": "נזכרתי במתכון שצילמתי לפני כמה זמן ובכל -10 ₪? תשלחו למי..."}, {"url": "https://www.instagram.com/reel/DQHicXliScT/", "title": "Orzo Salad with Pearl Mozzarella, Pesto, and Cherry Tomatoes", "caption": "Orzo Salad with Pearl Mozzarella, Pesto, and Cherry Tomatoes\n\nMy go-to orzo salad when I want pasta but lighter. The pesto, tomatoes, and mozzarella come together perfectly - fresh, cozy, and full of flavor. Made with @colavitausa Premium Italian Extra Virgin Olive Oil, orzo, and white wine vinegar.\n\n#ad #colavitapartner #colavita #itstartswithcolavita \n\nIngredients\nPesto:\n2 cups fresh basil leaves\n½ cup baby spinach (optional, for color)\n4 tbsp toasted pine nuts (or pistachios), plus 2 tbsp reserved for garnish\n½ cup grated Parmigiano Reggiano\n2-3 small garlic cloves (use 1 for a milder flavor)\n¼ tsp kosher salt, plus more to taste\nAbout 5 tbsp Colavita Premium Italian Extra Virgin Olive Oil, plus more as needed\n1-2 tbsp cold water, if needed\n2 tsp Colavita White Wine Vinegar\nFreshly ground black pepper, to taste\n\nFor the Salad\n1 cup Colavita Orzo Pasta\n1½-2 cups cherry tomatoes, halved\n¾ cup fresh mozzarella pearls (see note)\n1 handful fresh arugula\n1 tsp lemon zest (optional)\nJuice from 1/2 lemon, if needed\n\nInstructions\nYou’ll find the pesto recipe and extra notes in the comments below.\n\nMake the Salad\n\nBring a large pot of salted water to a boil. Cook the orzo according to the package directions until al dente, then drain and let cool slightly.\nIn a large bowl, combine the arugula, cherry tomatoes, mozzarella pearls, and orzo. Sprinkle with lemon zest.\nIn a separate small bowl, mix 2 tablespoons of the pesto with the white wine vinegar and ground black pepper, don’t overmix. Then whisk in the remaining pesto, adding a splash of water or olive oil as needed to loosen it to a dressing-like consistency.\n(Mixing the pesto in stages helps prevent browning and keeps the color bright.)\n\nPour the pesto dressing over the salad and toss gently to combine.\nTaste and adjust the seasoning - if needed, add a squeeze of lemon juice for brightness, or a drizzle of extra virgin olive oil and a little salt to finish.\nTop with the reserved toasted pine nuts and serve.\n\nPesto orzo salad\nOrzo pasta salad with mozzarella\nEasy pasta recipe\nBasil pesto dressing\nQuick  pasta recipe", "owner": "Yarin Danieli", "username": "yarindanieli", "hashtags": ["colavitapartner", "itstartswithcolavita", "ad", "colavita"], "user_tags": [], "collection": "Meals", "id": 78, "clean_title": "Orzo Salad with Pearl Mozzarella, Pesto, and Cherry Tomatoes"}, {"url": "https://www.instagram.com/reel/DQzcRmODVVI/", "title": "⁨\t⁨\t⁨\tפסטה בצל מקורמל ומיסו חלומית,", "caption": "⁨\t⁨\t⁨\tפסטה בצל מקורמל ומיסו חלומית,\nעם שלוש שכבות אומאמי\n💣🧨🔥\n\nרכיבים לשתי מנות:\n2 בצל לבן\n4 בצל שאלוט\n30 גרם חמאה\nחצי כפית מלח\nכפית מיסו לבן\nפלפל לבן או שחור - \n  אם משתמשים בגרגרים שלמים: למדוד כפית ואז לכתוש. \n  אם משתמשים בפלפל גרוס: חצי כפית.\n200 מ״ל שמנת\n50 מ״ל מי פסטה\nחצי חבילת עירית קצוצה\n100 גרם פרמזן מגורר\n\n200 גרם פסטה יבשה איכותית. ממליצה על פסטות קצרות כמו רדיאטורי, פוסילי, פרפלה, אורקייטה או חונקי כמרים, אבל לא חלולות כמו ריגטוני או פנה.\n\nאופן הכנה:\nחותכים את הבצלים לרצועות. מחממים מחבת לחום בינוני-נמוך, מוסיפים את החמאה ואת הבצל.\nמוסיפים חצי כפית מלח ומכסים את הבצלים. לאחר רבע שעה מוסיפים רבע כוס מים ומכסים. מאותו הרגע, נערבב את הבצלים ונוסיף רבע כוס מים כל רבע שעה, עד שמתקבלת משחה אחידה של בצל מקורמל בצבע ענברי. אם נשארו מים. חשוב לעבוד על אש נמוכה כדי לא להשחים או לשרוף את הבצל, ולהוסיף מים במידת הצורך. המים מאפשרים לסוכרים הטבעיים שבבצל להתקרמל  בלי להישרף.\nממליצה לבשל את הבצל מינימום 45 דק על חום בינוני-נמוך, ובכיף שלוש שעות ואף יותר על חום נמוך. \n\nכשהבצל מקורמל, מוסיפים כפית מיסו, את הפלפל הלבן או השחור, ושמנת. מנמיכים את האש ומכסים.\n\nבמקביל מבשלים את הפסטה במים מומלחים לאל-דנטה לפי הוראות היצרן. \n\nבתום הבישול של הפסטה, מוסיפים את מי הפסטה ואת הפסטה, יחד עם מחצית מהפרמזן המגורר והעירית.\n\nמערבבים היטב, מתקנים מלח במידת הצורך, וממגישים עם יתר your microwave (episode 3 of my microwave meals series)\n\nThis video is inspired by @cafemaddy and last year’s microwave hot pot trend! \n\nI know the microwave gets a bad rap, but microwaves are one of the most underrated tools in the kitchen. They’re fast, they help retain nutrients due to shorter cooking times and minimal water, and they make meals like this possible with almost no effort or cleanup.\n\nThis one’s packed with veggies, tofu, thinly sliced beef, and a super simple sauce. Just add everything in a bowl, cover with napa cabbage, and microwave for 6 minutes. \n\nFull recipe with measurements for free in my substack! \n\n#microwavemeals #EasyRecipe", "owner": "Kylie Sakaida", "username": "nutritionbykylie", "hashtags": ["easyrecipe", "microwavemeals"], "user_tags": [], "collection": "Meals", "id": 81, "clean_title": "How to make “hot pot” in your microwave (episode 3 of my..."}, {"url": "https://www.instagram.com/reel/DQkIQx2DeNx/", "title": "🥢 Sweet Chilli Sesame Chicken Tray (with a twist) Reaction video 👇🏻", "caption": "🥢 Sweet Chilli Sesame Chicken Tray (with a twist) Reaction video 👇🏻\n\nI don’t have sweet chilli sauce, so I swapped it for rice wine vinegar and honestly, it still has that tangy flavour but with a sharper, lighter edge.\n\nAlso threw in a can of chickpeas for extra texture, protein, and fibre .... Because when in doubt FIBRE.\n\nThis one’s quick, high in protein, and feels like proper comfort food without the fuss.\n\nThanks @adamhoad_coaching for another winner. 💚\n\nRecipe (serves 4)\n\n800g sweet potato\n200g cauliflower\n150g broccoli\n200g courgette\n1 can chickpeas (drained)\n650g chicken breast\n1 tbsp garlic powder + smoked paprika\n\n——\nMarinade (for the chicken)\n1 clove garlic (minced)\n1 tbsp soy sauce\n1 tsp sesame oil\n1 tsp smoked paprika\n\n——\nVeg Drizzle (after baking)\n1 tbsp soy sauce\nJuice of 1 lime\n1 tbsp sesame oil\n½ tbsp honey\n½ tbsp sesame seeds\n½ tsp ginger powder\na splash of rice wine vinegar instead of sweet chilli sauce\n\n——\n\nSteps\n1️⃣ Toss the sweet potato, chickpeas, and vegetables with a spray of olive oil, salt, pepper, garlic powder, and smoked paprika.\n2️⃣ Roast at 190°C (fan) for 35 minutes.\n3️⃣ Mix the chicken with the marinade ingredients, then bake for 25 minutes (on a separate tray or shelf below).\n4️⃣ Combine your drizzle ingredients and pour over the roasted veg before serving.\n\n——\nPer serving (1 of 4)\n🔥 Calories: 537 kcal\n💪 Protein: 47g\n🍚 Carbs: 59g\n🥑 Fat: 12g\n🌾 Fibre: 13.5g", "owner": "GQ Jordan | Nutritionist", "username": "gqjordannutrition", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 82, "clean_title": "Sweet Chilli Sesame Chicken Tray (with a twist) Reaction video"}, {"url": "https://www.instagram.com/reel/DPtHgxYj_-A/", "title": "Reformer vs Mat", "caption": "Reformer vs Mat \n\n#pilates #pilateslovers #mat #reformerpilates", "owner": "SOJO Pilates", "username": "sojopilates", "hashtags": ["mat", "pilates", "reformerpilates", "pilateslovers"], "user_tags": [], "collection": "Meals", "id": 83, "clean_title": "Reformer vs Mat"}, {"url": "https://www.instagram.com/reel/DP38S4YCKUY/", "title": "⁨\tסינייה כרובית", "caption": "⁨\tסינייה כרובית\nזו בעצם הכרובית בשיא הסטייל שלה\nכרובית בתנור עם טחינה שנחרכת יחד איתה - לפי השלבים שכתבתי פה (חשוב כדי להגיע למרקם כייפי וקריספי ולא מושי)\nמנת אירוח מחרפנת\n-שמרו מתכון דחוף-\nמצרכים:\nכרובית גדולה חתוכה לפרחים\nטחינה ירוקה:\nטחינה גולמית\n2 שיני שום\nחופן פטרוזיליה\nמיץ מלימון שלם\nמים קרים לפי הצורך\nמלח\nלהגשה-50 גרם שקדים פרוסים (לא חייב, מוסיף)\n\nאופן ההכנה:\nמעבירים את פרחי הכרובית לקערה חסינת חום ומשרים במים רותחים עם מלח גס לחצי שעה.\nמסננים את המים ומבשלים במיקרוגל \n10 דק׳ לריכוך (הכרובית עדיין קצת קשה)\nמזלפים בשמן זית ומלח גס ואופים בתנור\nשחומם מראש ל-220  מעלות טורבו עד קבלת גוון זהוב - בערך 20 דק’.\n\nמכינים טחינה ירוקה:\nבמעבד מזון/ עם בלנדר מוט טוחנים את כל מרכיבי הטחינה עד לקבלת מרקם נוזלי (יותר דליל מטחינה רגילה) \n\nמצלחתים:\nכשהכרובית מוכנה מוזגי לם\n3 כפות שמן זית\n2 שיני שום כתושות\n1/2 כפית מךח\n\nאופן הכנה:\nפורסים את התפוחי אדמה לרבעים, מעבירים את תפוחי האדמה לכלי מתאים למיקרוגל ומכניסים לחימום ל-10 דק’ בפולסים של 5 דק’, עד שמתרכך.\n\nאופים:\nמעבירים לתבנית אפייה את תפוחי האדמה ומוסיפים את גרגירי החומוס והזוקיני\nמזלפים בשמן זית, מלח גס ופלפל שחור ואופים בתנור\nשחומם מראש ל-220 מעלות טורבו עד להשחמה - בערך 30 דק’ עד שהירקות מקבלים גוון זהוב יפה.\nבינתיים בזמן האפייה-\nפורסים לפרוסות דקות את הבצל סגול וקוצצים את הברוקולי\nמכינים את הרוטב-\nמערבבים את כל מרכיבי הרוטב בצנצנת קטנה \nמצלחתים-\nמעבירים לקערת הגשה את הירקות המבושליח והטריים\nמוסיפים את הרוטב ומערבבים\nמפזרים מעל שקדים ומגישים", "owner": "Adva Rois | אדווה רויז", "username": "advarois", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 93, "clean_title": "סלט החג שלי"}, {"url": "https://www.instagram.com/reel/DObwC5ZETHd/", "title": "CARAMELIZED CABBAGE WITH HONEY-BOURSIN CREAM! This one melts in your mouth—the cabbage gets tender & creamy, & this Hone", "caption": "CARAMELIZED CABBAGE WITH HONEY-BOURSIN CREAM! This one melts in your mouth—the cabbage gets tender & creamy, & this Honey-Boursin Cream is sweet, tangy, salty & addictive! Used my favorite @latourangelle avocado oil—they have the best, highest quality cooking oils out there!\n•\n*3-4 servings*\nFor the sauce:\n½ tbsp La Tourangelle Avocado Oil\n½ cup chopped scallions\n4 cloves minced garlic\n3 tbsp honey\n3 ½ oz Boursin cheese (I used garlic & herb variety) \n1 tbsp lemon juice\nPinch salt\n2-4 tbsp water\n•\nFor the cabbage:\n1 tbsp La Tourangelle Avocado Oil\n½ large cabbage, cut into 3 wedges \n½ tsp salt\n⅓ cup water\n•\nFor the toppings:\nChopped fresh dill\nLemon zest \nFreshly ground black pepper\nToasted pine nuts\n•\n1️⃣Preheat the oven to 425. 2️⃣Sear the cabbage. Heat a large skillet over medium-high. Add 1 ½ tablespoons of avocado oil, then the cabbage wedges. Sprinkle the tops with ¼ teaspoon salt. Sear the wedges for about 3 minutes, until browned. Flip them over, add another ¼ teaspoon salt and sear for another 3 minutes. Add ⅓ cup of water to the pan, then cover and place in the oven for 20 minutes. After 20 minutes, remove the cover and cook for another 20 minutes, flipping halfway. 3️⃣While the cabbage roasts, make the sauce. Heat another skillet over medium-high. Add ½ tablespoon avocado oil, then the garlic and scallions. Sauté them for about 1 minute, then add the lemon juice and 2 tablespoons of water. Stir, then add the honey and a pinch of salt. Continue stirring for about 1-2 minutes, then add the Boursin and stir it in as it melts, creating a sauce. Add more water, 1 tablespoon at a time, until it reaches desired consistency. You will need to warm the sauce before serving, as it will begin to harden as it cools. 4️⃣Plate the cabbage, then top with some sauce, fresh dill, lemon zest, black pepper and pine nuts. \n•\n#cabbagerecipe #cabbage #wholefoodsmarket #easyrecipe #recipe #tastemade #inthekitchen #igreels #sidedish #salad #fallrecipes #glutenfreerecipe #goodmoodfood #glutenfreefood #healthyrecipes #healthydinnerideas #healthycooking #lowcarbrecipes #cookfromscratch #comfortfood #vegetarian #veggielover", "owner": "Caitlin Latessa-Greene", "username": "starinfinitefood", "hashtags": ["sidedish", "inthekitchen", "goodmoodfood", "veggielover", "salad", "glutenfreefood", "healthyrecipes", "easyrecipe", "fallrecipes", "igreels", "recipe", "cabbage", "vegetarian", "wholefoodsmarket", "comfortfood", "healthycooking", "healthydinnerideas", "cookfromscratch", "tastemade", "glutenfreerecipe", "cabbagerecipe", "lowcarbrecipes"], "user_tags": [], "collection": "Meals", "id": 94, "clean_title": "CARAMELIZED CABBAGE WITH HONEY-BOURSIN CREAM! This one melts in..."}, {"url": "https://www.instagram.com/reel/DOYYjDECNo1/", "title": "תשמרו מתכון לפולנטה אליפות!! תכף יהיו עוד מתכונים לחג אבללל יש מתכונים קלים שאתם חייבים להכין בינתיים", "caption": "תשמרו מתכון לפולנטה אליפות!! תכף יהיו עוד מתכונים לחג אבללל יש מתכונים קל ם עד שהרוטב עוטף את הטופו. מוסיפים את הבאק צ׳וי שיקבל קצת את הטעם של הרוטב ומכבים את הגז. \n5. מומלץ לפזר שומשום ועירית או בצל ירוק ולהגיש לצד אורז לבן 😍 בתיאבון!\n\n#ii_community #charityday_ii #ii_community #אורחחייםבריא #healthylifestyle #מתכונים #מתכוניםבריאים #recipes #אוכלבריא #טופו #אוכל", "owner": "Alona Eckrling | דיאטנית קלינית", "username": "alonaeck_", "hashtags": ["charityday_ii", "ii_community", "אורחחייםבריא", "מתכוניםבריאים", "recipes", "healthylifestyle", "אוכל", "טופו", "אוכלבריא", "מתכונים"], "user_tags": [], "collection": "Meals", "id": 97, "clean_title": "ארוחת צהריים מושלמת"}, {"url": "https://www.instagram.com/reel/DOFCuE_AQPs/", "title": "Craving bibimbap but don’t have hours to spend in the kitchen? 🙋‍♀️ Same here! So I made a quick, healthier version with", "caption": "Craving bibimbap but don’t have hours to spend in the kitchen? 🙋‍♀️ Same here! So I made a quick, healthier version with steamed veggies and eggs—all cooked in one pot—and a comforting spinach doenjang soup using the same flavorful broth. 🍲✨\n\nIt’s such an easy way to enjoy a full Korean meal without the usual fuss. The best part? No veggie goes to waste because I use the broth to make the soup! 💚\n\nIf you want to make it extra indulgent, add some grilled bulgogi or swap the steamed eggs for crispy fried ones 😉🔥 But honestly, this lighter version was surprisingly delicious, fresh, and so satisfying.\n\nPerfect for busy nights when you want something wholesome but fuss-free. Give it a try and let me know what you think! 🥢💕\n\n🍚10min Steamed Bibimbap + Spinach \nDoenjang Soup\n\nIngredients\n\nAbout 4 cups water\n4-5 pieces dried kelp (dashima)\n2 anchovy broth tablets\n\nFor steaming veggies:\n2 small carrots, julienned\n1 small zucchini, julienned\nHandful shiitake mushrooms\nHandful mung bean sprouts\n1 small Korean radish, julienned\n2 eggs, cracked into a small bowl with a splash of water\n\nFor Spinach Doenjang Soup:\n2 tbsp soybean paste (doenjang)\n1.5 tbsp minced garlic\nHandful spinach\nHalf block tofu, cut into cubes\n1 tbsp Korean chili flakes (gochugaru)\n2 serrano peppers (optional, for spice)\n\nFor bibimbap assembly:\nCooked rice\nGochujang (Korean chili paste), to taste\nSesame oil, to taste\nSesame seeds, for garnish\n\nInstructions:\n1. Pour water into a pot. Add kelp and broth tablets. Place the steamer basket on top.\n2. In the steamer basket, arrange veggies, and crack the eggs in a small bowl with a bit of water in the center.\n3. Cover and bring to a boil, steaming for 10 minutes until veggies are tender and eggs are cooked.\n4. Remove the steamer basket. Take out the kelp pieces from the broth.\n5. To the broth, add soybean paste, minced garlic and spinach and cook until slightly wilted.\n6. Add tofu cubes, Korean chili flakes, and serrano peppers (if using). Simmer briefly until tofu is heated through.\n7. For bibimbap, place steamed veggies and eggs on top of cooked rice. Mix with gochujang, sesame oil, and garnish with sesame seeds.\n\n#onepotbibimbap #spinachdoengjangguk", "owner": "Hubbybap | What I cook for my husband 🍚", "username": "hubbybap", "hashtags": ["spinachdoengjangguk", "onepotbibimbap"], "user_tags": [], "collection": "Meals", "id": 98, "clean_title": "Craving bibimbap but don’t have hours to spend in the kitchen?..."}, {"url": "https://www.instagram.com/reel/DNDGFJbMQi9/", "title": "זה אולי נראה כמו סלט אבל בפועל", "caption": "זה אולי נראה כמו סלט אבל בפועל \nזו לגמרי ארוחה שלמה!\nפרסום ממומן בשיתוף @marina_galil \nהוא כל כך טעים ויש בו את השילוב המושלם \nכדי גם להיות טעים, גם בריא וגם משביע.\n\nומה הכי כיף? שתוך 20 דקות יש לכם צלחת \nמנה משפחתית שכולם יחסלו\nהכנתי אותו עם הירקות הנהדרים \nוהטריים בטירוף של מרינה ויצא חגיגה \n\nמצרכים: 2 כוסות חסות קצוצות ½ כוס קינואה מבושלת 1 בטטה בינונית, חתוכה לקוביות וצלויה 1 כוס פטריות שמפיניון פרוסות צרובות על מחבת מלפפון קצוץ 4 צנוניות פרוסות דק ½ כוס חומוס מבושל \nלתיבול החומוס:\nכף שמן זית ½ כפית פפריקה מתוקה מלח, פלפל לפי הטעם\n\nלרוטב:\n2 כפות שמן זית 2כפות מים  כף מיץ לימון כפית חרדל  כפית סילאן מלח ופלפל לפי הטעם \nהוראות הכנה: 1. מחממים תנור ל - 200 מעלות. 2. מערבבים את גרגרי החומוס עם שמן זית, פפריקה, מלח ופלפל. 3. מפזרים על תבנית עם נייר אפייה וקולים כ - 25 דקות, עד שהם שחומים ופריכים. 4. חותכים את הבטטות לקוביות וצורבים בתנור יחד עם החומוס או בנפרד עם מעט שמן ומלח, עד ריכוך והשחמה קלה. 5. את הפטריות צורבות על מחבת עם מעט שמן זית. 5. לרוטב: טורפים יחד את כל המרכיבים עד שהוא מתאחד. טועמים ומתקנים תיבול. 6. להרכבה: בקערה גדולה שמים חסות, קינואה, בטטה קלויה, פטריות צרובות, מלפפון וצנוניות. 7. מוסיפים את החומוס הקלוי מעל, ויוצקים את הרוטב ממש לפני ההגשה. מערבבים ומגישים", "owner": "דניאל וגנר | Cheffa", "username": "danielle_cheffa", "hashtags": [], "user_tags": [], "collection": "Meals", "id": 99, "clean_title": "זה אולי נראה כמו סלט אבל בפועל"}, {"url": "https://www.instagram.com/reel/DLp2rLsx38Z/", "title": "Shin ramen 🍜", "caption": "Shin ramen 🍜\n📝 Ingredients:\n\t•\t1 pack Shin Ramyun\n\t•\t1 - 3 eggs\n\t•\tabout 1 tablespoon Kewpie mayo \n\t•\t1 packet Shin Ramyun soup seasoning\n\t•\tOptional: half the veggie flakes packet ( I've seen some people add this but i don't like it ) \n\t•\tGreen onions, finely chopped (for topping)\n\t•\tChili oil (for topping)\n\t•\twater (for cooking noodles) \n\n🔪 Instructions:\n\t1.\tBoil about 2-3 cups of water in a pot and cook the Shin Ramyun noodles according to package instructions (about 4-5 minutes). You can add the veggie flakes to the pot or leave them out.\n\t2.\tWhile the noodles are cooking, in a large bowl, combine:\n\t•\t1 egg\n\t•\t1 tbsp Kewpie mayo\n\t•\t2/3 of the Shin Ramyun soup seasoning packet ( might be to salty if you add the entire thing 😐 ) \nMix well until smooth and creamy.\n\t3.\tOnce the noodles are just cooked, ladle about 1 cup of the boiling noodle water into the bowl with the egg-mayo-seasoning mixture. ( you can add more or less water, do as you please and taste as you cook ! ) Stir quickly to create a creamy broth (don’t pour all the //www.instagram.com/reel/DN3tM_CYscg/", "title": "CRISPY CARROT FRIES WITH WHIPPED HONEY-RICOTTA & PISTACHIO GREMOLATA! Guysss—the flavors and textures here are insane. T", "caption": "CRISPY CARROT FRIES WITH WHIPPED HONEY-RICOTTA & PISTACHIO GREMOLATA! Guysss—the flavors and textures here are insane. This is *not a traditional* Gremolata, but it has the texture of one with the sweet, peppery flavor of fresh basil & a perfect pistachio crunch! Used my favorite @latourangelle oils—because they are the highest quality & best tasting!\n•\nFor the carrots:\n1 lb carrots, cut into fries\n2 tbsp La Tourangelle avocado oil \n3/4 tsp salt\n3/4 tsp paprika\n3/4 tsp onion powder \n1 tsp dried oregano \n1 tbsp corn starch\n•\nFor the ricotta:\n3/4 cup ricotta \n1 tbsp honey\n1/4 tsp salt\nPepper to taste \n1 tsp lemon juice \n•\nFor the gremolata:\n1/4 cup pistachios \n1/2 cup packed fresh basil\n1/2 tbsp La Tourangelle olive oil \n1/4 tsp salt\nPepper to taste\n1 clove garlic, minced \n1/2 tsp lemon zest\n•\nOptional toppings:\nChopped scallions \nFeta cheese \nHoney\n•\n1️⃣Preheat the oven to 425. Place a sheet pan in the oven while it preheats.2️⃣Next, add the salt, paprika, onion powder and oregano to a small bowl and mix to combine. Add the carrots to the hot sheet pan and bake for 30-35 minutes, flipping halfway. 3️⃣While the carrots roast, mix together the ricotta and gremolata. Add the ricotta, honey, salt, pepper and lemon juice to a small bowl and mix to combine. Set aside, then add the pistachios and basil to a food processor or small blender and process until it creates a sort of paste. Add that mixture to a small bowl with the salt, pepper olive oil, garlic and lemon juice. Mix together and set aside. 4️⃣Spread the ricotta onto a plate, then top with the carrots, then the crumble, scallions, feta and a drizzle of honey, if desired.\n•\n#veggielover #carrots #carrotrecipes #vegetarian #healthycooking #healthyrecipes #goodmoodfood #glutenfree #glutenfreerecipes #ig
